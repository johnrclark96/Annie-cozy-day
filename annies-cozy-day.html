<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Annie's Cozy Day — implementation plan

    Architecture plan:
    1) Build a fixed 800x600 canvas app with one requestAnimationFrame loop, one shared input layer,
       one shared particle system, one shared audio manager, and localStorage helpers using the
       "anniesCozyDay_" prefix for every saved value.
    2) Define reusable drawing functions for Annie, Obi, and Luna first. Every screen uses these
       functions only; no inline character rendering. Pose and expression are controlled through the
       state argument so the same characters can be reused on title, hub, gameplay, and results.
    3) Create scene classes for Title, Hub, and the three minigames. Minigames share a common base
       scene that handles the required flow: crossfade arrival from hub, instruction card, countdown,
       gameplay, pause overlay, results screen, replay, and hub return.
    4) Finish Tier 1 completely before Tier 2 content is enabled: title screen, hub, Treat Toss,
       Laser Chase, full navigation loop, procedural audio with mute persistence, score tracking,
       and personal best persistence.
    5) Add Tier 2 after Tier 1 logic is complete: Cuddle Pile, achievements with saved progress and
       hub badges, plus richer idle animation states across all screens.
    6) Add polish last: crossfades, pulsing prompts, bounce-in score text, staggered results stars,
       hover glows, ambient hearts/stars, and achievement banners.
    7) Final self-review target: no undefined variables, no dead-end navigation,
       no broken game loop transitions, and no missing pause/results wiring.
  -->
  <title>Annie's Cozy Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #FFF8F0;
      font-family: "Fredoka One", "Comic Sans MS", cursive, sans-serif;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: grid;
      place-items: center;
    }
    #wrap {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
    }
    canvas {
      width: 800px;
      height: 600px;
      max-width: calc(100vw - 24px);
      max-height: calc(100vh - 24px);
      image-rendering: auto;
      border-radius: 22px;
      box-shadow: 0 20px 60px rgba(80, 50, 30, 0.18);
      background: #FFF8F0;
      cursor: default;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="800" height="600" aria-label="Annie's Cozy Day game canvas"></canvas>
  </div>

  <script>
  (() => {
    "use strict";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;
    const STORE_PREFIX = "anniesCozyDay_";

    const COLORS = {
      cream: "#FFF8F0",
      peach: "#FFDAB9",
      softPink: "#FFB6C1",
      gold: "#FFD700",
      sage: "#A8C686",
      brown: "#D2B48C",
      warmRed: "#C0392B",
      wall: "#F5E6D3",
      couch: "#C59A6A",
      couchDark: "#AA7C50",
      rug: "#D8C2A8",
      floor: "#EFD8BE",
      dark: "#5C4434",
      shadow: "rgba(0,0,0,0.14)"
    };

    const ACHIEVEMENTS = [
      { key: "obiBestFriend", name: "Obi's Best Friend", desc: "Catch 30 total treats across all Treat Toss games.", color: "#A97142", icon: "bone" },
      { key: "comboStar", name: "Combo Star", desc: "Reach a 10x combo in Treat Toss.", color: "#FFD700", icon: "star" },
      { key: "catWhisperer", name: "Cat Whisperer", desc: "Score 400+ in a single Laser Chase game.", color: "#7CB342", icon: "catEye" },
      { key: "pouncePerfect", name: "Pounce Perfect", desc: "Reach a 5x combo in Laser Chase.", color: "#E53935", icon: "paw" },
      { key: "couchPotato", name: "Couch Potato", desc: "Survive 30 seconds in Cuddle Pile.", color: "#7FB3D5", icon: "couch" },
      { key: "maximumCozy", name: "Maximum Cozy", desc: "Reach the 90-second win state in Cuddle Pile.", color: "#F48FB1", icon: "heart" },
      { key: "goodWalker", name: "Good Walker", desc: "Score 300+ on Obi's Walk.", color: "#8D6E4C", icon: "bone" },
      { key: "napMaster", name: "Nap Master", desc: "Score 400+ on Luna's Nap Spot.", color: "#C39BD3", icon: "heart" }
    ];

    function sKey(key) { return STORE_PREFIX + key; }
    function loadJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(sKey(key));
        return raw ? JSON.parse(raw) : fallback;
      } catch (err) {
        return fallback;
      }
    }
    function saveJSON(key, value) {
      try { localStorage.setItem(sKey(key), JSON.stringify(value)); } catch (err) {}
    }
    function loadNumber(key, fallback = 0) {
      try {
        const raw = localStorage.getItem(sKey(key));
        const num = raw === null ? fallback : Number(raw);
        return Number.isFinite(num) ? num : fallback;
      } catch (err) {
        return fallback;
      }
    }
    function saveNumber(key, value) {
      try { localStorage.setItem(sKey(key), String(value)); } catch (err) {}
    }
    function loadBool(key, fallback = false) {
      try {
        const raw = localStorage.getItem(sKey(key));
        return raw === null ? fallback : raw === "true";
      } catch (err) {
        return fallback;
      }
    }
    function saveBool(key, value) {
      try { localStorage.setItem(sKey(key), String(!!value)); } catch (err) {}
    }

    const store = {
      muted: loadBool("muted", false),
      best_treat: loadNumber("best_treat", 0),
      best_laser: loadNumber("best_laser", 0),
      best_cuddle: loadNumber("best_cuddle", 0),
      best_walk: loadNumber("best_walk", 0),
      best_nap: loadNumber("best_nap", 0),
      stats: loadJSON("stats", {
        totalTreatCatches: 0,
        bestTreatCombo: 1,
        bestLaserCombo: 1,
        bestCuddle: 0,
        cuddleWon: false
      }),
      achievements: loadJSON("achievements", {
        obiBestFriend: false,
        comboStar: false,
        catWhisperer: false,
        pouncePerfect: false,
        couchPotato: false,
        maximumCozy: false,
        goodWalker: false,
        napMaster: false
      }),
      decor: loadJSON("decor", {
        fairyLights: false,
        plant2: false,
        petBed: false,
        rugColor: 0,
        wallArt: 0
      }),
      firstVisit: loadBool("firstVisit", true),
      pet_obi_joy: loadNumber("pet_obi_joy", 54),
      pet_luna_joy: loadNumber("pet_luna_joy", 56),
      lastKnownStars: loadNumber("lastKnownStars", 0),
      bubbleOnboarded: loadBool("bubbleOnboarded", false)
    };

    function saveStats() { saveJSON("stats", store.stats); }
    function saveAchievements() { saveJSON("achievements", store.achievements); }
    function saveDecor() { saveJSON("decor", store.decor); }
    function setBest(gameId, value) {
      const key = "best_" + gameId;
      if (value > store[key]) {
        store[key] = value;
        saveNumber(key, value);
        return true;
      }
      return false;
    }
    function totalStarsEarned() {
      const games = [
        { best: store.best_treat, thresholds: [200, 500, 1000] },
        { best: store.best_laser, thresholds: [150, 400, 800] },
        { best: store.best_cuddle, thresholds: [30, 60, 90] },
        { best: store.best_walk, thresholds: [150, 300, 600] },
        { best: store.best_nap, thresholds: [200, 450, 800] }
      ];
      let total = 0;
      for (const g of games) {
        if (g.best >= g.thresholds[0]) total++;
        if (g.best >= g.thresholds[1]) total++;
        if (g.best >= g.thresholds[2]) total++;
      }
      return total;
    }
    const TITLE_SUBTITLES = [
      "A cozy little gift for Annie, Obi, and Luna",
      "Obi wants belly rubs",
      "Luna is judging you lovingly",
      "Everyone's favorite nap spot",
      "A game about the important things",
      "Obi found something interesting to sniff",
      "Luna claims this is her couch now",
      "Made with love and way too much JavaScript"
    ];

    const DECOR_ITEMS = [
      { key: "fairyLights", name: "Fairy Lights", desc: "Twinkling lights along the wall", stars: 1, type: "toggle" },
      { key: "plant2", name: "Flower Pot", desc: "A flowering plant on the side table", stars: 3, type: "toggle" },
      { key: "petBed", name: "Pet Bed", desc: "A cozy pink bed for napping", stars: 5, type: "toggle" },
      { key: "rugColor", name: "Rug Color", desc: "Change the rug color", stars: 2, type: "cycle", max: 3, labels: ["Default", "Sage", "Lavender", "Rose"] },
    ];

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function rand(min, max) { return min + Math.random() * (max - min); }
    function sign(v) { return v < 0 ? -1 : 1; }
    function easeOutBack(t) {
      const c1 = 1.70158;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }
    function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }
    function dist(ax, ay, bx, by) {
      const dx = bx - ax;
      const dy = by - ay;
      return Math.hypot(dx, dy);
    }
    function pointInRect(px, py, r) {
      return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
    }
    function pointInCircle(px, py, cx, cy, r) {
      return dist(px, py, cx, cy) <= r;
    }
    function rr(c, x, y, w, h, r) {
      const radius = Math.min(r, w * 0.5, h * 0.5);
      c.beginPath();
      c.moveTo(x + radius, y);
      c.arcTo(x + w, y, x + w, y + h, radius);
      c.arcTo(x + w, y + h, x, y + h, radius);
      c.arcTo(x, y + h, x, y, radius);
      c.arcTo(x, y, x + w, y, radius);
      c.closePath();
    }
    function drawShadowEllipse(c, x, y, rx, ry, alpha = 0.14) {
      c.save();
      c.globalAlpha = alpha;
      c.fillStyle = "#000";
      c.beginPath();
      c.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }
    function drawHeart(c, x, y, s, color) {
      c.save();
      c.translate(x, y);
      c.scale(s, s);
      c.fillStyle = color;
      c.beginPath();
      c.moveTo(0, 6);
      c.bezierCurveTo(-12, -6, -18, -20, -5, -24);
      c.bezierCurveTo(0, -26, 4, -22, 5, -18);
      c.bezierCurveTo(6, -22, 10, -26, 15, -24);
      c.bezierCurveTo(28, -20, 22, -6, 10, 6);
      c.lineTo(5, 11);
      c.lineTo(0, 6);
      c.fill();
      c.restore();
    }
    function drawStar(c, x, y, r, color) {
      c.save();
      c.translate(x, y);
      c.fillStyle = color;
      c.beginPath();
      for (let i = 0; i < 10; i++) {
        const ang = -Math.PI / 2 + i * Math.PI / 5;
        const rad = i % 2 === 0 ? r : r * 0.45;
        const px = Math.cos(ang) * rad;
        const py = Math.sin(ang) * rad;
        if (i === 0) c.moveTo(px, py);
        else c.lineTo(px, py);
      }
      c.closePath();
      c.fill();
      c.restore();
    }
    function drawBone(c, x, y, w, h, color) {
      c.save();
      c.translate(x, y);
      c.fillStyle = color;
      /* central bar */
      rr(c, -w * 0.45, -h * 0.28, w * 0.9, h * 0.56, h * 0.2);
      c.fill();
      /* knobs - drawn after rr so beginPath doesn't erase them */
      c.beginPath();
      c.arc(-w * 0.35, -h * 0.25, h * 0.25, 0, Math.PI * 2);
      c.arc(-w * 0.35, h * 0.25, h * 0.25, 0, Math.PI * 2);
      c.arc(w * 0.35, -h * 0.25, h * 0.25, 0, Math.PI * 2);
      c.arc(w * 0.35, h * 0.25, h * 0.25, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }
    function drawGlowCircle(c, x, y, r, color, alpha = 0.3) {
      c.save();
      const grad = c.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0, color.replace("ALPHA", alpha.toFixed(3)));
      grad.addColorStop(1, color.replace("ALPHA", "0"));
      c.fillStyle = grad;
      c.beginPath();
      c.arc(x, y, r, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }
    function wrapText(c, text, x, y, maxWidth, lineHeight) {
      const words = text.split(" ");
      let line = "";
      for (let i = 0; i < words.length; i++) {
        const test = line + words[i] + " ";
        if (c.measureText(test).width > maxWidth && line) {
          c.fillText(line.trim(), x, y);
          y += lineHeight;
          line = words[i] + " ";
        } else {
          line = test;
        }
      }
      if (line) c.fillText(line.trim(), x, y);
    }

    class CozyAudio {
      constructor() {
        this.ctx = null;
      }
      ensure() {
        if (!this.ctx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return null;
          this.ctx = new AC();
        }
        if (this.ctx && this.ctx.state === "suspended") this.ctx.resume();
        return this.ctx;
      }
      canPlay() {
        return !!this.ctx && !store.muted;
      }
      envGain(gainNode, when, attack, sustain, release, gain) {
        gainNode.gain.cancelScheduledValues(when);
        gainNode.gain.setValueAtTime(0.0001, when);
        gainNode.gain.exponentialRampToValueAtTime(gain, when + attack);
        gainNode.gain.setTargetAtTime(0.0001, when + attack + sustain, release);
      }
      tone(freq, duration = 0.1, gain = 0.18, type = "sine", endFreq = null, whenOffset = 0) {
        if (!this.canPlay()) return;
        const now = this.ctx.currentTime + whenOffset;
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        if (endFreq) osc.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), now + duration);
        osc.connect(g);
        g.connect(this.ctx.destination);
        this.envGain(g, now, 0.008, duration * 0.55, duration * 0.35, gain);
        osc.start(now);
        osc.stop(now + duration + 0.2);
      }
      vibratoTone(freq, duration = 0.15, gain = 0.15) {
        if (!this.canPlay()) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const lfo = this.ctx.createOscillator();
        const lfoGain = this.ctx.createGain();
        const g = this.ctx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(freq, now);
        lfo.frequency.value = 18;
        lfoGain.gain.value = 16;
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        osc.connect(g);
        g.connect(this.ctx.destination);
        this.envGain(g, now, 0.01, duration * 0.6, duration * 0.4, gain);
        osc.start(now);
        lfo.start(now);
        osc.stop(now + duration + 0.25);
        lfo.stop(now + duration + 0.25);
      }
      noisePop() {
        if (!this.canPlay()) return;
        const now = this.ctx.currentTime;
        const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.08, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / data.length * 4);
        const src = this.ctx.createBufferSource();
        const band = this.ctx.createBiquadFilter();
        band.type = "bandpass";
        band.frequency.value = 800;
        band.Q.value = 0.8;
        const g = this.ctx.createGain();
        src.buffer = buffer;
        src.connect(band);
        band.connect(g);
        g.connect(this.ctx.destination);
        this.envGain(g, now, 0.005, 0.03, 0.08, 0.16);
        src.start(now);
      }
      chord(freqs, duration = 0.3, gain = 0.12) {
        if (!this.canPlay()) return;
        freqs.forEach((f) => this.tone(f, duration, gain, "sine"));
      }
      menu() { this.tone(440, 0.1, 0.15, "sine"); }
      catch() { this.noisePop(); }
      miss() { this.tone(300, 0.2, 0.14, "sine", 200); }
      combo() {
        [523.25, 659.25, 783.99].forEach((f, i) => this.tone(f, 0.08, 0.12, "sine", null, i * 0.08));
      }
      pounce() { this.tone(300, 0.1, 0.14, "sine", 600); }
      targetHit() { this.vibratoTone(880, 0.15, 0.14); }
      fidget() { this.tone(200, 0.1, 0.12, "sine"); }
      lullaby() {
        [392, 329.63, 261.63, 196].forEach((f, i) => this.tone(f, 0.42, 0.12, "sine", null, i * 0.4));
      }
      achievement() { this.chord([261.63, 329.63, 392], 0.3, 0.11); }
      tinyChime() { this.tone(660, 0.09, 0.08, "sine"); }
      startAmbient() {
        if (this.ambientActive) return;
        if (!this.ensure()) return;
        if (store.muted) return;
        this.ambientActive = true;
        const now = this.ctx.currentTime;
        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        const lfo = this.ctx.createOscillator();
        const lfoGain = this.ctx.createGain();
        const g = this.ctx.createGain();
        osc1.type = "sine";
        osc1.frequency.value = 110;
        osc2.type = "sine";
        osc2.frequency.value = 165;
        lfo.type = "sine";
        lfo.frequency.value = 0.15;
        lfoGain.gain.value = 0.005;
        lfo.connect(lfoGain);
        lfoGain.connect(g.gain);
        g.gain.value = 0.018;
        osc1.connect(g);
        osc2.connect(g);
        g.connect(this.ctx.destination);
        osc1.start(now);
        osc2.start(now);
        lfo.start(now);
        this._ambientNodes = { osc1, osc2, lfo, lfoGain, g };
      }
      stopAmbient() {
        if (!this.ambientActive) return;
        this.ambientActive = false;
        const n = this._ambientNodes;
        if (!n) return;
        this._ambientNodes = null;
        try {
          const now = this.ctx.currentTime;
          n.g.gain.setTargetAtTime(0, now, 0.1);
          const osc1 = n.osc1, osc2 = n.osc2, lfo = n.lfo;
          setTimeout(() => {
            try { osc1.stop(); osc2.stop(); lfo.stop(); } catch(e) {}
          }, 300);
        } catch(e) {}
      }
    }
    const audio = new CozyAudio();

    const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || ("ontouchstart" in window);

    const game = {
      time: 0,
      last: 0,
      scene: null,
      transition: null,
      mouse: { x: 0, y: 0, down: false },
      keys: Object.create(null),
      hovered: false,
      particles: [],
      ambient: [],
      starsAmbient: [],
      visible: true,
      shake: 0,
      shakeX: 0,
      shakeY: 0
    };

    function screenShake(intensity = 4, duration = 0.2) {
      game.shake = Math.max(game.shake, duration);
      game.shakeIntensity = intensity;
    }

    function spawnParticleBurst(x, y, colors = [COLORS.softPink, COLORS.gold], amount = 10, kindMix = ["heart", "star"]) {
      if (game.particles.length > 240) game.particles.splice(0, game.particles.length - 240);
      for (let i = 0; i < amount; i++) {
        game.particles.push({
          x, y,
          vx: rand(-50, 50),
          vy: rand(-90, -30),
          life: 1,
          maxLife: 1,
          size: rand(5, 10),
          rot: rand(0, Math.PI * 2),
          vr: rand(-3, 3),
          shape: kindMix[Math.floor(Math.random() * kindMix.length)],
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }
    function initAmbient() {
      for (let i = 0; i < 18; i++) {
        game.ambient.push({
          x: rand(20, W - 20),
          y: rand(40, H - 20),
          vy: rand(-10, -22),
          drift: rand(-8, 8),
          size: rand(6, 12),
          color: Math.random() < 0.5 ? COLORS.softPink : COLORS.gold,
          shape: Math.random() < 0.5 ? "heart" : "star",
          phase: rand(0, Math.PI * 2)
        });
      }
    }
    initAmbient();

    function updateSharedParticles(dt) {
      for (let i = game.particles.length - 1; i >= 0; i--) {
        const p = game.particles[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 50 * dt;
        p.rot += p.vr * dt;
        if (p.life <= 0) game.particles.splice(i, 1);
      }
      if (game.scene instanceof TitleScene) {
        for (const a of game.ambient) {
          a.y += a.vy * dt;
          a.x += Math.sin(game.time * 0.8 + a.phase) * 8 * dt + a.drift * dt * 0.25;
          if (a.y < -20) {
            a.y = H + 20;
            a.x = rand(20, W - 20);
          }
          if (a.x < -20) a.x = W + 20;
          if (a.x > W + 20) a.x = -20;
        }
      }
    }
    function drawSharedParticles(c) {
      for (const p of game.particles) {
        c.save();
        c.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
        c.translate(p.x, p.y);
        c.rotate(p.rot);
        if (p.shape === "heart") drawHeart(c, 0, 0, p.size / 12, p.color);
        else drawStar(c, 0, 0, p.size, p.color);
        c.restore();
      }
    }


    function drawButton(c, r, label, hovered, fill = COLORS.warmRed, textColor = "#fff") {
      c.save();
      const shadowY = hovered ? 4 : 6;
      c.fillStyle = "rgba(92,68,52,0.18)";
      rr(c, r.x, r.y + shadowY, r.w, r.h, 18);
      c.fill();
      if (hovered) {
        drawGlowCircle(c, r.x + r.w / 2, r.y + r.h / 2, Math.max(r.w, r.h) * 0.95, "rgba(255,215,0,ALPHA)", 0.18);
      }
      const grad = c.createLinearGradient(r.x, r.y, r.x, r.y + r.h);
      grad.addColorStop(0, hovered ? "#DE5544" : "#D24A3C");
      grad.addColorStop(1, fill);
      c.fillStyle = grad;
      rr(c, r.x, r.y, r.w, r.h, 18);

      c.save();
      c.translate(x, y);
      c.fillStyle = color;
      c.strokeStyle = "#fff";
      c.lineWidth = 1.5;
      if (icon === "bone") {
        drawBone(c, 0, 0, 18, 10, color);
      } else if (icon === "star") {
        drawStar(c, 0, 0, 8, color);
      } else if (icon === "catEye") {
        c.beginPath();
        c.ellipse(0, 0, 10, 6, 0, 0, Math.PI * 2);
        c.fill();
        c.stroke();
        c.strokeStyle = "#2E7D32";
        c.beginPath();
        c.moveTo(0, -4);
        c.lineTo(0, 4);
        c.stroke();
      } else if (icon === "paw") {
        c.beginPath();
        c.arc(0, 2, 6, 0, Math.PI * 2);
        c.fill();
        [-6, -1, 4, 9].forEach((dx) => {
          c.beginPath();

        rr(c, -10, -2, 20, 8, 4);

        rr(c, -13, -8, 26, 8, 5);
        c.fill();

      }
      c.restore();
    }

    function loadCozyArt() {
      if (spriteArt.loading || spriteArt.ready) return;
      spriteArt.loading = true;
      const img = new Image();
      img.decoding = "async";
      img.onload = () => {
        spriteArt.image = img;
        spriteArt.loading = false;
        spriteArt.ready = true;
      };
      img.onerror = () => {
        spriteArt.loading = false;
      };
      img.src = SPRITE_ATLAS_URI;
    }

    function drawZzz(c, x, y, scale = 1, alpha = 0.9) {
      c.save();
      c.globalAlpha = alpha;
      c.fillStyle = "#FFF8F0";
      c.strokeStyle = "rgba(92,68,52,0.45)";
      c.lineWidth = 2;
      c.font = `${Math.round(16 * scale)}px "Fredoka One", "Comic Sans MS", cursive, sans-serif`;
      c.strokeText("Zzz", x, y);
      c.fillText("Zzz", x, y);
      c.restore();
    }


    function drawFrameImage(c, frame, x, y, scale, options = {}) {
      if (!frame || !spriteArt.image) return;
      const pxScale = (options.baseScale || 0.18) * scale;
      const stretchX = options.stretchX || 1;
      const stretchY = options.stretchY || 1;
      const w = frame.w * pxScale * stretchX;
      const h = frame.h * pxScale * stretchY;
      const bob = options.bob || 0;
      const flip = options.flip || 1;
      const rotation = options.rotation || 0;
      const shadowAlpha = options.shadowAlpha == null ? 0.16 : options.shadowAlpha;

      c.save();
      c.translate(x, y + bob);
      c.rotate(rotation);
      c.scale(flip, 1);
      if (shadowAlpha > 0) {
        drawShadowEllipse(c, 0, -4, Math.max(20, w * 0.22), Math.max(6, h * 0.045), shadowAlpha);
      }
      if (options.glow) {
        c.shadowColor = options.glow;
        c.shadowBlur = options.glowBlur || 22;
      }
      c.drawImage(spriteArt.image, frame.x, frame.y, frame.w, frame.h, -w / 2, -h, w, h);
      c.restore();
    }

    function drawUpperFrame(c, frame, x, y, scale, options = {}) {
      if (!frame || !spriteArt.image) return;
      const crop = options.crop || 0.6;
      const sw = frame.w;
      const sh = Math.max(1, Math.floor(frame.h * crop));
      const pxScale = (options.baseScale || 0.16) * scale;
      const w = sw * pxScale;
      const h = sh * pxScale;
      c.save();
      c.translate(x, y + (options.bob || 0));
      c.rotate(options.rotation || 0);
      if (options.glow) {
        c.shadowColor = options.glow;
        c.shadowBlur = options.glowBlur || 20;
      }
      c.drawImage(spriteArt.image, frame.x, frame.y, sw, sh, -w / 2, -h * 0.15, w, h);
      c.restore();
    }

    function drawAnnieSprite(c, x, y, scale, s) {
      const pose = s.pose || "idle";
      const frames = spriteArt.frames.annie;
      let frame = frames.stand;
      if (pose === "sit") frame = frames.sit;
      else if (pose === "kneel") frame = frames.kneel;
      else if (pose === "walk") frame = frames.walkSide;
      else if (pose === "walkFront") frame = frames.walkFront;
      else if (pose === "cheer") frame = frames.cheer;
      else if (pose === "laugh") frame = frames.laugh;
      else if (pose === "upper") frame = (s.armRaise || 0) > 0.4 ? frames.cheer : frames.stand;
      else if (pose === "sleeping") frame = frames.laugh;
      else if (pose === "happy") frame = frames.cheer;
      else if ((s.blink && pose !== "upper" && pose !== "sit") || (s.armRaise || 0) > 0.7) frame = frames.cheer;
      const bob = -(s.breath || 0) * 2.4 + (pose === "walk" || pose === "walkFront" ? Math.sin(game.time * 8) * 2 : 0);
      const rotation = (s.headTilt || 0) * 0.08 + (s.hairSway || 0) * 0.02;
      if (pose === "upper") {
        drawUpperFrame(c, frame, x, y + 4, scale, {
          baseScale: SPRITE_BASE_SCALE.annie,
          crop: frame === frames.cheer ? 0.58 : 0.62,
          rotation,
          bob,
          glow: s.glow
        });
        return;
      }
      drawFrameImage(c, frame, x, y, scale, {
        baseScale: SPRITE_BASE_SCALE.annie,
        flip: s.facing || 1,
        rotation,
        bob,
        stretchY: 1 + (s.breath || 0) * 0.015,
        glow: s.glow
      });
      if (pose === "sleeping") drawZzz(c, x + 34, y - 150 * scale, 0.9 * scale);
    }

    function drawObiSprite(c, x, y, scale, s) {
      const pose = s.pose || "sit";
      const expression = s.expression || "happy";
      const frames = spriteArt.frames.obi;
      const happyMotion = (s.bounce || 0) > 0.06 || expression === "excited";
      let frame = frames.sitHappy;
      if (pose === "run" || pose === "side") frame = Math.sin(game.time * (happyMotion ? 18 : 12)) > 0 ? frames.run : frames.leap;
      else if (pose === "sleeping") frame = frames.sleep;
      else if (pose === "sniff") frame = frames.sniff;
      else if (pose === "shake") frame = frames.shake;
      else if (expression === "sad") frame = frames.sitSad;
      else if (happyMotion) frame = Math.sin(game.time * 14) > 0 ? frames.leap : frames.sitHappy;
      drawFrameImage(c, frame, x, y, scale, {
        baseScale: SPRITE_BASE_SCALE.obi,
        flip: s.facing || 1,
        bob: -(s.bounce || 0) * 20,
        rotation: (expression === "sad" ? -0.03 * (s.facing || 1) : 0) + (pose === "shake" ? Math.sin(game.time * 24) * 0.06 : 0),
        stretchY: 1 + (s.bounce || 0) * 0.04,
        glow: s.glow
      });
      if (pose === "sleeping") drawZzz(c, x + 30, y - 96 * scale, 0.85 * scale);
    }

    function drawLunaSprite(c, x, y, scale, s) {
      const pose = s.pose || "sit";
      const frames = spriteArt.frames.luna;
      let frame = frames.sit;
      if (pose === "lounge") frame = Math.sin(game.time * 2.4) > 0 ? frames.crouch : frames.paw;
      else if (pose === "sleeping") frame = frames.sleep;
      else if (pose === "groom") frame = frames.groom;
      else if (pose === "bellyUp") frame = frames.bellyUp;
      else if (pose === "topdown") {
        if ((s.pawBat || 0) > 0.12) frame = frames.paw;
        else if ((s.pounceStretch || 0) > 0.35) frame = frames.pounce;
        else frame = frames.crouch;
      } else if ((s.pawBat || 0) > 0.12) frame = frames.paw;
      else if ((s.blink && pose !== "topdown") || (s.pounceStretch || 0) > 0.25) frame = frames.pounce;
      const topdownRot = pose === "topdown" ? clamp(Math.atan2(game.mouse.y - y, game.mouse.x - x) * 0.18, -0.42, 0.42) : 0;
      const bellyRock = pose === "bellyUp" ? Math.sin(game.time * 3) * 0.04 : 0;
      drawFrameImage(c, frame, x, y, scale, {
        baseScale: SPRITE_BASE_SCALE.luna,
        flip: (pose === "topdown" ? (game.mouse.x >= x ? 1 : -1) : (s.facing || 1)),
        bob: -Math.abs(s.wiggle || 0) * 2 - (s.pawBat || 0) * 4 + (pose === "bellyUp" ? Math.sin(game.time * 2) * 2 : 0),
        rotation: topdownRot + (s.earTwitch || 0) * 0.04 + bellyRock,
        stretchX: 1 + (s.pounceStretch || 0) * 0.12,
        stretchY: 1 - (s.pounceStretch || 0) * 0.06,
        glow: s.glow
      });
      if (pose === "sleeping") drawZzz(c, x + 26, y - 90 * scale, 0.82 * scale);
    }

    function drawTreatBackdrop(c) {
      if (!sceneCache.treatBase) buildStaticCaches();
      c.drawImage(sceneCache.treatBase, 0, 0);
      c.save();
      c.globalAlpha = 0.24;
      c.translate((game.time * 12) % 220, 0);

      for (let i = -1; i < 5; i++) {
        c.beginPath();

      }
      c.restore();
    }

    function drawLaserBackdrop(c) {
      if (!sceneCache.laserBase) buildStaticCaches();
      c.drawImage(sceneCache.laserBase, 0, 0);
      drawGlowCircle(c, 702, 100, 86, "rgba(255,236,177,ALPHA)", 0.12);

    function drawAimPreview(c, sx, sy, tx, flight = 0.92) {
      c.save();
      c.fillStyle = "rgba(255,255,255,0.75)";
      for (let i = 0; i < 12; i++) {
        const t = (i + 1) / 13 * flight;
        const px = sx + ((tx - sx) / flight) * t;
        const py = sy + 30 * t + 0.5 * 640 * t * t;
        c.beginPath();
        c.arc(px, py, 3 + i * 0.08, 0, Math.PI * 2);
        c.fill();
      }
      c.restore();
    }

    function normalizeState(state, fallbackPose = "idle") {
      if (!state) return { pose: fallbackPose };
      if (typeof state === "string") return { pose: state };
      return state;
    }

    function drawAnnie(c, x, y, scale, state) {
      const s = normalizeState(state, "idle");
      const pose = s.pose || "idle";
      const breath = s.breath || 0;

        drawAnnieSprite(c, x, y, scale, s);

      c.save();
      c.translate(x, y);
      c.scale(scale, scale);

      const bodyYScale = 1 + breath * 0.04;
      const hairDx = hairSway * 3;
      const bodyTop = upper ? -16 : -8;

      if (!upper) drawShadowEllipse(c, 0, sit ? 78 : 88, sit ? 34 : 28, sit ? 10 : 8, 0.12);

      c.save();
      c.translate(0, headTilt * 4);
      c.fillStyle = "#E8C95A";
      c.beginPath();
      c.moveTo(-34 + hairDx, -36);

      c.quadraticCurveTo(-26 + hairDx, 70, -8 + hairDx, 52);
      c.lineTo(18 + hairDx, 56);
      c.quadraticCurveTo(34 + hairDx, 74, 42 + hairDx, 48);
      c.quadraticCurveTo(48 + hairDx, 6, 34 + hairDx, -34);
      c.quadraticCurveTo(0 + hairDx, -60, -34 + hairDx, -36);
      c.fill();

      c.beginPath();
      c.moveTo(-24 + hairDx, -32);
      c.quadraticCurveTo(-12 + hairDx, -50, 6 + hairDx, -42);
      c.quadraticCurveTo(18 + hairDx, -40, 24 + hairDx, -26);
      c.quadraticCurveTo(8 + hairDx, -22, -4 + hairDx, -10);
      c.quadraticCurveTo(-14 + hairDx, -2, -20 + hairDx, -16);
      c.fill();
      c.restore();

      if (!upper) {
        c.fillStyle = "#1F2F6B";
        if (sit) {
          rr(c, -18, 44, 16, 32, 8);
          c.fill();
          rr(c, 2, 44, 16, 32, 8);
          c.fill();
          c.fillStyle = "#A66B3E";
          rr(c, -24, 66, 20, 18, 7);
          c.fill();
          rr(c, 0, 66, 20, 18, 7);
          c.fill();
        } else {
          rr(c, -18, 32, 14, 44, 6);
          c.fill();
          rr(c, 4, 32, 14, 44, 6);
          c.fill();
          c.fillStyle = "#A66B3E";
          rr(c, -22, 70, 18, 18, 6);
          c.fill();
          rr(c, 4, 70, 18, 18, 6);
          c.fill();
        }
      }

      c.save();
      c.translate(0, upper ? 0 : bodyTop);
      c.scale(1, bodyYScale);
      c.fillStyle = COLORS.warmRed;
      rr(c, -26, 0, 52, upper ? 54 : 54, 22);
      c.fill();
      c.restore();

      c.strokeStyle = "#C98E59";
      c.lineWidth = 5;
      c.lineCap = "round";
      if (!upper) {
        if (sit) {
          c.beginPath();
          c.moveTo(-18, 12);
          c.lineTo(-32, 34);
          c.moveTo(18, 12);
          c.lineTo(30, 32);
          c.stroke();
        } else {
          c.beginPath();
          c.moveTo(-20, 8);
          c.lineTo(-30, 30);
          c.moveTo(20, 8);
          c.lineTo(28, 30);
          c.stroke();
        }
      } else {
        c.beginPath();
        c.moveTo(-20, 6);
        c.lineTo(-28, 26);
        c.moveTo(18, 2);
        c.lineTo(26 + armRaise * 12, -8 - armRaise * 18);
        c.stroke();
      }

      c.save();
      c.translate(0, headTilt * 2);
      c.fillStyle = "#FFDFC4";
      c.beginPath();
      c.arc(0, -30, 28, 0, Math.PI * 2);
      c.fill();

      c.fillStyle = "#F8C7D0";
      c.beginPath();
      c.arc(-16, -22, 4.5, 0, Math.PI * 2);
      c.arc(16, -22, 4.5, 0, Math.PI * 2);
      c.fill();

      c.strokeStyle = "#D7A980";
      c.lineWidth = 2;
      c.lineCap = "round";
      c.beginPath();
      c.moveTo(-12, -40);
      c.quadraticCurveTo(-4, -48, 4, -40);
      c.stroke();

      c.fillStyle = "#3E2723";
      if (blink || sleeping) {
        c.lineWidth = 2.8;
        c.beginPath();
        c.moveTo(-12, -30);
        c.lineTo(-3, -30);
        c.moveTo(3, -30);
        c.lineTo(12, -30);
        c.stroke();
      } else {
        c.beginPath();
        c.arc(-8, -30, 4.5, 0, Math.PI * 2);
        c.arc(8, -30, 4.5, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = "#fff";
        c.beginPath();
        c.arc(-6.8, -31.3, 1.2, 0, Math.PI * 2);
        c.arc(9.2, -31.3, 1.2, 0, Math.PI * 2);
        c.fill();

      c.lineWidth = 2.6;
      c.beginPath();

        c.quadraticCurveTo(0, -8, 6, -12);

      }
      c.stroke();
      c.restore();
      c.restore();
    }

    function drawObi(c, x, y, scale, state) {

    function drawTitleBg(c) {
      if (!sceneCache.titleBase) buildStaticCaches();
      c.drawImage(sceneCache.titleBase, 0, 0);

      /* layered bokeh lights - slow parallax */
      c.save();
      for (let layer = 0; layer < 3; layer++) {
        const speed = 0.08 + layer * 0.06;
        const baseSize = 30 + layer * 20;
        const alpha = 0.05 - layer * 0.012;
        for (let i = 0; i < 5; i++) {
          const bx = ((game.time * speed * 40 + i * 170 + layer * 90) % (W + 100)) - 50;
          const by = 80 + i * 100 + layer * 30 + Math.sin(game.time * 0.4 + i * 1.5 + layer) * 25;
          const bs = baseSize + Math.sin(game.time * 0.6 + i * 2) * 8;
          const bg = c.createRadialGradient(bx, by, 0, bx, by, bs);
          bg.addColorStop(0, `rgba(255,220,160,${alpha + 0.02})`);
          bg.addColorStop(0.5, `rgba(255,200,140,${alpha})`);
          bg.addColorStop(1, "rgba(255,200,140,0)");
          c.fillStyle = bg;
          c.beginPath();
          c.arc(bx, by, bs, 0, Math.PI * 2);
          c.fill();
        }
      }
      c.restore();

      /* floating hearts and stars */
      for (const a of game.ambient) {
        c.save();
        c.globalAlpha = 0.28 + 0.14 * Math.sin(game.time * 1.2 + a.phase);
        c.translate(0, Math.sin(game.time * 0.8 + a.phase) * 2);
        if (a.shape === "heart") drawHeart(c, a.x, a.y, a.size / 14, a.color);
        else drawStar(c, a.x, a.y, a.size, a.color);
        c.restore();
      }

      /* warm spotlight behind character area */
      const spotG = c.createRadialGradient(400, 400, 40, 400, 400, 240);
      spotG.addColorStop(0, "rgba(255,240,210,0.12)");
      spotG.addColorStop(0.6, "rgba(255,230,200,0.05)");
      spotG.addColorStop(1, "rgba(255,230,200,0)");
      c.fillStyle = spotG;
      c.fillRect(100, 200, 600, 350);
    }

    function drawLivingRoom(c, mode = "hub") {
      if (!sceneCache.livingRoomBase) buildStaticCaches();
      c.drawImage(sceneCache.livingRoomBase, 0, 0);

      /* animated window sky + clouds (drawn over static window area) */
      c.save();
      c.beginPath();
      rr(c, 66, 52, 120, 152, 5);
      c.clip();
      /* sky gradient that shifts with time */
      const skyShift = Math.sin(game.time * 0.05) * 0.08;
      const skyG = c.createLinearGradient(66, 52, 66, 204);
      skyG.addColorStop(0, `rgba(${135 + skyShift * 40},${206 + skyShift * 20},${235},1)`);
      skyG.addColorStop(1, `rgba(${200 + skyShift * 30},${230 + skyShift * 10},255,1)`);
      c.fillStyle = skyG;
      c.fillRect(66, 52, 120, 152);
      /* drifting clouds */
      c.fillStyle = "rgba(255,255,255,0.7)";
      for (let i = 0; i < 3; i++) {
        const cx = 66 + ((game.time * (6 + i * 2) + i * 55) % 160) - 20;
        const cy = 68 + i * 40 + Math.sin(game.time * 0.3 + i * 2) * 4;
        c.beginPath();
        c.ellipse(cx, cy, 18 + i * 4, 8 + i * 2, 0, 0, Math.PI * 2);
        c.fill();
        c.beginPath();
        c.ellipse(cx + 12, cy + 2, 12 + i * 2, 6 + i, 0, 0, Math.PI * 2);
        c.fill();
      }
      c.restore();

      /* warm light rays from window */
      c.save();
      c.globalAlpha = 0.04 + 0.015 * Math.sin(game.time * 0.8);
      c.fillStyle = "rgba(255,240,180,1)";
      c.beginPath();
      c.moveTo(66, 52);
      c.lineTo(190, 52);
      c.lineTo(380, 480);
      c.lineTo(120, 480);
      c.closePath();
      c.fill();
      /* secondary softer ray */
      c.globalAlpha = 0.025 + 0.01 * Math.sin(game.time * 0.6 + 1);
      c.beginPath();
      c.moveTo(100, 80);
      c.lineTo(170, 80);
      c.lineTo(320, 470);
      c.lineTo(200, 470);
      c.closePath();
      c.fill();
      c.restore();

      /* animated lamp glow - flickers slightly */
      const lampFlicker = 0.08 + 0.025 * Math.sin(game.time * 1.2) + 0.01 * Math.sin(game.time * 4.7) + 0.005 * Math.sin(game.time * 11.3);
      drawGlowCircle(c, 126, 146, 96, "rgba(255,232,160,ALPHA)", lampFlicker);
      drawGlowCircle(c, 126, 160, 50, "rgba(255,220,140,ALPHA)", lampFlicker * 0.6);

      /* steam from mug on side table */
      c.save();
      c.globalAlpha = 0.18;
      for (let i = 0; i < 3; i++) {
        const st = (game.time * 0.6 + i * 1.2) % 3.6;
        const sy = 314 - st * 14;
        const sx = 246 + Math.sin(game.time * 1.5 + i * 2.1) * 4;
        const sa = clamp(1 - st / 3.6, 0, 1) * (st > 0.2 ? 1 : st / 0.2);
        c.globalAlpha = sa * 0.15;
        c.fillStyle = "rgba(255,255,255,0.9)";
        c.beginPath();
        c.ellipse(sx, sy, 3 + st * 1.5, 2 + st, 0, 0, Math.PI * 2);
        c.fill();
      }
      c.restore();

      /* dust motes floating in light rays */
      if (mode === "hub") {
        c.save();
        for (let i = 0; i < 8; i++) {
          const mt = (game.time * 0.15 + i * 1.7) % 6;
          const mx = 100 + i * 30 + Math.sin(game.time * 0.3 + i * 0.9) * 20;
          const my = 120 + mt * 60 + Math.sin(game.time * 0.5 + i * 1.3) * 8;
          if (my > 460) continue;
          /* only show motes in the light ray area */
          const inRay = mx > 80 && mx < 340 && my > 80;
          if (!inRay) continue;
          const mAlpha = 0.25 + 0.15 * Math.sin(game.time * 2 + i * 0.7);
          c.globalAlpha = mAlpha * clamp(1 - (my - 380) / 80, 0.2, 1);
          c.fillStyle = "#FFF8E0";
          c.beginPath();
          c.arc(mx, my, 1.5 + Math.sin(game.time + i) * 0.5, 0, Math.PI * 2);

        c.strokeStyle = "rgba(180,160,110,0.55)";

        c.fillStyle = "#5EAA56";
        c.beginPath(); c.ellipse(-5, -14, 11, 11, -0.3, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#6CBC64";
        c.beginPath(); c.ellipse(5, -12, 9, 9, 0.2, 0, Math.PI * 2); c.fill();
        /* flowers */

        c.beginPath(); c.arc(4, -20, 4.5, 0, Math.PI * 2); c.fill();

        c.strokeStyle = "rgba(160,100,100,0.2)";
        c.lineWidth = 1;
        c.beginPath(); c.ellipse(0, 0, 38, 16, 0, 0, Math.PI * 2); c.stroke();
        c.restore();
      }
      const rugColors = ["rgba(216,194,168,1)", "rgba(168,198,148,1)", "rgba(185,170,210,1)", "rgba(210,175,168,1)"];
      if (d.rugColor > 0) {
        c.save();
        c.globalAlpha = 0.22;
        c.fillStyle = rugColors[d.rugColor];
        c.beginPath(); c.ellipse(400, 470, 220, 55, 0, 0, Math.PI * 2); c.fill();
        /* rug texture highlight */
        c.globalAlpha = 0.06;
        c.fillStyle = "#FFFFFF";
        c.beginPath(); c.ellipse(400, 465, 180, 40, 0, 0, Math.PI * 2); c.fill();
        c.restore();
      }

      if (mode === "cuddle") {
        drawGlowCircle(c, 398, 310, 170, "rgba(255,255,255,ALPHA)", 0.08);
      }
    }

    class TitleScene extends BaseScene {
      constructor() {
        super("title");
        this.startButton = { x: W / 2 - 140, y: 500, w: 280, h: 56 };
        this.hoverStart = false;
        /* live character state */
        this.annie = { x: 400, y: 380, state: "idle", timer: rand(3, 6), facing: 1 };
        this.obi   = { x: 240, y: 440, state: "wander", timer: rand(1, 3), vx: 0, facing: 1, targetX: 240 };
        this.luna  = { x: 560, y: 420, state: "sit", timer: rand(2, 5), vx: 0, facing: -1, targetX: 560 };
        this.interaction = null;  /* { type, timer } */
        this.subtitleIndex = Math.floor(Math.random() * TITLE_SUBTITLES.length);
        this.subtitleTimer = 6;
      }
      enter() {
        this.annie.timer = rand(2, 4);
        this.obi.timer = rand(1, 3);
        this.luna.timer = rand(2, 4);
      }
      pickAnnieState() {
        const r = Math.random();
        if (r < 0.25) return { state: "idle", timer: rand(3, 6) };
        if (r < 0.45) return { state: "cheer", timer: rand(1.5, 2.5) };
        if (r < 0.6) return { state: "laugh", timer: rand(2, 3.5) };
        if (r < 0.78) return { state: "kneel", timer: rand(2, 3.5) };
        return { state: "walk", timer: rand(2.5, 4), targetX: 400 + rand(-100, 100) };
      }
      pickObiState() {
        const r = Math.random();
        if (r < 0.25) {
          const tx = rand(100, 700);
          return { state: "wander", timer: rand(2, 4), targetX: tx, facing: tx > this.obi.x ? 1 : -1 };
        }
        if (r < 0.42) return { state: "sit", timer: rand(2, 5) };
        if (r < 0.55) return { state: "sniff", timer: rand(2, 3.5), targetX: this.obi.x + rand(-60, 60), facing: Math.random() < 0.5 ? 1 : -1 };
        if (r < 0.66) return { state: "nap", timer: rand(3, 5) };
        if (r < 0.8) return { state: "sniffLuna", timer: rand(2.5, 4), targetX: this.luna.x - 40, facing: 1 };
        /* run toward Annie */
        return { state: "approach", timer: rand(1.5, 2.5), targetX: this.annie.x - 50, facing: 1 };
      }
      pickLunaState() {
        const r = Math.random();
        if (r < 0.2) return { state: "sit", timer: rand(2, 5) };
        if (r < 0.38) {
          const tx = rand(100, 700);
          return { state: "wander", timer: rand(2, 3.5), targetX: tx, facing: tx > this.luna.x ? 1 : -1 };
        }
        if (r < 0.5) return { state: "groom", timer: rand(2.5, 4) };
        if (r < 0.62) return { state: "nap", timer: rand(3, 5) };
        if (r < 0.74) return { state: "bellyUp", timer: rand(2, 4) };
        if (r < 0.86) return { state: "batObi", timer: rand(2, 3.5), targetX: this.obi.x + 35, facing: -1 };
        /* pounce at something */
        return { state: "pounce", timer: rand(0.6, 1.2), targetX: this.luna.x + (Math.random() < 0.5 ? -80 : 80) };
      }
      update(dt) {
        super.update(dt);
        this.hoverStart = pointInRect(game.mouse.x, game.mouse.y, this.startButton) && spriteArt.ready;
        this.subtitleTimer -= dt;
        if (this.subtitleTimer <= 0) {
          this.subtitleIndex = (this.subtitleIndex + 1) % TITLE_SUBTITLES.length;
          this.subtitleTimer = 6;
        }
        const a = this.annie, o = this.obi, l = this.luna;

        /* Annie */
        a.timer -= dt;
        if (a.state === "walk" && a.targetX !== undefined) {
          const dir = Math.sign(a.targetX - a.x);
          a.x += dir * 50 * dt;
          a.facing = dir || a.facing;
          if (Math.abs(a.x - a.targetX) < 8) { a.x = a.targetX; a.state = "idle"; a.timer = rand(2, 4); }
        }
        a.x = clamp(a.x || 400, 200, 600);
        if (a.timer <= 0) Object.assign(a, this.pickAnnieState());

        /* Obi */
        o.timer -= dt;
        if (o.state === "wander" || o.state === "approach" || o.state === "sniff" || o.state === "sniffLuna") {
          const speed = o.state === "approach" ? 110 : o.state === "sniff" ? 30 : o.state === "sniffLuna" ? 70 : 60;
          if (o.state === "sniffLuna") o.targetX = l.x - 40;
          const dir = Math.sign(o.targetX - o.x);
          o.x += dir * speed * dt;
          o.facing = dir || o.facing;
          if (Math.abs(o.x - o.targetX) < 8) {
            if (o.state === "sniffLuna") { o.x = o.targetX; o.state = "sniffLunaIdle"; o.timer = rand(1.5, 2.5); }
            else { o.x = o.targetX; o.state = "sit"; o.timer = rand(1, 3); }
          }
        }
        if (o.timer <= 0) Object.assign(o, this.pickObiState());
        o.x = clamp(o.x, 80, 720);

        /* Luna */
        l.timer -= dt;
        if (l.state === "wander" || l.state === "batObi") {
          const speed = l.state === "batObi" ? 55 : 45;
          if (l.state === "batObi") l.targetX = o.x + 35;
          const dir = Math.sign(l.targetX - l.x);
          l.x += dir * speed * dt;
          l.facing = dir || l.facing;
          if (Math.abs(l.x - l.targetX) < 8) {
            if (l.state === "batObi") { l.x = l.targetX; l.state = "batObiIdle"; l.timer = rand(1, 2); }
            else { l.x = l.targetX; l.state = "sit"; l.timer = rand(1.5, 3); }
          }
        } else if (l.state === "pounce") {
          const dir = Math.sign(l.targetX - l.x);
          l.x += dir * 200 * dt;
          l.facing = dir || l.facing;
        }
        if (l.timer <= 0) Object.assign(l, this.pickLunaState());
        l.x = clamp(l.x, 80, 720);

        /* interaction sparkles */
        if (o.state === "approach" && Math.abs(o.x - a.x) < 60) {
          if (Math.random() < dt * 3) spawnParticleBurst(o.x, o.y - 30, [COLORS.softPink], 1, ["heart"]);
        }
        if (l.state === "pounce" && l.timer < 0.3) {
          if (Math.random() < dt * 4) spawnParticleBurst(l.x, l.y - 20, [COLORS.gold], 1, ["star"]);
        }
        /* Obi sniffing Luna */
        if (o.state === "sniffLunaIdle" && Math.abs(o.x - l.x) < 60) {
          if (Math.random() < dt * 2.5) spawnParticleBurst((o.x + l.x) / 2, Math.min(o.y, l.y) - 30, [COLORS.softPink, COLORS.gold], 1, ["heart"]);
        }
        /* Luna batting at Obi */
        if (l.state === "batObiIdle" && Math.abs(l.x - o.x) < 60) {
          if (Math.random() < dt * 3) spawnParticleBurst((o.x + l.x) / 2, Math.min(o.y, l.y) - 25, [COLORS.gold, "#FFF4C0"], 2, ["star"]);
        }
      }
      onMouseMove(x, y) {
        this.hoverStart = pointInRect(x, y, this.startButton) && spriteArt.ready;
      }
      interactiveAt(x, y) {
        return spriteArt.ready && pointInRect(x, y, this.startButton);
      }
      onClick(x, y) {
        if (spriteArt.ready && pointInRect(x, y, this.startButton)) {
          audio.menu();
          transitionTo(new HangoutScene());
        }
      }
      draw(c) {
        drawTitleBg(c);
        drawGlowCircle(c, 400, 340, 220, "rgba(255,255,255,ALPHA)", 0.10);

        const a = this.annie, o = this.obi, l = this.luna;

        /* draw characters sorted by Y for natural overlap */
        const chars = [
          { type: "obi", y: o.y },
          { type: "annie", y: a.y },
          { type: "luna", y: l.y }
        ].sort((a, b) => a.y - b.y);

        for (const ch of chars) {
          if (ch.type === "obi") {
            const isMoving = o.state === "wander" || o.state === "approach" || o.state === "sniffLuna";
            const pose = o.state === "nap" ? "sleeping" : (o.state === "sniff" || o.state === "sniffLuna" || o.state === "sniffLunaIdle") ? "sniff" : isMoving ? "run" : "sit";
            drawObi(c, o.x, o.y, 1.20, {
              pose,
              expression: o.state === "approach" ? "excited" : "happy",
              tail: Math.sin(game.time * (isMoving ? 10 : o.state === "sniffLunaIdle" ? 12 : 6)) * 0.9,
              bounce: isMoving ? 0.08 * Math.sin(game.time * 12) : 0.04 * Math.sin(game.time * 3),
              facing: o.facing
            });
          } else if (ch.type === "annie") {
            let pose = "idle";
            if (a.state === "cheer") pose = "cheer";
            else if (a.state === "laugh") pose = "laugh";
            else if (a.state === "kneel") pose = "kneel";
            else if (a.state === "walk") pose = "walk";
            drawAnnie(c, a.x, a.y, 1.50, {
              pose,
              breath: Math.sin(game.time * 2.1),
              blink: blinkSignal(game.time, 0.6),
              hairSway: Math.sin(game.time * 1.35),
              facing: a.facing || 1
            });
          } else {
            const isPounce = l.state === "pounce";
            const isMoving = l.state === "wander" || l.state === "batObi";
            let lunaPose = "sit";
            if (isPounce) lunaPose = "pounce";
            else if (isMoving) lunaPose = "topdown";
            else if (l.state === "groom") lunaPose = "groom";
            else if (l.state === "nap") lunaPose = "sleeping";
            else if (l.state === "bellyUp") lunaPose = "bellyUp";
            else if (l.state === "batObi" || l.state === "batObiIdle") lunaPose = "pounce";
            drawLuna(c, l.x, l.y, 1.16, {
              pose: lunaPose,
              tail: Math.sin(game.time * (isPounce ? 8 : l.state === "batObiIdle" ? 6 : 1.6)),
              earTwitch: earSignal(game.time),
              blink: blinkSignal(game.time + 1.4, 0.42),
              pounceStretch: isPounce ? 0.9 : (l.state === "batObiIdle" ? 0.4 : 0),
              pawBat: l.state === "batObiIdle" ? (0.5 + Math.sin(game.time * 6) * 0.5) : 0,
              wiggle: isPounce ? game.time * 3 % 1 : 0,
              facing: l.facing
            });
          }
        }

        /* title text with glow and layered shadow */
        c.save();
        c.textAlign = "center";
        /* warm glow behind title */
        drawGlowCircle(c, W / 2, 88, 200, "rgba(255,240,210,ALPHA)", 0.1);
        /* deep shadow */
        c.fillStyle = "rgba(92,58,32,0.2)";
        c.font = '50px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("Annie's Cozy Day", W / 2 + 3, 96);
        /* light outline */
        c.strokeStyle = "rgba(255,248,240,0.5)";
        c.lineWidth = 6;
        c.font = '50px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.strokeText("Annie's Cozy Day", W / 2, 92);
        /* main title */
        c.fillStyle = "#7A4E36";
        c.fillText("Annie's Cozy Day", W / 2, 92);
        /* subtitle with softer style */
        c.fillStyle = "rgba(122,78,54,0.7)";
        c.font = '23px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("A Cozy Minigame Collection", W / 2, 128);
        c.restore();

        const pulse = 1 + 0.06 * Math.sin(game.time * 3);
        c.save();
        c.translate(W / 2, 528);
        c.scale(pulse, pulse);
        const loadDots = ".".repeat(Math.floor(game.time * 2) % 4);
        drawButton(c, { x: -140, y: -28, w: 280, h: 56 }, spriteArt.ready ? (isMobile ? "Tap to Start" : "Click to Start") : "Loading Cozy Art" + loadDots, this.hoverStart, "#B84B3A");
        c.restore();

        c.save();
        const subFade = Math.min(clamp(this.subtitleTimer / 0.8, 0, 1), clamp((6 - this.subtitleTimer) / 0.8, 0, 1));
        c.globalAlpha = subFade * 0.85;
        c.fillStyle = "#7A4E36";
        c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "center";
        c.fillText(TITLE_SUBTITLES[this.subtitleIndex], W / 2, 574);
        c.restore();
      }
    }

          else if (this.obi.sniffing) pose = "sniff";
          else if (this.toy && this.toy.pet === "obi") pose = "run";
          /* idle breathing bob */
          const obiBreathe = pose === "sit" ? Math.sin(game.time * 2.2) * 0.012 : 0;
          /* tail wags continuously with varying speed based on mood */
          const tailSpeed = this.obi.happyTimer > 0.1 ? 10 : (this.obi.joy > 65 ? 7 : this.obi.joy > 40 ? 5 : 3);
          const tailAmp = this.obi.sleepy ? 0.2 : (this.obi.joy > 65 ? 1.0 : 0.6);
          /* occasional head tilt fidget */
          const obiHeadBob = pose === "sit" ? Math.sin(game.time * 0.7) * 0.015 : 0;
          return {
            pose,
            expression: this.obi.sleepy ? "sad" : (this.obi.happyTimer > 0.1 || this.obi.petTimer > 0.08) ? "excited" : "happy",
            tail: Math.sin(game.time * tailSpeed) * tailAmp,
            bounce: this.obi.bounce + (this.obi.petTimer > 0 ? 0.04 : 0) + obiBreathe,
            facing: this.obi.facing,
            glow: this.hoverKey === "obi" ? "rgba(255,215,0,0.30)" : null
          };
        }
        /* Luna idle micro-animations */
        const lunaPose = this.luna.bellyUp ? "bellyUp" : this.luna.grooming ? "groom" : this.luna.onTower ? "lounge" : "sit";
        const lunaBreathe = (lunaPose === "sit" || lunaPose === "lounge") ? Math.sin(game.time * 1.8 + 0.5) * 0.01 : 0;
        /* tail sways with more organic motion (two overlapping sine waves) */
        const lunaTail = Math.sin(game.time * 1.7 + 1.2) * 0.7 + Math.sin(game.time * 2.9 + 0.4) * 0.3;
        /* periodic ear flick */
        const earBase = earSignal(game.time + 0.8);
        const earMicro = Math.sin(game.time * 0.6) > 0.92 ? 0.3 : 0;
        return {
          pose: lunaPose,
          tail: lunaTail,
          earTwitch: earBase + earMicro,

      }
      joyTier(joy) { return joy >= 85 ? 3 : joy >= 65 ? 2 : joy >= 40 ? 1 : 0; }
      checkJoyMilestone(key) {
        const pet = key === "obi" ? this.obi : this.luna;
        const tier = this.joyTier(pet.joy);
        const prev = key === "obi" ? this.obiMilestone : this.lunaMilestone;
        if (tier > prev) {
          if (key === "obi") this.obiMilestone = tier;
          else this.lunaMilestone = tier;
          const px = key === "obi" ? this.obi.x : this.luna.x;
          const py = key === "obi" ? this.obi.y - 40 : (this.luna.onTower ? this.luna.perchY - 40 : this.luna.y - 40);
          const msgs = key === "obi"
            ? ["Obi perks up!", "Obi is wagging hard!", "Obi is thrilled!"]
            : ["Luna is warming up!", "Luna is curious!", "Luna is purring!"];
          this.addFloatingText(msgs[tier - 1], px, py, COLORS.gold);
          spawnParticleBurst(px, py, [COLORS.gold, COLORS.softPink], tier >= 3 ? 14 : 8, ["star", "heart"]);
          if (tier >= 3) screenShake(3.5, 0.25);
          audio.tinyChime();
        }
      }
      addFloatingText(text, x, y, color = "#7A4E36") {
        this.floatingTexts.push({ text, x, y, life: 1.5, color });
      }
      checkBubbleReward(key, source) {
        const bubble = key === "obi" ? this.obiBubble : this.lunaBubble;
        if (!bubble) return;
        const match = (bubble.want === "pet" && source === "pet") ||
                      (bubble.want === "treat" && source === "treat") ||
                      (bubble.want === "toy" && source === "toy") ||
                      (bubble.want === "brush" && source === "brush");
        if (match) {
          const pet = key === "obi" ? this.obi : this.luna;
          pet.joy = clamp(pet.joy + 8, 0, 100);
          this.sessionJoy += 8;
          const px = key === "obi" ? this.obi.x : this.luna.x;
          const py = key === "obi" ? this.obi.y - 50 : (this.luna.onTower ? this.luna.perchY - 50 : this.luna.y - 50);
          spawnParticleBurst(px, py, [COLORS.gold, "#FFF4C0"], 10, ["star"]);
          this.statusText = this.petName(key) + " got exactly what they wanted!";
          this.statusPulse = 1;
          audio.combo();
          screenShake(3, 0.2);
          this.addFloatingText("Got it!", px, py, COLORS.gold);
          if (key === "obi") this.obiBubble = null;
          else this.lunaBubble = null;
        }
      }
      drawPetCard(c, x, y, title, joy, accent, body) {
        c.save();
        rr(c, x, y, 208, 74, 18);
        c.fillStyle = "rgba(255,255,255,0.78)";
        c.fill();
        c.strokeStyle = "rgba(146,104,72,0.18)";
        c.lineWidth = 2;
        c.stroke();
        c.fillStyle = "#7A4E36";
        c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "left";
        c.fillText(title, x + 16, y + 24);
        c.font = '12px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillStyle = "rgba(122,78,54,0.78)";
        c.fillText(body, x + 16, y + 42);
        rr(c, x + 16, y + 50, 176, 10, 8);
        c.fillStyle = "rgba(122,78,54,0.14)";
        c.fill();
        rr(c, x + 16, y + 50, 176 * clamp(joy / 100, 0, 1), 10, 8);
        c.fillStyle = accent;
        c.fill();
        c.restore();
      }
      drawTreat(c, t) {
        c.save();
        c.translate(t.x, t.y);
        c.rotate(Math.sin(game.time * 8 + t.x * 0.01) * 0.16);
        drawBone(c, 0, 0, 20, 12, t.pet === "obi" ? "#D49A4A" : "#FFD08A");
        c.restore();
      }
      drawToy(c) {
        if (!this.toy) return;
        c.save();
        if (this.toy.type === "ball") {
          c.fillStyle = "#4A90D9";
          c.beginPath();
          c.arc(this.toy.x, this.toy.y, 13, 0, Math.PI * 2);
          c.fill();
          c.strokeStyle = "rgba(255,255,255,0.65)";
          c.lineWidth = 2;
          c.beginPath();
          c.arc(this.toy.x - 4, this.toy.y - 3, 4, 0, Math.PI * 2);
          c.stroke();
        } else {
          /* yarn ball */
          const yarnFrame = spriteArt.frames.items ? spriteArt.frames.items.yarnBall : null;
          if (yarnFrame && spriteArt.image) {
            const ys = 0.14;
            const yw = yarnFrame.w * ys;
            const yh = yarnFrame.h * ys;
            c.save();
            c.translate(this.toy.x, this.toy.y);
            c.rotate(Math.sin(game.time * 4) * 0.15);
            c.drawImage(spriteArt.image, yarnFrame.x, yarnFrame.y, yarnFrame.w, yarnFrame.h, -yw/2, -yh/2, yw, yh);
            c.restore();
          } else {
            drawGlowCircle(c, this.toy.x, this.toy.y, 18, "rgba(255,150,150,ALPHA)", 0.22);
            c.fillStyle = "#E88";
            c.beginPath();
            c.arc(this.toy.x, this.toy.y, 12, 0, Math.PI * 2);
            c.fill();
          }
          drawGlowCircle(c, this.toy.x, this.toy.y, 22, "rgba(255,180,180,ALPHA)", 0.15);
        }
        c.restore();
      }
      drawThoughtBubble(c, x, y, bubble) {
        const bob = Math.sin(game.time * 2.2) * 4;
        const fadeIn = clamp(bubble.age / 0.4, 0, 1);
        const fadeOut = clamp(bubble.timer / 1.2, 0, 1);
        const alpha = Math.min(fadeIn, fadeOut);
        const pulse = 1 + Math.sin(game.time * 3.5) * 0.06;
        c.save();
        c.globalAlpha = alpha;
        c.translate(x, y + bob);
        c.scale(pulse, pulse);

        /* outer glow */
        drawGlowCircle(c, 0, 0, 38, "rgba(255,240,200,ALPHA)", 0.12);

        /* main cloud - multi-circle for fluffy look */
        c.fillStyle = "rgba(255,255,255,0.96)";
        c.strokeStyle = "rgba(146,104,72,0.25)";
        c.lineWidth = 1.5;
        c.beginPath();
        c.ellipse(0, -2, 28, 22, 0, 0, Math.PI * 2);
        c.fill(); c.stroke();
        c.beginPath();
        c.ellipse(-14, 2, 16, 14, 0, 0, Math.PI * 2);
        c.fill();
        c.beginPath();
        c.ellipse(14, 2, 16, 14, 0, 0, Math.PI * 2);
        c.fill();

        /* connecting trail dots */
        c.fillStyle = "rgba(255,255,255,0.9)";
        c.strokeStyle = "rgba(146,104,72,0.2)";
        c.beginPath(); c.arc(-6, 22, 6, 0, Math.PI * 2); c.fill(); c.stroke();
        c.beginPath(); c.arc(-12, 30, 3.5, 0, Math.PI * 2); c.fill(); c.stroke();

        if (bubble.want === "pet") {

        } else if (bubble.want === "treat") {
          drawBone(c, 0, -4, 20, 10, "#D49A4A");
        } else if (bubble.want === "toy") {
          drawStar(c, 0, -4, 12, COLORS.gold);
        } else if (bubble.want === "brush") {
          c.fillStyle = "#E0A0C0";
          c.textAlign = "center";
          c.font = '20px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("\u2726", 0, 3);
        }

        const labels = { pet: "Pets!", treat: "Treat!", toy: "Play!", brush: "Brush!" };

        c.textAlign = "center";
        c.font = '11px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(labels[bubble.want], 0, 12);
        c.restore();

      draw(c) {

            c.fillStyle = "rgba(232,168,76,0.04)";
            c.fillRect(0, 0, W, H);
            c.restore();
          } else if (this.mode === "toy") {
            c.save();
            c.fillStyle = "rgba(74,144,217,0.03)";
            c.fillRect(0, 0, W, H);
            c.restore();
          } else if (this.mode === "brush") {
            c.save();
            c.fillStyle = "rgba(224,160,192,0.04)";
            c.fillRect(0, 0, W, H);
            c.restore();
          }
        }

        /* buttons row */
        drawButton(c, this.gamesButton, "Games", this.hoverKey === "games", "#A86D3F");

        for (const btn of this.modeButtons) {
          const active = this.mode === btn.key;
          drawButton(c, btn, btn.label, this.hoverKey === btn.key || active, active ? "#B84B3A" : "#C7A37B");
        }

        /* star counter */
        c.save();
        c.fillStyle = "rgba(255,248,240,0.65)";
        rr(c, 527, 57, 68, 22, 11);
        c.fill();
        c.fillStyle = COLORS.gold;
        c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';

        c.save();

        c.fillStyle = "rgba(255,255,255,0.78)";
        c.fill();
        c.strokeStyle = "rgba(146,104,72,0.12)";

        c.stroke();
        c.fillStyle = "#5A3E2B";
        c.textAlign = "left";
        c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("Obi: " + this.petMood("obi"), 24, 78);
        rr(c, 24, 84, 120, 12, 6);
        c.fillStyle = "rgba(0,0,0,0.08)";
        c.fill();
        const obiBarW = 120 * clamp(this.obi.joy / 100, 0, 1);
        if (obiBarW > 1) {
          rr(c, 24, 84, obiBarW, 12, 6);
          c.fillStyle = "#4A90D9";
          c.fill();
          /* bar shine */
          c.fillStyle = "rgba(255,255,255,0.25)";
          rr(c, 24, 84, obiBarW, 5, 6);
          c.fill();
        }
        c.restore();

        c.save();
        rr(c, 646, 62, 140, 42, 12);
        c.fillStyle = "rgba(255,255,255,0.78)";
        c.fill();
        c.strokeStyle = "rgba(146,104,72,0.12)";
        c.lineWidth = 1;
        c.stroke();
        c.fillStyle = "#5A3E2B";
        c.textAlign = "left";
        c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("Luna: " + this.petMood("luna"), 656, 78);
        rr(c, 656, 84, 120, 12, 6);
        c.fillStyle = "rgba(0,0,0,0.08)";
        c.fill();
        const lunaBarW = 120 * clamp(this.luna.joy / 100, 0, 1);
        if (lunaBarW > 1) {
          rr(c, 656, 84, lunaBarW, 12, 6);
          c.fillStyle = "#A8C686";
          c.fill();
          c.fillStyle = "rgba(255,255,255,0.25)";
          rr(c, 656, 84, lunaBarW, 5, 6);
          c.fill();
        }
        c.restore();

        /* warm scene glow */
        drawGlowCircle(c, 400, 380, 200, "rgba(255,240,210,ALPHA)", 0.06);
        /* dynamic character shadows - light source from window (~126, 130) */
        const lightX = 126, lightY = 130;
        const drawDynShadow = (cx, cy, baseW, baseH) => {
          const dx = (cx - lightX) * 0.12;
          const stretch = 1 + Math.abs(cx - lightX) * 0.001;
          const shadowAlpha = clamp(0.18 - Math.abs(cx - lightX) * 0.0003, 0.06, 0.18);
          c.save();
          const sg = c.createRadialGradient(cx + dx, cy, 0, cx + dx, cy, baseW * stretch * 1.2);
          sg.addColorStop(0, `rgba(80,55,35,${shadowAlpha})`);
          sg.addColorStop(1, "rgba(80,55,35,0)");
          c.fillStyle = sg;
          c.beginPath();
          c.ellipse(cx + dx, cy, baseW * stretch, baseH, 0, 0, Math.PI * 2);
          c.fill();
          c.restore();
        };
        drawDynShadow(this.annie.x, Math.max(this.annie.y + 120, 458), 44, 14);
        drawDynShadow(this.obi.x, 466, 42, 14);
        const lunaY = this.luna.onTower ? 280 : 462;
        drawDynShadow(this.luna.x, lunaY + 8, 38, 12);

        /* treat mode side indicators */
        if (this.mode === "treat" && !this.menuOpen && !this.decorOpen && !this.dedication) {
          c.save();
          c.globalAlpha = 0.45;
          c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.fillStyle = "#4A90D9";
          c.fillText("\u2190 Obi's side", 200, 520);
          c.fillStyle = "#A8C686";
          c.fillText("Luna's side \u2192", 600, 520);
          /* subtle center divider */
          c.strokeStyle = "rgba(122,78,54,0.2)";
          c.setLineDash([4, 6]);
          c.beginPath();
          c.moveTo(400, 110);
          c.lineTo(400, 530);
          c.stroke();
          c.setLineDash([]);
          c.restore();
        }

        drawAnnie(c, this.annie.x, this.annie.y, 1.34, {
          pose: this.annie.pose,
          breath: Math.sin(game.time * 2),
          blink: blinkSignal(game.time + 0.25, 0.55),
          hairSway: Math.sin(game.time * 1.2),
          headTilt: this.annie.pose === "walk" ? 0 : 0.1 * Math.sin(game.time * 0.8),
          facing: this.annie.facing
        });

        drawObi(c, this.obi.x, this.obi.y, 1.12, this.petSpriteState("obi"));
        drawLuna(c, this.luna.x, this.luna.onTower ? this.luna.perchY : this.luna.y, this.luna.onTower ? 1.06 : 0.98, this.petSpriteState("luna"));

        /* thought bubbles */
        if (this.obiBubble) this.drawThoughtBubble(c, this.obi.x + 32, this.obi.y - 92, this.obiBubble);
        if (this.lunaBubble) {
          const ly = this.luna.onTower ? this.luna.perchY : this.luna.y;
          this.drawThoughtBubble(c, this.luna.x + 30, ly - 88, this.lunaBubble);

        for (const t of this.treats) this.drawTreat(c, t);
        this.drawToy(c);

        /* stroke trail */
        if (this.strokeTrail.length > 0 && (this.mode === "pet" || this.mode === "brush")) {
          for (const pt of this.strokeTrail) {
            c.save();
            c.globalAlpha = clamp(pt.life / 0.35, 0, 1) * 0.35;
            const color = this.mode === "brush" ? COLORS.gold : COLORS.softPink;
            c.fillStyle = color;
            c.beginPath();
            c.arc(pt.x, pt.y, 6, 0, Math.PI * 2);
            c.fill();
            c.restore();
          }
        }

        /* brush cursor sprite (Update 5) */
        if (this.mode === "brush" && !this.menuOpen && !this.decorOpen && !this.dedication) {
          drawGlowCircle(c, game.mouse.x, game.mouse.y, 28, "rgba(255,220,140,ALPHA)", 0.12);
          const brushFrame = spriteArt.frames.items ? spriteArt.frames.items.brush : null;
          if (brushFrame && spriteArt.image) {

            c.translate(game.mouse.x, game.mouse.y);

            c.drawImage(spriteArt.image, brushFrame.x, brushFrame.y, brushFrame.w, brushFrame.h, -brushFrame.w*bs/2, -brushFrame.h*bs, brushFrame.w*bs, brushFrame.h*bs);
            c.restore();
          }
        }

        /* floating reaction texts (Update 6) */
        for (const ft of this.floatingTexts) {
          c.save();
          const fadeAlpha = clamp(ft.life / 0.4, 0, 1);
          const scaleIn = ft.life > 1.2 ? easeOutBack(clamp((1.5 - ft.life) / 0.3, 0, 1)) : 1;
          c.globalAlpha = fadeAlpha;
          c.translate(ft.x, ft.y);
          c.scale(scaleIn, scaleIn);

          c.strokeText(ft.text, 0, 0);

        /* decoration notification banner (Update 2) */
        if (this.decorNotification) {
          c.save();
          const dn = this.decorNotification;
          const fadeAlpha = clamp(dn.timer / 0.5, 0, 1) * clamp((4 - dn.timer) / 0.5, 0, 1);

          c.strokeStyle = "rgba(255,255,255,0.3)";
          c.lineWidth = 1.5;
          c.stroke();

          c.fillStyle = "rgba(255,255,255,0.1)";
          rr(c, 204, 106, 392, 14, 14);
          c.fill();
          drawGlowCircle(c, 400, 123, 220, "rgba(255,215,0,ALPHA)", 0.06 * glow);
          c.fillStyle = "#FFF8F0";
          c.textAlign = "center";
          c.font = '14px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("\u2605 " + dn.text + " \u2605", 400, 128);
          c.restore();
        }

        c.save();
        /* status bar shadow */
        c.fillStyle = "rgba(92,68,52,0.06)";
        rr(c, 124, 539, 556, 40, 18);
        c.fill();
        /* status bar */
        rr(c, 122, 536, 556, 40, 18);
        c.fillStyle = "rgba(255,255,255,0.9)";
        c.fill();
        c.strokeStyle = "rgba(146,104,72,0.18)";
        c.lineWidth = 1.5;
        c.stroke();
        /* shine */
        c.fillStyle = "rgba(255,255,255,0.2)";
        rr(c, 126, 537, 548, 16, 14);
        c.fill();
        /* pulse glow */
        if (this.statusPulse > 0.05) {
          c.globalAlpha = this.statusPulse * 0.15;

          c.globalAlpha = 1;

        c.fillStyle = "#7A5040";

        if (this.tooltip && this.tooltipAlpha > 0.02) drawTooltip(c, this.tooltip.x, this.tooltip.y, this.tooltip.title, this.tooltip.body, this.tooltipAlpha);

        if (this.menuFade > 0.01) {

          /* dim background */
          c.fillStyle = "rgba(40,28,18,0.55)";
          c.fillRect(0, 0, W, H);

          /* menu panel */
          rr(c, 60, 70, 680, 500, 28);
          c.fillStyle = "rgba(255,248,240,0.97)";
          c.fill();
          c.strokeStyle = "rgba(146,104,72,0.2)";
          c.lineWidth = 3;
          c.stroke();

          /* title */
          c.fillStyle = "#7A4E36";
          c.textAlign = "center";
          c.font = '30px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Minigames", W / 2, 110);

          /* close button */
          const closeHover = this.menuHover === "close";
          if (closeHover) drawGlowCircle(c, W / 2 + 218, 100, 24, "rgba(180,80,60,ALPHA)", 0.2);
          c.fillStyle = closeHover ? "rgba(200,70,50,0.95)" : "rgba(140,100,70,0.55)";
          c.beginPath();
          c.arc(W / 2 + 218, 100, closeHover ? 18 : 16, 0, Math.PI * 2);

          c.beginPath(); c.moveTo(W / 2 + 212, 94); c.lineTo(W / 2 + 224, 106); c.stroke();

          for (let i = 0; i < this.gameCards.length; i++) {

            else if (card.icon === "heart") drawHeart(c, 0, 0, 1.0, "#FFF8F0");

            c.fillStyle = "#5C3D2E";

            c.fillText(item.desc, ir.x + 64, ir.y + 50);

            /* toggle/cycle state */
            if (have) {
              if (item.type === "toggle") {
                const tx = ir.x + ir.w - 60;

                rr(c, tx, ty - 12, 44, 24, 12);

              }
            } else {
              c.fillStyle = "rgba(160,140,120,0.4)";

              c.textAlign = "right";
              c.fillText("Need " + item.stars + " ★", ir.x + ir.w - 24, ir.y + ir.h / 2 + 5);

        /* ── First visit dedication screen ── */

          /* heart decorations */
          for (let i = 0; i < 8; i++) {

          c.fillStyle = "rgba(122,78,54,0.8)";

          /* small characters */
