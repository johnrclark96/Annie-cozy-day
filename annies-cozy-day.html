          c.font = '36px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Made with Love", W / 2, 220);
          c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillStyle = "rgba(122,78,54,0.8)";
          c.fillText("for Annie, Obi, and Luna", W / 2, 256);

          /* small characters */
          c.save();
          c.globalAlpha = a * clamp(this.dedication.phase - 0.5, 0, 1);
          drawAnnie(c, 320, 370, 0.8, { pose: "cheer", breath: Math.sin(game.time * 2), blink: blinkSignal(game.time, 0.5), hairSway: Math.sin(game.time * 1.2) });
          drawObi(c, 420, 390, 0.7, { pose: "sit", expression: "happy", tail: Math.sin(game.time * 8) });
          drawLuna(c, 500, 382, 0.65, { pose: "sit", tail: Math.sin(game.time * 2), earTwitch: earSignal(game.time) });
          c.restore();

          /* click to continue */
          c.globalAlpha = a * (0.4 + Math.sin(game.time * 2.5) * 0.3);
          c.fillStyle = "#8A6045";
          c.font = '14px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText(isMobile ? "Tap anywhere to begin" : "Click anywhere to begin", W / 2, 454);

          c.restore();
        }
      }
    }

    SceneRegistry.register("hangout", () => new HangoutScene());


    // ═══ 13b-scene-backyard.js ═══
    class BackyardScene extends BaseScene {
      constructor() {
        super("backyard");
        this.obi = {
          x: 300, y: 480, homeX: 300, homeY: 480,
          targetX: 300, targetY: 480, joy: store.pet_obi_joy, facing: 1,
          bounce: 0, petTimer: 0, happyTimer: 0,
          pose: "sit", actionTimer: rand(3, 6), action: "idle",
          splashing: false, digging: false
        };
        this.luna = {
          x: 600, y: 480, homeX: 600, homeY: 480,
          targetX: 600, targetY: 480, joy: store.pet_luna_joy, facing: -1,
          wiggle: 0, earTwitch: 0,
          pose: "sit", actionTimer: rand(3, 6), action: "idle",
          inTree: false, stalking: false
        };
        this.goInsideButton = { x: 10, y: 300, w: 60, h: 80 };
        this.hoverKey = null;
        this.statusText = "Welcome to the backyard!";
        this.statusPulse = 0;
        this.floatingTexts = [];
        this.coinPopup = null;
        this.cameraFlash = 0;
        /* bird feeder */
        this.feeder = { x: 620, y: 280, filled: false, birdTimer: 0, birds: [] };
        /* garden */
        this.garden = { x: 180, y: 460 };
        /* kiddie pool */
        this.pool = { x: 420, y: 480 };
        /* tree */
        this.tree = { x: 680, y: 180 };
        /* tooltip */
        this.tooltip = null;
        /* camera — below mute icon */
        this.cameraButton = { x: W - 54, y: 56, w: 40, h: 40 };
        /* backyard decor */
        this.byDecorButton = { x: 10, y: 16, w: 90, h: 36 };
        this.byDecorOpen = false;
        this.byDecorHover = null;
        this.byDecorFade = 0;
        this.byDecorPage = 0;
        /* joy save timer */
        this.joySaveTimer = 0;
        /* first visit scrapbook */
        this.checkedFirstVisit = false;
      }
      enter() {
        this.obi.joy = store.pet_obi_joy;
        this.luna.joy = store.pet_luna_joy;
        audio.startAmbient();
        if (!this.checkedFirstVisit) {
          this.checkedFirstVisit = true;
          var entries = store.scrapbook.entries;
          var hasVisit = false;
          for (var i = 0; i < entries.length; i++) {
            if (entries[i].type === "milestone" && entries[i].text === "Explored the backyard for the first time!") { hasVisit = true; break; }
          }
          if (!hasVisit) {
            addScrapbookEntry("milestone", "Explored the backyard for the first time!", "heart");
          }
        }
      }
      addFloatingText(text, x, y, color) {
        this.floatingTexts.push({ text: text, x: x, y: y, color: color || COLORS.gold, life: 1.5 });
      }
      earnCoins(amount) {
        addCoins(amount);
        this.coinPopup = { amount: amount, timer: 1.5 };
      }
      capturePhoto() {
        if (!spriteArt.ready) {
          this.statusText = "Please wait for images to load...";
          this.statusPulse = 1;
          return;
        }
        var captureCanvas = makeBufferCanvas(W, H);
        var cc = captureCanvas.getContext("2d");
        var tod = store.decor.timeOfDay || 1;
        this.drawBackground(cc, tod);
        this.drawInteractiveObjects(cc);
        var obiSt = { pose: this.obi.pose, expression: "happy", tail: Math.sin(game.time * 7), bounce: this.obi.bounce, facing: this.obi.facing };
        drawObi(cc, this.obi.x, this.obi.y, 1.0, obiSt);
        drawAccessoryOverlay(cc, "obi", this.obi.x, this.obi.y, 1.0, obiSt.pose, obiSt.facing);
        var lunaSt = { pose: this.luna.pose, tail: Math.sin(game.time * 2), facing: this.luna.facing, wiggle: this.luna.wiggle, earTwitch: this.luna.earTwitch };
        drawLuna(cc, this.luna.x, this.luna.y, 0.95, lunaSt);
        drawAccessoryOverlay(cc, "luna", this.luna.x, this.luna.y, 0.95, lunaSt.pose, lunaSt.facing);
        cc.fillStyle = "rgba(122,78,54,0.3)";
        cc.font = '12px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        cc.textAlign = "right";
        cc.fillText("Annie's Cozy Day", W - 12, H - 8);
        var dataURL;
        try { dataURL = captureCanvas.toDataURL("image/png"); }
        catch(e) { this.statusText = "Couldn't capture photo."; this.statusPulse = 1; return; }
        if (isMobile) { window.open(dataURL, "_blank"); }
        else {
          var link = document.createElement("a");
          link.download = "cozy-moment-" + Date.now() + ".png";
          link.href = dataURL;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }
        this.cameraFlash = 0.4;
        audio.tinyChime();
        this.statusText = "Photo saved!";
        this.statusPulse = 1;
        var thumbCanvas = makeBufferCanvas(160, 120);
        thumbCanvas.getContext("2d").drawImage(captureCanvas, 0, 0, 160, 120);
        var thumbData;
        try { thumbData = thumbCanvas.toDataURL("image/jpeg", 0.6); } catch(e) { return; }
        var photos = loadJSON("photos", []);
        photos.push({ data: thumbData, date: new Date().toDateString(), room: this.name });
        if (photos.length > 20) photos.shift();
        saveJSON("photos", photos);
        store.stats.totalPhotos++;
        saveStats();
        if (store.stats.totalPhotos === 1) {
          addScrapbookEntry("milestone", "Took the first photo!", "star");
        }
      }
      saveJoy() {
        store.pet_obi_joy = this.obi.joy;
        store.pet_luna_joy = this.luna.joy;
        saveNumber("pet_obi_joy", this.obi.joy);
        saveNumber("pet_luna_joy", this.luna.joy);
      }
      update(dt) {
        super.update(dt);
        this.statusPulse = Math.max(0, this.statusPulse - dt * 2.6);
        if (this.coinPopup) {
          this.coinPopup.timer -= dt;
          if (this.coinPopup.timer <= 0) this.coinPopup = null;
        }
        if (this.cameraFlash > 0) this.cameraFlash = Math.max(0, this.cameraFlash - dt * 2.5);
        if (this.byDecorOpen) this.byDecorFade = clamp(this.byDecorFade + dt * 5, 0, 1);
        else this.byDecorFade = clamp(this.byDecorFade - dt * 5, 0, 1);
        /* floating texts */
        for (var fi = this.floatingTexts.length - 1; fi >= 0; fi--) {
          this.floatingTexts[fi].life -= dt;
          this.floatingTexts[fi].y -= dt * 30;
          if (this.floatingTexts[fi].life <= 0) this.floatingTexts.splice(fi, 1);
        }
        /* joy save */
        this.joySaveTimer += dt;
        if (this.joySaveTimer > 5) {
          this.joySaveTimer = 0;
          this.saveJoy();
        }
        /* update obi */
        this.updateObiBackyard(dt);
        /* update luna */
        this.updateLunaBackyard(dt);
        /* bird feeder */
        this.updateFeeder(dt);
      }
      updateObiBackyard(dt) {
        var o = this.obi;
        o.bounce = Math.max(0, o.bounce - dt * 3);
        o.happyTimer = Math.max(0, o.happyTimer - dt);
        o.actionTimer -= dt;
        /* move toward target */
        if (Math.abs(o.x - o.targetX) > 4) {
          o.facing = o.targetX > o.x ? 1 : -1;
          o.x = clamp(o.x + Math.sign(o.targetX - o.x) * 60 * dt, 80, 720);
          o.pose = "run";
        } else if (o.digging) {
          o.pose = "dig";
        } else if (o.splashing) {
          o.pose = "splash";
          o.happyTimer = 0.5;
        } else {
          o.pose = "sit";
        }
        if (o.actionTimer <= 0 && !o.splashing && !o.digging) {
          o.actionTimer = rand(5, 10);
          var choice = Math.random();
          if (choice < 0.3) {
            /* wander */
            o.targetX = clamp(rand(120, 600), 120, 600);
          } else if (choice < 0.5 && store.backyardFlowers > 0) {
            /* dig up a flower */
            o.targetX = this.garden.x;
            o.digging = true;
            o.actionTimer = 3;
          } else {
            /* sniff around */
            o.targetX = clamp(rand(120, 600), 120, 600);
          }
        }
        /* finish digging */
        if (o.digging && o.actionTimer <= 0) {
          o.digging = false;
          if (store.backyardFlowers > 0) {
            o.joy = clamp(o.joy + 4, 0, 100);
            store.backyardFlowers = Math.max(0, store.backyardFlowers - 1);
            saveNumber("backyardFlowers", store.backyardFlowers);
            this.addFloatingText("Obi dug up a flower!", o.x, o.y - 60, "#8B6914");
            this.statusText = "Obi dug up a tulip! Bad boy!";
            this.statusPulse = 1;
            spawnParticleBurst(o.x, o.y - 30, ["#8B6914", "#5C7A3A"], 6, ["star"]);
            addScrapbookEntry("event", "Obi dug up a flower in the garden!", "bone");
          }
        }
        /* finish splashing */
        if (o.splashing && o.actionTimer <= 0) {
          o.splashing = false;
        }
      }
      updateLunaBackyard(dt) {
        var l = this.luna;
        l.wiggle = Math.sin(game.time * 2) * 0.02;
        l.earTwitch = earSignal(game.time);
        l.actionTimer -= dt;
        if (l.inTree) {
          l.pose = "treeSit";
          l.x = this.tree.x - 30;
          l.y = this.tree.y + 40;
        } else if (l.stalking) {
          l.pose = "stalk";
        } else if (Math.abs(l.x - l.targetX) > 4) {
          l.facing = l.targetX > l.x ? 1 : -1;
          l.x = clamp(l.x + Math.sign(l.targetX - l.x) * 40 * dt, 80, 720);
          l.pose = "lounge";
        } else {
          l.pose = "sit";
        }
        if (l.actionTimer <= 0 && !l.inTree && !l.stalking) {
          l.actionTimer = rand(6, 12);
          var choice = Math.random();
          if (choice < 0.35) {
            /* climb tree */
            l.inTree = true;
            l.actionTimer = rand(8, 15);
          } else if (choice < 0.55) {
            /* stalk bugs */
            l.stalking = true;
            l.targetX = rand(200, 500);
            l.actionTimer = rand(3, 5);
          } else {
            /* wander */
            l.targetX = clamp(rand(150, 650), 150, 650);
          }
        }
        /* finish tree */
        if (l.inTree && l.actionTimer <= 0) {
          l.inTree = false;
          l.y = 480;
          l.targetY = 480;
          l.targetX = rand(200, 500);
        }
        /* finish stalking */
        if (l.stalking && l.actionTimer <= 0) {
          l.stalking = false;
          l.joy = clamp(l.joy + 2, 0, 100);
          spawnParticleBurst(l.x, l.y - 30, ["#5C7A3A"], 3, ["star"]);
        }
      }
      updateFeeder(dt) {
        if (this.feeder.filled) {
          this.feeder.birdTimer -= dt;
          if (this.feeder.birdTimer <= 0 && this.feeder.birds.length === 0) {
            /* birds arrive */
            var count = Math.floor(rand(2, 4));
            for (var i = 0; i < count; i++) {
              this.feeder.birds.push({ x: this.feeder.x + rand(-20, 20), y: this.feeder.y - 10 + rand(-10, 10), phase: rand(0, 6) });
            }
            this.luna.joy = clamp(this.luna.joy + 2, 0, 100);
            this.addFloatingText("+2 Luna joy", this.luna.x, this.luna.y - 50, "#9B7D3C");
            this.feeder.birdTimer = 0;
          } else if (this.feeder.birds.length > 0 && this.feeder.birdTimer < -8) {
            this.feeder.birds = [];
            this.feeder.filled = false;
          }
        }
      }
      getByDecorPageItems() { return BACKYARD_DECOR_ITEMS.slice(this.byDecorPage * 4, this.byDecorPage * 4 + 4); }
      byDecorPageCount() { return Math.ceil(BACKYARD_DECOR_ITEMS.length / 4); }
      getByDecorItemRect(i) { return { x: 130, y: 150 + i * 88, w: 540, h: 78 }; }
      onClick(x, y) {
        /* backyard decor panel */
        if (this.byDecorOpen) {
          var closeBtn = { x: W / 2 + 200, y: 84, w: 36, h: 36 };
          if (pointInRect(x, y, closeBtn)) { audio.menu(); this.byDecorOpen = false; return; }
          if (pointInRect(x, y, { x: 300, y: 530, w: 40, h: 30 }) && this.byDecorPage > 0) { this.byDecorPage--; audio.menu(); return; }
          if (pointInRect(x, y, { x: 460, y: 530, w: 40, h: 30 }) && this.byDecorPage < this.byDecorPageCount() - 1) { this.byDecorPage++; audio.menu(); return; }
          var pageItems = this.getByDecorPageItems();
          for (var i = 0; i < pageItems.length; i++) {
            if (pointInRect(x, y, this.getByDecorItemRect(i))) {
              var item = pageItems[i];
              if (!canUnlockDecorItem(item)) {
                audio.miss();
                if (item.tier && !canAccessTier(item.tier)) this.statusText = "Tier " + item.tier + " locked!";
                else if (item.achievementUnlock) this.statusText = "Unlock " + item.achievementUnlock + " first!";
                this.statusPulse = 1; return;
              }
              if (item.price && store.decorPurchased.indexOf(item.key) < 0) {
                if (store.coins < item.price) { audio.miss(); this.statusText = "Need " + item.price + " coins!"; this.statusPulse = 1; return; }
                addCoins(-item.price);
                store.decorPurchased.push(item.key);
                saveJSON("decorPurchased", store.decorPurchased);
                audio.combo();
                this.statusText = "Bought " + item.name + "!";
                this.statusPulse = 1;
              }
              store.backyardDecor[item.key] = !store.backyardDecor[item.key];
              saveBackyardDecor();
              audio.tinyChime();
              return;
            }
          }
          audio.menu(); this.byDecorOpen = false; return;
        }
        /* decor button */
        if (pointInRect(x, y, this.byDecorButton)) {
          audio.menu(); this.byDecorOpen = true; this.byDecorFade = 0; return;
        }
        /* camera */
        if (pointInRect(x, y, this.cameraButton)) {
          this.capturePhoto();
          return;
        }
        /* go inside */
        if (pointInRect(x, y, this.goInsideButton)) {
          audio.menu();
          this.saveJoy();
          transitionTo(SceneRegistry.create("hangout"));
          return;
        }
        /* bird feeder */
        if (Math.abs(x - this.feeder.x) < 40 && Math.abs(y - this.feeder.y) < 40) {
          if (!this.feeder.filled) {
            this.feeder.filled = true;
            this.feeder.birdTimer = rand(8, 15);
            this.feeder.birds = [];
            audio.tinyChime();
            this.statusText = "Feeder filled! Birds will come soon.";
            this.statusPulse = 1;
          }
          return;
        }
        /* garden — plant a flower */
        if (Math.abs(x - this.garden.x) < 50 && Math.abs(y - this.garden.y) < 40) {
          if (store.backyardFlowers < 6) {
            if (store.coins >= 3) {
              addCoins(-3);
              store.backyardFlowers++;
              saveNumber("backyardFlowers", store.backyardFlowers);
              store.stats.totalFlowersPlanted++;
              saveStats();
              if (store.stats.totalFlowersPlanted >= 20 && !store.achievements.greenThumb) {
                store.achievements.greenThumb = true; saveAchievements();
                var gtInfo = ACHIEVEMENTS.find(function(a) { return a.key === "greenThumb"; });
                if (gtInfo && gtInfo.coinBonus) addCoins(gtInfo.coinBonus);
                addScrapbookEntry("achievement", "Green Thumb unlocked!", "star");
                this.addFloatingText("Achievement!", this.garden.x, this.garden.y - 50, COLORS.gold);
              }
              this.trackWeeklyChallenge && this.trackWeeklyChallenge("flowersPlanted", 1);
              audio.tinyChime();
              this.addFloatingText("Planted!", this.garden.x, this.garden.y - 30, "#5C7A3A");
              this.statusText = "Planted a flower! (" + store.backyardFlowers + "/6)";
              this.statusPulse = 1;
            } else {
              audio.miss();
              this.statusText = "Need 3 coins to plant a flower!";
              this.statusPulse = 1;
            }
          } else {
            this.statusText = "Garden is full! (6/6)";
          }
          return;
        }
        /* kiddie pool — call Obi */
        if (Math.abs(x - this.pool.x) < 50 && Math.abs(y - this.pool.y) < 40) {
          if (!this.obi.splashing && !this.obi.digging) {
            this.obi.targetX = this.pool.x;
            this.obi.splashing = true;
            this.obi.actionTimer = rand(3, 5);
            this.obi.joy = clamp(this.obi.joy + 6, 0, 100);
            this.addFloatingText("+6 Obi joy", this.obi.x, this.obi.y - 50, "#4A90D9");
            this.statusText = "Obi loves the pool!";
            this.statusPulse = 1;
            audio.combo();
            spawnParticleBurst(this.pool.x, this.pool.y - 20, ["#87CEEB", "#B3D9FF"], 8, ["star"]);
          }
          return;
        }
      }
      onMouseMove(x, y) {
        this.hoverKey = null;
        this.tooltip = null;
        if (this.byDecorOpen) {
          this.byDecorHover = null;
          var closeBtn = { x: W / 2 + 200, y: 84, w: 36, h: 36 };
          if (pointInRect(x, y, closeBtn)) this.byDecorHover = "close";
          var bPageItems = this.getByDecorPageItems();
          for (var bi = 0; bi < bPageItems.length; bi++) {
            if (pointInRect(x, y, this.getByDecorItemRect(bi))) { this.byDecorHover = bi; break; }
          }
          return;
        }
        if (pointInRect(x, y, this.byDecorButton)) this.hoverKey = "byDecor";
        else if (pointInRect(x, y, this.cameraButton)) this.hoverKey = "camera";
        else if (pointInRect(x, y, this.goInsideButton)) this.hoverKey = "inside";
        else if (Math.abs(x - this.feeder.x) < 40 && Math.abs(y - this.feeder.y) < 40) {
          this.hoverKey = "feeder";
          this.tooltip = { x: this.feeder.x, y: this.feeder.y - 40, title: "Bird Feeder", body: this.feeder.filled ? "Birds are coming..." : "Click to fill!" };
        } else if (Math.abs(x - this.garden.x) < 50 && Math.abs(y - this.garden.y) < 40) {
          this.hoverKey = "garden";
          this.tooltip = { x: this.garden.x, y: this.garden.y - 40, title: "Garden", body: store.backyardFlowers + "/6 flowers. 3 coins to plant." };
        } else if (Math.abs(x - this.pool.x) < 50 && Math.abs(y - this.pool.y) < 40) {
          this.hoverKey = "pool";
          this.tooltip = { x: this.pool.x, y: this.pool.y - 40, title: "Kiddie Pool", body: "Click to call Obi for a splash!" };
        } else if (Math.abs(x - this.tree.x) < 50 && y > this.tree.y - 60 && y < this.tree.y + 100) {
          this.hoverKey = "tree";
          this.tooltip = { x: this.tree.x, y: this.tree.y - 60, title: "Oak Tree", body: this.luna.inTree ? "Luna is relaxing up there!" : "Luna loves to climb here." };
        }
      }
      interactiveAt(x, y) {
        if (this.byDecorOpen) return true;
        if (pointInRect(x, y, this.byDecorButton)) return true;
        if (pointInRect(x, y, this.cameraButton)) return true;
        if (pointInRect(x, y, this.goInsideButton)) return true;
        if (Math.abs(x - this.feeder.x) < 40 && Math.abs(y - this.feeder.y) < 40) return true;
        if (Math.abs(x - this.garden.x) < 50 && Math.abs(y - this.garden.y) < 40) return true;
        if (Math.abs(x - this.pool.x) < 50 && Math.abs(y - this.pool.y) < 40) return true;
        if (Math.abs(x - this.tree.x) < 50 && y > this.tree.y - 60 && y < this.tree.y + 100) return true;
        return false;
      }
      onKeyDown(key) {
        if (key === "Escape") {
          audio.menu();
          this.saveJoy();
          transitionTo(SceneRegistry.create("hangout"));
        }
      }
      draw(c) {
        var tod = store.decor.timeOfDay || 1;
        this.drawBackground(c, tod);
        this.drawInteractiveObjects(c);
        /* draw pets */
        var obiState = { pose: this.obi.pose, expression: this.obi.happyTimer > 0 ? "excited" : "happy",
          tail: Math.sin(game.time * 7), bounce: this.obi.bounce, facing: this.obi.facing };
        drawObi(c, this.obi.x, this.obi.y, 1.0, obiState);
        drawAccessoryOverlay(c, "obi", this.obi.x, this.obi.y, 1.0, obiState.pose, obiState.facing);

        var lunaState = { pose: this.luna.pose, tail: Math.sin(game.time * 2), facing: this.luna.facing,
          wiggle: this.luna.wiggle, earTwitch: this.luna.earTwitch, pawBat: this.luna.pawBat || 0 };
        drawLuna(c, this.luna.x, this.luna.y, 0.95, lunaState);
        drawAccessoryOverlay(c, "luna", this.luna.x, this.luna.y, 0.95, lunaState.pose, lunaState.facing);

        /* feeder birds */
        for (var bi = 0; bi < this.feeder.birds.length; bi++) {
          var bird = this.feeder.birds[bi];
          c.save();
          c.translate(bird.x + Math.sin(game.time * 3 + bird.phase) * 4, bird.y + Math.cos(game.time * 2 + bird.phase) * 3);
          c.fillStyle = "#5C4434";
          c.beginPath();
          c.arc(0, 0, 5, 0, Math.PI * 2); c.fill();
          c.fillStyle = "#E8A020";
          c.beginPath(); c.moveTo(5, -1); c.lineTo(9, 0); c.lineTo(5, 1); c.closePath(); c.fill();
          /* wings */
          c.fillStyle = "#6B5B4E";
          c.beginPath(); c.ellipse(-3, -2, 6, 3, -0.3 + Math.sin(game.time * 8 + bird.phase) * 0.3, 0, Math.PI * 2); c.fill();
          c.restore();
        }

        /* go inside button */
        c.save();
        var insideHover = this.hoverKey === "inside";
        c.fillStyle = insideHover ? "rgba(255,248,240,0.85)" : "rgba(255,248,240,0.5)";
        rr(c, this.goInsideButton.x, this.goInsideButton.y, this.goInsideButton.w, this.goInsideButton.h, 10);
        c.fill();
        c.fillStyle = insideHover ? "#7A4E36" : "rgba(122,78,54,0.6)";
        c.textAlign = "center";

        for (var fi = 0; fi < this.floatingTexts.length; fi++) {

        rr(c, this.cameraButton.x, this.cameraButton.y, this.cameraButton.w, this.cameraButton.h, 10);
        c.fill();
        c.fillStyle = COLORS.cream;
        rr(c, this.cameraButton.x + 8, this.cameraButton.y + 12, 24, 18, 4);
        c.fill();
        c.fillStyle = camH ? "rgba(92,68,52,0.82)" : "rgba(92,68,52,0.45)";
        c.beginPath(); c.arc(this.cameraButton.x + 20, this.cameraButton.y + 21, 5, 0, Math.PI * 2); c.fill();
        c.fillStyle = COLORS.cream;
        rr(c, this.cameraButton.x + 14, this.cameraButton.y + 8, 12, 5, 2);
        c.fill();
        c.restore();

        /* coin pill (same as hangout) */
        c.save();
        c.fillStyle = "rgba(255,248,240,0.65)";
        rr(c, 452, 12, 72, 22, 11);
        c.fill();
        c.fillStyle = COLORS.gold;
        c.beginPath(); c.arc(466, 23, 7, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#FFF4C0";
        c.beginPath(); c.arc(464, 21, 3, 0, Math.PI * 2); c.fill();
        c.fillStyle = COLORS.gold;
        c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "center";
        c.fillText(store.coins, 503, 28);
        c.restore();
        /* coin popup */
        if (this.coinPopup) {
          c.save();
          var cpAlpha = clamp(this.coinPopup.timer / 0.4, 0, 1);
          c.globalAlpha = cpAlpha;
          c.fillStyle = COLORS.gold;
          c.font = '15px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.fillText("+" + this.coinPopup.amount, 503, 6 - (1 - cpAlpha) * 12);
          c.restore();
        }

        /* status text */
        c.fillStyle = "#5C3D2E";
        c.textAlign = "center";
        c.font = '14px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        var sAlpha = 0.7 + this.statusPulse * 0.3;
        c.globalAlpha = sAlpha;
        c.fillText(this.statusText, 400, 560);
        c.globalAlpha = 1;

        /* tooltip */
        /* backyard decor button */
        drawButton(c, this.byDecorButton, "Decor", this.hoverKey === "byDecor", "#9B7DBD");

        if (this.tooltip && this.tooltipAlpha > 0.02) drawTooltip(c, this.tooltip.x, this.tooltip.y, this.tooltip.title, this.tooltip.body, this.tooltipAlpha);

        /* backyard decor panel overlay */
        if (this.byDecorFade > 0.01) {
          c.save();
          c.globalAlpha = this.byDecorFade;
          c.fillStyle = "rgba(40,28,18,0.55)";
          c.fillRect(0, 0, W, H);
          rr(c, 100, 70, 600, 480, 28);
          c.fillStyle = "rgba(255,248,240,0.97)";
          c.fill();
          c.strokeStyle = "rgba(146,104,72,0.2)"; c.lineWidth = 3; c.stroke();
          c.fillStyle = "#7A4E36"; c.textAlign = "center";
          c.font = '26px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Backyard Decor", W / 2, 106);
          c.fillStyle = "rgba(92,61,46,0.5)";
          c.font = '12px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Coins: " + store.coins, W / 2, 124);
          /* close button */
          var bchov = this.byDecorHover === "close";
          var bcx = W / 2 + 218, bcy = 102;
          c.fillStyle = bchov ? "rgba(200,70,50,0.95)" : "rgba(140,100,70,0.55)";
          c.beginPath(); c.arc(bcx, bcy, bchov ? 18 : 16, 0, Math.PI * 2); c.fill();
          c.strokeStyle = "#FFF8F0"; c.lineWidth = bchov ? 3 : 2.5;
          c.beginPath(); c.moveTo(bcx - 6, bcy - 6); c.lineTo(bcx + 6, bcy + 6); c.stroke();
          c.beginPath(); c.moveTo(bcx + 6, bcy - 6); c.lineTo(bcx - 6, bcy + 6); c.stroke();
          /* items */
          var bPageItems = this.getByDecorPageItems();
          for (var bdi = 0; bdi < bPageItems.length; bdi++) {
            var bItem = bPageItems[bdi];
            var bir = this.getByDecorItemRect(bdi);
            var bHov = this.byDecorHover === bdi;
            var bActive = store.backyardDecor[bItem.key];
            var bUnlockable = canUnlockDecorItem(bItem);
            var bPurchased = !bItem.price || store.decorPurchased.indexOf(bItem.key) >= 0;
            c.save();
            if (!bUnlockable) c.globalAlpha = 0.5;
            rr(c, bir.x, bir.y, bir.w, bir.h, 14);
            c.fillStyle = bHov ? "rgba(255,255,255,1)" : "rgba(255,252,245,0.95)";
            c.fill();
            c.strokeStyle = bActive ? "#7DB36C" : bHov ? "#9B7DBD" : "rgba(146,104,72,0.12)";
            c.lineWidth = bActive ? 3 : 1.5;
            c.stroke();
            c.textAlign = "left";
            c.fillStyle = "#5C3D2E";
            c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
            c.fillText(bItem.name, bir.x + 20, bir.y + 30);
            c.fillStyle = "rgba(92,61,46,0.5)";
            c.font = '11px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
            c.fillText(bItem.desc, bir.x + 20, bir.y + 50);
            c.textAlign = "right";
            c.font = '12px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
            if (!bUnlockable) { c.fillStyle = "rgba(160,140,120,0.5)"; c.fillText("Locked", bir.x + bir.w - 16, bir.y + 40); }
            else if (!bPurchased) {
              c.fillStyle = store.coins >= bItem.price ? COLORS.gold : "rgba(160,140,120,0.5)";
              c.fillText(bItem.price + " coins", bir.x + bir.w - 16, bir.y + 40);
            } else if (bActive) { c.fillStyle = "#7DB36C"; c.fillText("Active", bir.x + bir.w - 16, bir.y + 40); }
            else { c.fillStyle = "rgba(92,61,46,0.4)"; c.fillText("Toggle", bir.x + bir.w - 16, bir.y + 40); }
            c.restore();
          }
          /* pagination */
          if (this.byDecorPageCount() > 1) {
            c.fillStyle = "#7A4E36"; c.textAlign = "center";
            c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
            c.fillText("Page " + (this.byDecorPage + 1) + "/" + this.byDecorPageCount(), W / 2, 548);
            if (this.byDecorPage > 0) { c.fillText("\u25C4", 318, 548); }
            if (this.byDecorPage < this.byDecorPageCount() - 1) { c.fillText("\u25BA", 482, 548); }
          }
          c.restore();
        }

        /* camera flash */
        if (this.cameraFlash > 0) {
          c.save();
          c.globalAlpha = this.cameraFlash;
          c.fillStyle = "#FFFFFF";
          c.fillRect(0, 0, W, H);
          c.restore();
        }
      }
      drawBackground(c, tod) {
        /* sky */
        var skyG = c.createLinearGradient(0, 0, 0, 250);
        if (tod === 0) { skyG.addColorStop(0, "#FFB088"); skyG.addColorStop(1, "#FFCDA8"); }
        else if (tod === 1) { skyG.addColorStop(0, "#87CEEB"); skyG.addColorStop(1, "#B3E0F2"); }
        else if (tod === 2) { skyG.addColorStop(0, "#C87848"); skyG.addColorStop(1, "#D89060"); }
        else { skyG.addColorStop(0, "#1A1E38"); skyG.addColorStop(1, "#2A3058"); }
        c.fillStyle = skyG;
        c.fillRect(0, 0, W, 300);

        /* stars at night */
        if (tod === 3) {
          c.fillStyle = "rgba(255,255,220,0.6)";
          var starPositions = [[100, 30], [250, 60], [380, 20], [520, 50], [650, 35], [720, 70], [180, 80]];
          for (var si = 0; si < starPositions.length; si++) {
            var sx = starPositions[si][0], sy = starPositions[si][1];
            var tw = Math.sin(game.time * 2 + si * 1.3) * 0.3 + 0.7;
            c.globalAlpha = tw * 0.6;
            c.beginPath(); c.arc(sx, sy, 1.5, 0, Math.PI * 2); c.fill();
          }
          c.globalAlpha = 1;
        }

        /* grass */
        var grassG = c.createLinearGradient(0, 280, 0, H);
        grassG.addColorStop(0, tod === 3 ? "#2A4020" : "#7CB342");
        grassG.addColorStop(1, tod === 3 ? "#1E3018" : "#5A8E2A");
        c.fillStyle = grassG;
        c.fillRect(0, 280, W, H - 280);

        /* grass detail */
        c.fillStyle = tod === 3 ? "rgba(80,120,50,0.3)" : "rgba(100,160,60,0.3)";
        for (var gi = 0; gi < 20; gi++) {
          var gx = (gi * 41 + 15) % W;
          var gy = 290 + (gi * 17 % 200);
          c.beginPath();
          c.moveTo(gx, gy); c.lineTo(gx + 3, gy - 8 - Math.sin(game.time + gi) * 2); c.lineTo(gx + 6, gy);
          c.fill();
        }

        /* fence */
        c.fillStyle = tod === 3 ? "#4A3828" : "#D2B48C";
        for (var fi = 0; fi < 14; fi++) {
          var fx = 20 + fi * 58;
          c.fillRect(fx, 260, 8, 50);
          /* picket top */
          c.beginPath(); c.moveTo(fx - 2, 260); c.lineTo(fx + 4, 248); c.lineTo(fx + 10, 260); c.closePath(); c.fill();
        }
        /* horizontal rails */
        c.fillRect(0, 275, W, 5);
        c.fillRect(0, 295, W, 5);

        /* tree */
        c.fillStyle = tod === 3 ? "#3A2818" : "#8B6914";
        c.fillRect(this.tree.x - 10, this.tree.y, 20, 320);
        /* branch */
        c.fillRect(this.tree.x - 50, this.tree.y + 30, 60, 8);
        /* canopy */
        c.fillStyle = tod === 3 ? "#1E3818" : "#4A8030";
        c.beginPath(); c.arc(this.tree.x, this.tree.y - 20, 60, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(this.tree.x - 30, this.tree.y + 10, 40, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(this.tree.x + 25, this.tree.y + 5, 45, 0, Math.PI * 2); c.fill();
      }
      drawInteractiveObjects(c) {
        var tod = store.decor.timeOfDay || 1;
        var byFrames = spriteArt.ready ? spriteArt.frames.backyard : null;

        /* bench — decorative, drawn behind other objects */
        if (byFrames && byFrames.bench) {
          drawFrameImage(c, byFrames.bench, 100, 380, 0.8, { baseScale: 1, shadowAlpha: 0.10 });
        } else {
          c.fillStyle = tod === 3 ? "#3A3020" : "#8B7A58";
          rr(c, 60, 368, 80, 30, 6); c.fill();
          c.fillRect(66, 398, 6, 20); c.fillRect(128, 398, 6, 20);
        }

        /* garden patch */
        if (byFrames && byFrames.gardenPatch) {
          drawFrameImage(c, byFrames.gardenPatch, this.garden.x, this.garden.y, 0.8, { baseScale: 1, shadowAlpha: 0.10 });
        } else {
          c.fillStyle = tod === 3 ? "#3A2818" : "#7A5428";
          rr(c, this.garden.x - 50, this.garden.y - 18, 100, 40, 8);
          c.fill();
        }
        /* flowers on top of garden */
        var flowerColors = ["#FF6B9D", "#FFD700", "#FF8C42", "#E040FB", "#4FC3F7", "#AED581"];
        for (var fi = 0; fi < store.backyardFlowers; fi++) {
          var fx = this.garden.x - 35 + fi * 14;
          var fy = this.garden.y - 16;
          c.fillStyle = "#5C7A3A";
          c.fillRect(fx, fy, 2, 14);
          c.fillStyle = flowerColors[fi % flowerColors.length];
          c.beginPath(); c.arc(fx + 1, fy - 4, 5, 0, Math.PI * 2); c.fill();
        }

        /* kiddie pool */
        if (byFrames && byFrames.kiddiePool) {
          drawFrameImage(c, byFrames.kiddiePool, this.pool.x, this.pool.y, 0.85, { baseScale: 1, shadowAlpha: 0.08 });
        } else {
          c.fillStyle = "#4A90D9";
          c.globalAlpha = 0.5;
          c.beginPath(); c.ellipse(this.pool.x, this.pool.y, 50, 22, 0, 0, Math.PI * 2); c.fill();
          c.globalAlpha = 1;
          c.strokeStyle = "#87CEEB"; c.lineWidth = 3;
          c.beginPath(); c.ellipse(this.pool.x, this.pool.y, 50, 22, 0, 0, Math.PI * 2); c.stroke();
        }
        /* water ripples on pool */
        c.strokeStyle = "rgba(255,255,255,0.3)"; c.lineWidth = 1;
        c.beginPath();
        c.ellipse(this.pool.x + Math.sin(game.time * 2) * 12, this.pool.y, 22, 9, 0, 0, Math.PI * 2);
        c.stroke();

        /* bird feeder */
        if (byFrames && byFrames.birdFeeder) {
          drawFrameImage(c, byFrames.birdFeeder, this.feeder.x, this.feeder.y, 0.8, { baseScale: 1, shadowAlpha: 0.10 });
        } else {
          c.fillStyle = tod === 3 ? "#3A2818" : "#8B6914";
          c.fillRect(this.feeder.x - 4, this.feeder.y, 8, 55);
          c.fillStyle = tod === 3 ? "#4A3828" : "#D2B48C";
          rr(c, this.feeder.x - 22, this.feeder.y - 12, 44, 18, 5);
          c.fill();
        }
        /* seed indicator */
        if (this.feeder.filled) {
          c.fillStyle = "#E8C44C";
          c.beginPath(); c.arc(this.feeder.x, this.feeder.y - 4, 7, 0, Math.PI * 2); c.fill();
        }
        /* ── Backyard decorations ── */
        var bd = store.backyardDecor;
        if (bd.windChime) {
          var wcSwing = Math.sin(game.time * 1.5) * 0.12;
          c.save(); c.translate(this.tree.x - 40, this.tree.y + 34); c.rotate(wcSwing);
          c.strokeStyle = "#A8A0A0"; c.lineWidth = 1;
          for (var wci = 0; wci < 4; wci++) {
            c.beginPath(); c.moveTo(-6 + wci * 4, 0); c.lineTo(-6 + wci * 4, 12 + wci * 2); c.stroke();
          }
          c.fillStyle = "#C0B8B0";
          c.beginPath(); c.ellipse(0, -2, 10, 3, 0, 0, Math.PI * 2); c.fill();
          c.restore();
        }
        if (bd.gardenGnome) {
          c.fillStyle = "#D04040"; /* hat */
          c.beginPath(); c.moveTo(this.garden.x + 55, 448); c.lineTo(this.garden.x + 60, 430); c.lineTo(this.garden.x + 65, 448); c.closePath(); c.fill();
          c.fillStyle = "#FFDFC4"; /* face */
          c.beginPath(); c.arc(this.garden.x + 60, 453, 5, 0, Math.PI * 2); c.fill();
          c.fillStyle = "#4060C0"; /* body */
          rr(c, this.garden.x + 55, 458, 10, 12, 3); c.fill();
        }
        if (bd.picnicBlanket) {
          c.save(); c.globalAlpha = 0.7;
          c.fillStyle = "#DD4444";
          c.beginPath(); c.ellipse(300, 420, 40, 18, 0.1, 0, Math.PI * 2); c.fill();
          /* checkered pattern */
          c.fillStyle = "#FFFFFF"; c.globalAlpha = 0.3;
          for (var pi = 0; pi < 4; pi++) { c.fillRect(280 + pi * 12, 412, 6, 6); c.fillRect(286 + pi * 12, 418, 6, 6); }
          c.restore();
        }
        if (bd.birdBath) {
          c.fillStyle = "#A0A0A0";
          c.fillRect(this.feeder.x - 40, 310, 5, 25);
          c.beginPath(); c.ellipse(this.feeder.x - 37, 308, 16, 6, 0, 0, Math.PI * 2); c.fill();
          c.fillStyle = "rgba(100,180,240,0.4)";
          c.beginPath(); c.ellipse(this.feeder.x - 37, 306, 12, 4, 0, 0, Math.PI * 2); c.fill();
        }
        if (bd.lanterns) {
          var tod = store.decor.timeOfDay || 1;
          var lanternGlow = tod >= 2 ? 0.6 : 0.2;
          c.strokeStyle = "rgba(160,140,120,0.4)"; c.lineWidth = 1;
          c.beginPath(); c.moveTo(40, 262); c.quadraticCurveTo(400, 248, 760, 262); c.stroke();
          var lanternColors = ["#FF6B6B", "#FFD93D", "#6BCB77", "#4D96FF"];
          for (var li = 0; li < 10; li++) {
            var lx = 60 + li * 72;
            var ly = 258 + Math.sin((li / 9) * Math.PI) * 8;
            c.fillStyle = lanternColors[li % 4];
            c.globalAlpha = lanternGlow;
            rr(c, lx - 5, ly, 10, 14, 4); c.fill();
            c.globalAlpha = 1;
          }
        }
        if (bd.birdHouse) {
          c.fillStyle = "#D2A870"; c.fillRect(540, 320, 6, 40);
          c.fillStyle = "#E8C88C"; rr(c, 528, 302, 30, 22, 4); c.fill();
          c.fillStyle = "#D04040"; c.beginPath(); c.moveTo(526, 304); c.lineTo(543, 290); c.lineTo(560, 304); c.closePath(); c.fill();
          c.fillStyle = "#5C4434"; c.beginPath(); c.arc(543, 314, 4, 0, Math.PI * 2); c.fill();
        }
        if (bd.sundial) {
          c.fillStyle = "#A09890";
          c.beginPath(); c.ellipse(500, 440, 18, 8, 0, 0, Math.PI * 2); c.fill();
          c.fillStyle = "#8A8078";
          c.beginPath(); c.moveTo(500, 440); c.lineTo(498, 424); c.lineTo(502, 440); c.closePath(); c.fill();
        }
        if (bd.dogHouse) {
          c.fillStyle = "#B08050"; rr(c, 46, 430, 50, 38, 4); c.fill();
          c.fillStyle = "#D04040"; c.beginPath(); c.moveTo(42, 432); c.lineTo(71, 415); c.lineTo(100, 432); c.closePath(); c.fill();
          c.fillStyle = "#5C3020"; c.beginPath(); c.ellipse(71, 458, 10, 12, 0, Math.PI, Math.PI * 2); c.fill();
        }
        if (bd.butterflyGarden && store.backyardFlowers > 0) {
          var bfColors = ["#FF69B4", "#87CEEB", "#FFD700"];
          for (var bfi = 0; bfi < 3; bfi++) {
            var bfx = this.garden.x - 20 + bfi * 20 + Math.sin(game.time * 2 + bfi * 2) * 12;
            var bfy = this.garden.y - 30 + Math.cos(game.time * 1.5 + bfi * 1.7) * 10;
            c.fillStyle = bfColors[bfi];
            var wing = Math.abs(Math.sin(game.time * 5 + bfi * 1.3)) * 4 + 2;
            c.beginPath(); c.ellipse(bfx - 3, bfy, wing, 3, -0.3, 0, Math.PI * 2); c.fill();
            c.beginPath(); c.ellipse(bfx + 3, bfy, wing, 3, 0.3, 0, Math.PI * 2); c.fill();
            c.fillStyle = "#333"; c.beginPath(); c.arc(bfx, bfy, 1.5, 0, Math.PI * 2); c.fill();
          }
        }
        if (bd.fountain) {
          c.fillStyle = "#909898";
          c.beginPath(); c.ellipse(500, 380, 28, 12, 0, 0, Math.PI * 2); c.fill();
          c.fillStyle = "#A0A8A8"; c.fillRect(496, 355, 8, 25);
          c.fillStyle = "rgba(100,180,240,0.35)";
          c.beginPath(); c.ellipse(500, 378, 22, 8, 0, 0, Math.PI * 2); c.fill();
          /* water streams */
          c.strokeStyle = "rgba(100,180,240,0.5)"; c.lineWidth = 1.5;
          for (var fsi = 0; fsi < 3; fsi++) {
            var fsa = (fsi - 1) * 0.4;
            var fsy = Math.sin(game.time * 3 + fsi) * 2;
            c.beginPath();
            c.moveTo(500, 355);
            c.quadraticCurveTo(500 + fsa * 15, 345 + fsy, 500 + fsa * 20, 370);
            c.stroke();
          }
        }
      }
    }

    class BaseMinigameScene extends BaseScene {
      constructor(gameId, title, instruction, thresholds, duration) {
        super(gameId);
        this.gameId = gameId;
        this.displayTitle = title;
        this.instruction = instruction;
        this.thresholds = thresholds;
        this.duration = duration;
        this.phase = "instructions";
        this.phaseTime = 0;
        this.timeLeft = duration;
        this.score = 0;
        this.scorePop = 0;
        this.combo = 1;
        this.hoveredButton = null;
        this.paused = false;
        this.achievementFreeze = 0;
        this.achievementBanner = null;
        this.newBest = false;
        this.resultsStars = 0;
        this.revealedStars = 0;
        this.starTimer = 0;
        this.scoreInT = 0;
        this.personalBest = 0;
        this.playHint = null;
        this.playHintTimer = 4;
      }
      enter() {
        this.phase = "instructions";
        this.phaseTime = 0;
        this.timeLeft = this.duration;
        this.score = 0;
        this.scorePop = 0;
        this.combo = 1;
        this.hoveredButton = null;
        this.paused = false;
        this.achievementFreeze = 0;
        this.achievementBanner = null;
        this.newBest = false;
        this.resultsStars = 0;
        this.revealedStars = 0;
        this.starTimer = 0;
        this.scoreInT = 0;
        this.personalBest = store["best_" + this.gameId] || 0;
      }
      resultsButtons() {
        return {
          playAgain: { x: 176, y: 500, w: 180, h: 58 },
          back: { x: 444, y: 500, w: 180, h: 58 }
        };
      }
      pauseButtons() {
        return {
          resume: { x: 270, y: 312, w: 120, h: 48 },
          quit: { x: 410, y: 312, w: 120, h: 48 }
        };
      }
      startCountdown() {
        this.phase = "countdown";
        this.phaseTime = 0;
      }
      startPlay() {
        this.phase = "play";
        this.phaseTime = 0;
      }
      update(dt) {
        super.update(dt);
        this.scorePop = Math.max(0, this.scorePop - dt * 4);
        if (this.achievementBanner) {
          this.achievementBanner.time -= dt;
          if (this.achievementBanner.time <= 0) this.achievementBanner = null;
        }
        if (this.phase === "instructions") {
          this.phaseTime += dt;
          if (this.phaseTime >= 3) this.startCountdown();
        } else if (this.phase === "countdown") {
          this.phaseTime += dt;
          if (this.phaseTime >= 4) this.startPlay();
        } else if (this.phase === "play") {
          if (!this.paused) {
            if (this.achievementFreeze > 0) {
              this.achievementFreeze -= dt;
            } else {
              this.timeLeft = Math.max(0, this.timeLeft - dt);
              this.updatePlay(dt);
              /* first-play hint timer */
              if (this.playHint) {
                this.playHint.life -= dt;
                if (this.playHint.life <= 0) this.playHint = null;
              } else if (this.playHintTimer > 0) {
                this.playHintTimer -= dt;
              }
              if (this.timeLeft <= 0) this.finishGame();
            }
          }
        } else if (this.phase === "ending") {
          this.updateEnding(dt);
        } else if (this.phase === "results") {
          this.phaseTime += dt;
          this.scoreInT = Math.min(1, this.phaseTime / 0.45);
          if (this.revealedStars < this.resultsStars) {
            this.starTimer += dt;
            if (this.starTimer >= 0.3) {
              this.starTimer = 0;
              this.revealedStars++;
              audio.tinyChime();
            }
          }
        }
      }
      updatePlay() {}
      updateEnding(dt) {
        this.phaseTime += dt;
        if (this.phaseTime > 1.2) this.finishGame();
      }
      addScore(value) {
        this.score += value;
        this.scorePop = 1;
      }
      onMouseMove(x, y) {
        this.hoveredButton = null;
        if (this.phase === "results") {
          const btns = this.resultsButtons();
          if (pointInRect(x, y, btns.playAgain)) this.hoveredButton = "again";
          else if (pointInRect(x, y, btns.back)) this.hoveredButton = "back";
        } else if (this.phase === "play" && this.paused) {
          const btns = this.pauseButtons();
          if (pointInRect(x, y, btns.resume)) this.hoveredButton = "resume";
          else if (pointInRect(x, y, btns.quit)) this.hoveredButton = "quit";
        }
      }
      interactiveAt(x, y) {
        if (this.phase === "results") {
          const b = this.resultsButtons();
          return pointInRect(x, y, b.playAgain) || pointInRect(x, y, b.back);
        }
        if (this.phase === "instructions") return true;
        if (this.phase === "countdown") return pointInRect(x, y, this.pauseButtonRect());
        if (this.phase === "play" && this.paused) {
          const b = this.pauseButtons();
          return pointInRect(x, y, b.resume) || pointInRect(x, y, b.quit);
        }
        if (this.phase === "play" && pointInRect(x, y, this.pauseButtonRect())) return true;
        return this.extraInteractiveAt ? this.extraInteractiveAt(x, y) : false;
      }
      onClick(x, y) {
        if (this.phase === "instructions") {
          audio.menu();
          this.startCountdown();
          return;
        }
        if (this.phase === "results") {
          const btns = this.resultsButtons();
          if (pointInRect(x, y, btns.playAgain)) {
            audio.menu();
            transitionTo(this.createReplay());
          } else if (pointInRect(x, y, btns.back)) {
            audio.menu();
            transitionTo(SceneRegistry.create("hangout"));
          }
          return;
        }
        if (this.phase === "play" && this.paused) {
          const btns = this.pauseButtons();
          if (pointInRect(x, y, btns.resume)) {
            audio.menu();
            this.paused = false;
          } else if (pointInRect(x, y, btns.quit)) {
            audio.menu();
            transitionTo(SceneRegistry.create("hangout"));
          }
          return;
        }
        if (this.phase === "countdown" && pointInRect(x, y, this.pauseButtonRect())) {
          audio.menu();
          transitionTo(SceneRegistry.create("hangout"));
          return;
        }
        if (this.phase === "play") {
          if (pointInRect(x, y, this.pauseButtonRect())) {
            audio.menu();
            this.paused = true;
            return;
          }
          this.onGameClick(x, y);
        }
      }
      onGameClick() {}
      onKeyDown(key) {
        if (key === "Escape") {
          if (this.phase === "instructions" || this.phase === "countdown") {
            audio.menu();
            transitionTo(SceneRegistry.create("hangout"));
          } else if (this.phase === "play") {
            this.paused = !this.paused;
          }
          return;
        }
        if (this.phase === "play" && key === " ") {
          this.paused = !this.paused;
        }
      }
      calculateStars(finalScore) {
        let stars = 0;
        if (finalScore >= this.thresholds[0]) stars = 1;
        if (finalScore >= this.thresholds[1]) stars = 2;
        if (finalScore >= this.thresholds[2]) stars = 3;
        return stars;
      }
      finishGame() {
        const finalScore = Math.round(this.gameId === "cuddle" ? this.score : this.score);
        this.resultsStars = this.calculateStars(finalScore);
        this.newBest = setBest(this.gameId, finalScore);
        this.personalBest = store["best_" + this.gameId] || finalScore;
        this.coinReward = 5 + this.resultsStars * 5 + (this.newBest ? 10 : 0);
        addCoins(this.coinReward);
        if (this.resultsStars >= 3 && this.newBest) {
          addScrapbookEntry("milestone", "Earned 3 stars in " + this.displayTitle + "!", "star");
        }
        /* check star milestone coin rewards */
        if (this.newBest) {
          var milestoneCoins = checkStarMilestones();
          if (milestoneCoins > 0) this.coinReward += milestoneCoins;
        }
        /* check fullHouse achievement */
        if (totalStarsEarned() >= 33 && !store.achievements.fullHouse) {
          store.achievements.fullHouse = true;
          saveAchievements();
          var fhInfo = ACHIEVEMENTS.find(function(a) { return a.key === "fullHouse"; });
          if (fhInfo && fhInfo.coinBonus) addCoins(fhInfo.coinBonus);
          addScrapbookEntry("achievement", "Full House — all 33 stars!", "star");
        }
        this.phase = "results";
        this.phaseTime = 0;
        this.scoreInT = 0;
        this.revealedStars = 0;
        this.starTimer = 0;
        this.confettiFired = false;
      }
      createReplay() {
        return SceneRegistry.create(this.gameId);
      }
      queueAchievement(key) {
        if (store.achievements[key]) return;
        store.achievements[key] = true;
        saveAchievements();
        const info = ACHIEVEMENTS.find((a) => a.key === key);
        if (info) {
          addScrapbookEntry("achievement", info.name + " unlocked!", "star");
          if (info.coinBonus) addCoins(info.coinBonus);
          this.achievementFreeze = Math.max(this.achievementFreeze, 0.5);
          this.achievementBanner = { name: info.name + (info.coinBonus ? " (+" + info.coinBonus + " coins)" : ""), time: 1.25, maxTime: 1.25 };
          audio.achievement();
          spawnParticleBurst(W / 2, 42, [COLORS.gold, COLORS.softPink], 12, ["star", "heart"]);
        }

      drawCountdown(c) {
        const t = this.phaseTime;
        let text = "3";
        if (t >= 1 && t < 2) text = "2";
        else if (t >= 2 && t < 3) text = "1";
        else if (t >= 3) text = "GO!";
        const local = t % 1;
        const scale = 1 + 0.2 * (1 - local);
        c.save();
        c.fillStyle = "rgba(92,68,52,0.22)";
        c.fillRect(0, 0, W, H);
        c.translate(W / 2, H / 2);
        c.scale(scale, scale);
        c.fillStyle = "#FFF8F0";
        c.strokeStyle = "#7A4E36";
        c.lineWidth = 8;
        c.textAlign = "center";
        c.font = '64px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.strokeText(text, 0, 0);

        c.font = '52px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("PAUSED", W / 2, 230);
        c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(isMobile ? "Choose an option below" : "Press Space or Esc to resume", W / 2, 262);
        const btns = this.pauseButtons();
        drawButton(c, btns.resume, "Resume", this.hoveredButton === "resume", "#7DB36C");
        drawButton(c, btns.quit, "Quit", this.hoveredButton === "quit", "#B86A58");
        c.restore();
      }
      drawResults(c, characterDraw) {
        c.save();
        c.fillStyle = "rgba(255,248,240,0.82)";
        c.fillRect(0, 0, W, H);

        /* confetti burst on 3 stars */
        if (this.resultsStars >= 3 && this.revealedStars >= 3 && !this.confettiFired) {
          this.confettiFired = true;
          const confettiColors = [COLORS.gold, COLORS.softPink, "#87CEEB", "#A8D870", "#FFB347", "#FF8FAA", "#C39BD3"];
          for (let i = 0; i < 40; i++) {
            game.particles.push({
              x: W / 2 + rand(-200, 200), y: rand(50, 200),
              vx: rand(-120, 120), vy: rand(-180, 40),
              life: rand(1.5, 3), maxLife: 3,
              size: rand(4, 8), rot: rand(0, 6.28), vr: rand(-5, 5),
              shape: Math.random() < 0.5 ? "star" : "heart",
              color: confettiColors[Math.floor(Math.random() * confettiColors.length)]
            });
          }
          audio.achievement();
        }

        c.fillStyle = "#7A4E36";
        c.textAlign = "center";
        c.font = '38px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(this.displayTitle + " Results", W / 2, 88);

        const scoreScale = easeOutBack(clamp(this.scoreInT, 0, 1));
        c.save();
        c.translate(W / 2, 166);
        c.scale(scoreScale, scoreScale);
        c.fillStyle = "#B84B3A";
        c.font = '54px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(Math.round(this.score), 0, 0);
        c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillStyle = "#8A6045";
        c.fillText("Score", 0, 34);
        c.restore();

        c.fillStyle = "#8A6045";
        c.font = '17px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("Personal Best  \u2605  " + this.personalBest, W / 2, 210);

        c.fillStyle = COLORS.gold;
        c.font = '15px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("+" + this.coinReward + " coins", W / 2, this.newBest ? 280 : 228);

        if (this.newBest) {
          const bestPulse = 1 + Math.sin(game.time * 4) * 0.04;
          c.save();
          c.translate(W / 2, 246);
          c.scale(bestPulse, bestPulse);
          rr(c, -120, -21, 240, 42, 18);
          c.fillStyle = "#E2B83B";
          c.fill();
          c.strokeStyle = "rgba(255,255,255,0.4)";
          c.lineWidth = 2;
          c.stroke();
          c.fillStyle = "#FFF8F0";
          c.font = '19px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.fillText("✦ New Personal Best! ✦", 0, 6);
          c.restore();
        }

        for (let i = 0; i < 3; i++) {
          const revealed = i < this.revealedStars;
          const t = revealed ? easeOutBack(clamp((this.phaseTime - i * 0.3) / 0.28, 0, 1)) : 0;
          c.save();
          c.translate(W / 2 - 64 + i * 64, 310);
          c.scale(t, t);
          if (revealed) {
            drawGlowCircle(c, 0, 0, 28, "rgba(255,215,0,ALPHA)", 0.15);
          }
          drawStar(c, 0, 0, 22, revealed ? COLORS.gold : "#D3C8B4");
          c.restore();

        /* celebration message for 3 stars */
        if (this.resultsStars >= 3 && this.revealedStars >= 3) {
          c.save();
          c.globalAlpha = clamp(this.phaseTime - 1.2, 0, 1);
          c.fillStyle = COLORS.gold;
          c.textAlign = "center";
          c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Perfect score! Amazing!", W / 2, 348);
          c.restore();

        characterDraw(c);

        const btns = this.resultsButtons();
        drawButton(c, btns.playAgain, "Play Again", this.hoveredButton === "again", "#7DB36C");
        drawButton(c, btns.back, "Back", this.hoveredButton === "back", "#B86A58");

      draw(c) {

        else if (this.phase === "countdown") this.drawCountdown(c);
        else if (this.phase === "play" && this.paused) this.drawPause(c);
        else if (this.phase === "results") this.drawResults(c, this.drawResultCharacter.bind(this));
        else if (this.phase === "ending") this.drawEndingOverlay(c);
        /* first-play hint */
        if (this.playHint && this.phase === "play") {
          c.save();
          c.globalAlpha = clamp(this.playHint.life / 0.5, 0, 1) * 0.85;
          c.fillStyle = "rgba(255,248,240,0.88)";
          rr(c, W/2 - 180, H - 60, 360, 34, 14);

          c.font = '14px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText(this.playHint.text, W/2, H - 38);

        }

      drawScene() {}
      drawInstructionIcon() {}
      drawResultCharacter() {}
      drawEndingOverlay() {}
    }


    // ═══ 15-scene-treat-toss.js ═══
    class TreatTossScene extends BaseMinigameScene {
      constructor() {
        super("treat", "Treat Toss", isMobile ? "Tap to toss treats to Obi! Consecutive catches build combos!" : "Click to toss treats to Obi! Consecutive catches build combos!", [300, 700, 1400], 60);
        this.treat = null;
        this.obiX = 120;
        this.obiPhase = 0;
        this.obiSpeed = 1;
        this.obiFacing = 1;
        this.catches = 0;
        this.goldenReady = false;
        this.happyTimer = 0;
        this.sadTimer = 0;
        this.rampStep = 0;
        this.perfectTimer = 0;
        this.goldenFlash = 0;
        this.missTimer = 0;
        this.speedUpTimer = 0;
      }
      enter() {
        super.enter();
        this.treat = null;
        this.obiX = 140;
        this.obiPhase = 0;
        this.obiSpeed = 1;
        this.obiFacing = 1;
        this.catches = 0;
        this.goldenReady = false;
        this.happyTimer = 0;
        this.sadTimer = 0;
        this.rampStep = 0;
        this.perfectTimer = 0;
        this.goldenFlash = 0;
        this.missTimer = 0;
        this.speedUpTimer = 0;
      }
      extraInteractiveAt() { return true; }
      onGameClick(x) {
        if (this.treat) return;
        const spawnX = W / 2 + 22;
        const spawnY = 104;
        const flight = 0.92;
        this.treat = {
          x: spawnX,
          y: spawnY,
          vx: (x - spawnX) / flight,
          vy: 30,
          gravity: 640,
          bounced: false,
          fade: 1,
          fading: false,
          golden: this.goldenReady
        };
        if (this.goldenReady) this.goldenReady = false;
        audio.menu();
      }
      updatePlay(dt) {
        if (this.playHintTimer <= 0 && !this.playHint && this.score === 0 && !this.treat) {
          this.playHint = { text: isMobile ? "Tap anywhere to toss a treat!" : "Click anywhere to toss a treat!", life: 5 };
          this.playHintTimer = -1;
        }
        const elapsed = this.duration - this.timeLeft;
        const newRamp = Math.floor(elapsed / 15);
        if (newRamp > this.rampStep) {
          this.rampStep = newRamp;
          this.obiSpeed = Math.pow(1.15, this.rampStep);
          this.speedUpTimer = 1.0;
          audio.pounce();
        }

        this.perfectTimer = Math.max(0, this.perfectTimer - dt);
        this.missTimer = Math.max(0, this.missTimer - dt);
        this.speedUpTimer = Math.max(0, this.speedUpTimer - dt);
        this.goldenFlash = Math.max(0, this.goldenFlash - dt);
        this.obiPhase += dt * (1.2 * this.obiSpeed);
        const prevX = this.obiX;
        this.obiX = 400 + Math.sin(this.obiPhase) * 250;
        this.obiFacing = this.obiX >= prevX ? 1 : -1;
        this.happyTimer = Math.max(0, this.happyTimer - dt);
        this.sadTimer = Math.max(0, this.sadTimer - dt);

        if (this.treat) {
          this.treat.x += this.treat.vx * dt;
          this.treat.y += this.treat.vy * dt;
          this.treat.vy += this.treat.gravity * dt;

          const obiY = 495;
          const catchX = this.obiX;
          if (!this.treat.fading && Math.abs(this.treat.x - catchX) < 48 && Math.abs(this.treat.y - obiY) < 44) {
            let value = (this.treat.golden ? 50 : 10) * this.combo;
            const perfect = Math.abs(this.treat.x - catchX) < 16 && Math.abs(this.treat.y - obiY) < 18;
            if (perfect) {
              value += 5 * this.combo;
              this.perfectTimer = 0.8;
              spawnParticleBurst(this.obiX, 454, [COLORS.gold, "#FFF4C0"], 12, ["star"]);
            }
            this.addScore(value);
            this.catches++;
            store.stats.totalTreatCatches++;
            store.stats.bestTreatCombo = Math.max(store.stats.bestTreatCombo, this.combo);
            saveStats();
            if (store.stats.totalTreatCatches >= 30) this.queueAchievement("obiBestFriend");
            this.combo++;
            if (this.combo >= 10) this.queueAchievement("comboStar");
            if (this.combo > 1 && this.combo % 5 === 0) audio.combo();
            this.happyTimer = 0.45;
            this.treat = null;
            if (this.catches > 0 && this.catches % 20 === 0) {
              this.goldenReady = true;
              this.goldenFlash = 1.2;
            }
            audio.catch();
            if (this.combo >= 5) screenShake(2, 0.12);
            spawnParticleBurst(this.obiX, 470, [COLORS.softPink, COLORS.gold], this.combo >= 3 ? 14 : 10, ["heart", "star"]);
            return;
          }

          const groundY = 525;
          if (!this.treat.fading && this.treat.y >= groundY) {
            if (!this.treat.bounced) {
              this.treat.bounced = true;
              this.treat.y = groundY;
              this.treat.vy *= -0.38;
            } else {
              this.treat.fading = true;
              this.treat.y = groundY;
              this.treat.vx *= 0.2;
              this.treat.vy = 0;
              this.combo = 1;
              this.sadTimer = 0.6;
              this.missTimer = 0.7;
              audio.miss();
            }
          }

          if (this.treat.fading) {
            this.treat.fade -= dt * 3.3;
            if (this.treat.fade <= 0) this.treat = null;
          }
        }
      }
      drawInstructionIcon(c, x, y) {
        c.save();
        c.translate(x, y);
        c.strokeStyle = "#7A4E36";
        c.lineWidth = 3;
        rr(c, -26, -16, 52, 32, 8);
        c.stroke();
        c.beginPath();
        c.moveTo(0, 18);
        c.lineTo(0, 38);
        c.stroke();
        c.beginPath();
        c.arc(-6, -2, 4, 0, Math.PI * 2);
        c.stroke();
        c.restore();
      }
      drawScene(c) {
        drawTreatBackdrop(c);

        if (!this.treat && this.phase === "play" && !this.paused) {
          drawAimPreview(c, W / 2 + 18, 98, game.mouse.x);
        }

        drawAnnie(c, 400, 120, 1.34, {
          pose: "upper",
          breath: Math.sin(game.time * 2),
          blink: blinkSignal(game.time + 0.3, 0.6),
          hairSway: Math.sin(game.time * 1.1),
          armRaise: this.treat ? 0.8 : 0.2
        });

        drawObi(c, this.obiX, 496, 1.02, {
          pose: "run",
          expression: this.sadTimer > 0 ? "sad" : (this.happyTimer > 0 ? "excited" : "happy"),
          tail: Math.sin(game.time * (this.happyTimer > 0 ? 12 : 7)),
          facing: this.obiFacing,
          bounce: this.happyTimer > 0 ? 0.14 * Math.sin(game.time * 18) : 0.06 * Math.sin(game.time * 8),
          earDroop: this.sadTimer > 0 ? 0.8 : 0
        });

        if (this.treat) {
          c.save();
          c.globalAlpha = this.treat.fade;

    // ═══ 15b-scene-bath-time.js ═══
    class BathTimeScene extends BaseMinigameScene {
      constructor() {
        super("bath", "Bath Time", isMobile ? "Tap and drag to scrub! Tap the tub to rinse! Drag to dry!" : "Click and drag to scrub! Click the tub to rinse! Drag to dry!", [120, 280, 500], 45);
        this.currentPet = "obi";
        this.washPhase = "scrub"; // scrub → rinse → dry
        this.cleanMeter = 0;
        this.dryMeter = 0;
        this.rinseCount = 0;
        this.rinsesNeeded = 5;
        this.bubbles = [];
        this.petsDone = 0;
        this.transitionTimer = 0;
        this.shakeTimer = 0;
        this.phaseStartTime = 0;
        this.petHitbox = { x: 310, y: 300, w: 180, h: 160 };
        this.tubHitbox = { x: 280, y: 380, w: 240, h: 80 };
      }
      updatePlay(dt) {
        this.shakeTimer = Math.max(0, this.shakeTimer - dt);

        // Transition between pets
        if (this.transitionTimer > 0) {
          this.transitionTimer -= dt;
          if (this.transitionTimer <= 0) {
            this.currentPet = "luna";
            this.washPhase = "scrub";
            this.cleanMeter = 0;
            this.dryMeter = 0;
            this.rinseCount = 0;
            this.bubbles = [];
            this.phaseStartTime = this.phaseTime;
          }
          return;
        }

        // Update bubbles
        for (let i = this.bubbles.length - 1; i >= 0; i--) {
          const b = this.bubbles[i];
          b.y += b.vy * dt;
          b.life -= dt;
          if (b.life <= 0) this.bubbles.splice(i, 1);
        }

        const mx = game.mouse.x, my = game.mouse.y;
        const overPet = pointInRect(mx, my, this.petHitbox);

        if (this.washPhase === "scrub") {
          if (game.mouse.down && overPet) {
            this.cleanMeter = clamp(this.cleanMeter + dt * 35, 0, 100);
            this.addScore(dt * 30);
            // Spawn bubbles
            if (Math.random() < dt * 12) {
              this.bubbles.push({ x: mx + rand(-20, 20), y: my + rand(-10, 10), size: rand(4, 10), life: rand(2, 4), vy: rand(-8, -3) });
            }
          }
          if (this.cleanMeter >= 100) {
            const elapsed = this.phaseTime - this.phaseStartTime;
            this.addScore(35 + Math.max(0, Math.round(15 - elapsed * 1.5)));
            audio.tinyChime();
            this.washPhase = "rinse";
            this.phaseStartTime = this.phaseTime;
            this.playHint = { life: 99, text: "Rinse! " + (isMobile ? "Tap" : "Click") + " the tub (" + this.rinseCount + "/" + this.rinsesNeeded + ")" };
          } else {
            this.playHint = { life: 99, text: "Scrub! " + Math.round(this.cleanMeter) + "%" };
          }
        } else if (this.washPhase === "rinse") {
          this.playHint = { life: 99, text: "Rinse! " + (isMobile ? "Tap" : "Click") + " the tub (" + this.rinseCount + "/" + this.rinsesNeeded + ")" };
        } else if (this.washPhase === "dry") {
          if (game.mouse.down && overPet) {
            this.dryMeter = clamp(this.dryMeter + dt * 30, 0, 100);
            this.addScore(dt * 25);
          }
          if (this.dryMeter >= 100) {
            const elapsed = this.phaseTime - this.phaseStartTime;
            this.addScore(35 + Math.max(0, Math.round(15 - elapsed * 1.5)));
            audio.combo();
            this.petsDone++;
            if (this.petsDone === 1) {
              this.transitionTimer = 1.5;
              this.playHint = { life: 99, text: "Great! Now Luna's turn..." };
            } else {
              // Both done! Combo bonus
              this.addScore(40);
              this.playHint = { life: 99, text: "Both pets squeaky clean!" };
              spawnParticleBurst(400, 350, [COLORS.gold, "#87CEEB", COLORS.softPink], 16, ["star", "heart"]);
              screenShake(4, 0.3);
              if (this.score >= 200) this.queueAchievement("squeakyClean");
            }
          } else {
            this.playHint = { life: 99, text: "Dry! " + Math.round(this.dryMeter) + "%" };
          }
        }
      }
      onGameClick(x, y) {
        if (this.transitionTimer > 0) return;
        if (this.washPhase === "rinse" && pointInRect(x, y, this.tubHitbox)) {
          this.rinseCount++;
          spawnParticleBurst(400, 380, ["#6CB4EE", "#A0D4FF"], 6, ["star"]);
          this.shakeTimer = 0.3;
          audio.tinyChime();
          // Remove some bubbles
          const toRemove = Math.min(this.bubbles.length, Math.ceil(this.bubbles.length / (this.rinsesNeeded - this.rinseCount + 1)));
          this.bubbles.splice(0, toRemove);
          if (this.rinseCount >= this.rinsesNeeded) {
            const elapsed = this.phaseTime - this.phaseStartTime;
            this.addScore(35 + Math.max(0, Math.round(15 - elapsed * 1.5)));
            audio.tinyChime();
            this.washPhase = "dry";
            this.phaseStartTime = this.phaseTime;
          }
        }
      }
      drawScene(c) {
        // Bathroom background
        const wallG = c.createLinearGradient(0, 0, 0, H * 0.6);
        wallG.addColorStop(0, "#D8E4EC");
        wallG.addColorStop(1, "#C8D4DC");
        c.fillStyle = wallG;
        c.fillRect(0, 0, W, H * 0.6);
        c.fillStyle = "#E8E8E8";
        c.fillRect(0, H * 0.6, W, H * 0.4);

        // Tile grid
        c.strokeStyle = "rgba(180,190,200,0.3)";
        c.lineWidth = 1;
        for (let tx = 0; tx < W; tx += 40) { c.beginPath(); c.moveTo(tx, 0); c.lineTo(tx, H); c.stroke(); }
        for (let ty = 0; ty < H; ty += 40) { c.beginPath(); c.moveTo(0, ty); c.lineTo(W, ty); c.stroke(); }

        // Shelf with bottles
        c.fillStyle = "#B0A090";
        rr(c, 580, 60, 160, 12, 4); c.fill();
        const bottleColors = ["#D04040", "#40A0D0", "#D0D040"];
        for (let bi = 0; bi < 3; bi++) {
          c.fillStyle = bottleColors[bi];
          rr(c, 600 + bi * 48, 20, 20, 40, 6); c.fill();
          c.fillStyle = "rgba(255,255,255,0.3)";
          rr(c, 604 + bi * 48, 24, 6, 28, 4); c.fill();
        }

        // Tub
        c.save();
        c.translate(400, 420);
        // Tub body
        const tubG = c.createLinearGradient(-120, -40, -120, 40);
        tubG.addColorStop(0, "#C0C8D0");
        tubG.addColorStop(0.5, "#A0A8B0");
        tubG.addColorStop(1, "#808890");
        c.fillStyle = tubG;
        c.beginPath();
        c.ellipse(0, 0, 120, 45, 0, 0, Math.PI * 2);
        c.fill();
        // Water surface
        c.fillStyle = "rgba(100,180,240,0.45)";
        c.beginPath();
        c.ellipse(0, -5, 105, 35, 0, 0, Math.PI * 2);
        c.fill();
        // Rim highlight
        c.strokeStyle = "rgba(255,255,255,0.4)";
        c.lineWidth = 2;
        c.beginPath();
        c.ellipse(0, -8, 115, 40, 0, Math.PI, Math.PI * 2);
        c.stroke();
        c.restore();

        // Pet
        if (this.transitionTimer <= 0) {
          const shake = this.shakeTimer > 0 ? Math.sin(game.time * 30) * 3 : 0;
          if (this.currentPet === "obi") {
            drawObi(c, 400 + shake, 390, 1.1, { pose: "bath", expression: "happy", bounce: this.shakeTimer > 0 ? 0.05 : 0, facing: 1 });
          } else {
            drawLuna(c, 400 + shake, 385, 1.0, { pose: "bath", facing: 1, wiggle: this.shakeTimer > 0 ? 0.1 : 0 });
          }
        } else {
          // Transition: show text
          c.fillStyle = COLORS.dark;
          c.textAlign = "center";
          c.font = '22px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Luna's turn!", W / 2, H / 2 - 20);
        }

        // Bubbles
        for (const b of this.bubbles) {
          c.save();
          c.globalAlpha = clamp(b.life / 2, 0, 0.7);
          const bg = c.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.size);
          bg.addColorStop(0, "rgba(255,255,255,0.8)");
          bg.addColorStop(0.5, "rgba(180,220,255,0.4)");
          bg.addColorStop(1, "rgba(180,220,255,0)");
          c.fillStyle = bg;
          c.beginPath(); c.arc(b.x, b.y, b.size, 0, Math.PI * 2); c.fill();
          c.restore();
        }

        // Phase meter
        let meter = 0, label = "";
        if (this.washPhase === "scrub") { meter = this.cleanMeter; label = "SCRUB"; }
        else if (this.washPhase === "rinse") { meter = (this.rinseCount / this.rinsesNeeded) * 100; label = "RINSE"; }
        else if (this.washPhase === "dry") { meter = this.dryMeter; label = "DRY"; }
        c.save();
        c.fillStyle = "rgba(0,0,0,0.15)";
        rr(c, 300, 520, 200, 18, 9); c.fill();
        if (meter > 0) {
          rr(c, 300, 520, 200 * clamp(meter / 100, 0, 1), 18, 9);
          c.fillStyle = this.washPhase === "scrub" ? "#87CEEB" : this.washPhase === "rinse" ? "#6CB4EE" : "#FFD700";
          c.fill();
        }
        c.fillStyle = "#fff";
        c.textAlign = "center";
        c.font = '12px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(label + " — " + this.currentPet.charAt(0).toUpperCase() + this.currentPet.slice(1), 400, 534);
        c.restore();
      }
      drawInstructionIcon(c, x, y) {
        drawObi(c, x - 20, y + 10, 0.5, { pose: "bath", facing: 1 });
        drawLuna(c, x + 30, y + 10, 0.45, { pose: "bath", facing: -1 });
      }
      drawResultCharacter(c) {
        drawObi(c, 350, 400, 0.9, { pose: "sit", expression: "excited", bounce: 0.04, facing: 1 });
        drawLuna(c, 450, 395, 0.85, { pose: "sit", wiggle: 0.02, facing: -1 });
      }
    }
    SceneRegistry.register("bath", () => new BathTimeScene());


    // ═══ 15c-scene-snack-sort.js ═══
    class SnackSortScene extends BaseMinigameScene {
      constructor() {
        super("sort", "Snack Sort", isMobile ? "Drag dog treats LEFT to Obi, cat treats RIGHT to Luna!" : "Drag dog treats LEFT to Obi, cat treats RIGHT to Luna!", [120, 280, 550], 60);
        this.treats = [];
        this.spawnTimer = 0;
        this.spawnInterval = 2.4;
        this.dragging = null;
        this.obiHappy = 0;
        this.lunaHappy = 0;
        this.wrongFlash = 0;
        this.correctStreak = 0;
        this.obiBowl = { x: 150, y: 520 };
        this.lunaBowl = { x: 650, y: 520 };
      }
      spawnTreat() {
        const isDog = Math.random() < 0.5;
        const dogSubs = ["bone", "round", "training"];
        const catSubs = ["fish", "roundCat", "premium"];
        const subs = isDog ? dogSubs : catSubs;
        const sub = subs[Math.floor(Math.random() * subs.length)];
        const elapsed = (this.duration - this.timeLeft) / this.duration;
        this.treats.push({
          x: rand(160, 640),
          y: -20,
          vy: rand(35, 55) * (1 + elapsed * 0.4),
          type: isDog ? "dog" : "cat",
          subtype: sub,
          points: sub === "premium" || sub === "training" ? 15 : 10,
          dragging: false,
          settled: false,
          settleTimer: 0
        });
      }
      updatePlay(dt) {
        this.obiHappy = Math.max(0, this.obiHappy - dt);
        this.lunaHappy = Math.max(0, this.lunaHappy - dt);
        this.wrongFlash = Math.max(0, this.wrongFlash - dt * 2);

        // Spawn treats
        this.spawnTimer -= dt;
        if (this.spawnTimer <= 0) {
          this.spawnTreat();
          const elapsed = (this.duration - this.timeLeft) / this.duration;
          this.spawnInterval = lerp(2.4, 1.2, elapsed);
          this.spawnTimer = this.spawnInterval;
        }

        // Drop detection: if dragging and mouse released
        if (this.dragging && !game.mouse.down) {
          this.dropTreat();
        }

        // Update treat positions
        for (let i = this.treats.length - 1; i >= 0; i--) {
          const t = this.treats[i];
          if (t.settled) {
            t.settleTimer -= dt;
            if (t.settleTimer <= 0) this.treats.splice(i, 1);
            continue;
          }
          if (t.dragging) {
            t.x = game.mouse.x;
            t.y = game.mouse.y;
            continue;
          }
          t.y += t.vy * dt;
          if (t.y > H + 30) {
            this.treats.splice(i, 1);
            this.combo = 1; // passive miss resets combo but NOT correctStreak
          }
        }
      }
      dropTreat() {
        const t = this.dragging;
        if (!t) return;
        t.dragging = false;
        this.dragging = null;
        if (t.y < 350) {
          t.vy = 60;
          return;
        }
        const obiSide = t.x < W / 2;
        const correct = (t.type === "dog" && obiSide) || (t.type === "cat" && !obiSide);
        if (correct) {
          this.addScore(t.points * this.combo);
          this.combo++;
          this.correctStreak++;
          t.settled = true; t.settleTimer = 0.5;
          spawnParticleBurst(obiSide ? 150 : 650, 450, [COLORS.gold, COLORS.softPink], 8, ["star", "heart"]);
          audio.catch();
          if (obiSide) this.obiHappy = 0.5; else this.lunaHappy = 0.5;
          if (this.correctStreak >= 10) this.queueAchievement("sortingPro");
        } else {
          this.addScore(-5);
          this.combo = 1;
          this.correctStreak = 0;
          this.wrongFlash = 1;
          t.settled = true; t.settleTimer = 0.3;
          audio.miss();
          screenShake(2, 0.1);
        }
      }
      onGameClick(x, y) {
        for (let i = this.treats.length - 1; i >= 0; i--) {
          const t = this.treats[i];
          if (t.settled || t.dragging) continue;
          if (dist(x, y, t.x, t.y) < 32) {
            t.dragging = true;
            this.dragging = t;
            return;
          }
        }
      }
      onMouseMove(x, y) {
        super.onMouseMove(x, y);
        if (this.dragging) {
          this.dragging.x = x;
          this.dragging.y = y;
        }
      }
      drawTreatShape(c, t) {
        c.save();
        c.translate(t.x, t.y);
        if (t.settled) c.globalAlpha = clamp(t.settleTimer / 0.3, 0, 1);
        c.scale(1.8, 1.8);
        if (t.subtype === "bone") {
          drawBone(c, 0, 0, 20, 10, "#D4A44C");
        } else if (t.subtype === "round") {
          c.fillStyle = "#A07040";
          c.beginPath(); c.arc(0, 0, 10, 0, Math.PI * 2); c.fill();
          c.fillStyle = "rgba(255,255,255,0.3)";
          c.beginPath(); c.arc(-3, -3, 4, 0, Math.PI * 2); c.fill();
        } else if (t.subtype === "training") {
          c.fillStyle = "#D4B88C";
          rr(c, -8, -5, 16, 10, 3); c.fill();
        } else if (t.subtype === "fish") {
          c.fillStyle = "#E88070";
          c.beginPath();
          c.ellipse(0, 0, 12, 6, 0, 0, Math.PI * 2);
          c.fill();
          c.beginPath(); c.moveTo(12, 0); c.lineTo(18, -6); c.lineTo(18, 6); c.closePath(); c.fill();
        } else if (t.subtype === "roundCat") {
          c.fillStyle = "#C08070";
          c.beginPath(); c.arc(0, 0, 9, 0, Math.PI * 2); c.fill();
          c.fillStyle = "rgba(255,255,255,0.25)";
          c.beginPath(); c.arc(-2, -2, 3.5, 0, Math.PI * 2); c.fill();
        } else if (t.subtype === "premium") {
          c.fillStyle = "#E89080";
          rr(c, -10, -6, 20, 12, 4); c.fill();
          c.fillStyle = "rgba(255,255,255,0.3)";
          rr(c, -7, -4, 8, 6, 2); c.fill();
        }
        c.restore();
      }
      drawScene(c) {
        // Background
        c.fillStyle = "#F8F0E8";
        c.fillRect(0, 0, W, H);

        // Divider
        c.setLineDash([6, 6]);
        c.strokeStyle = "rgba(150,120,90,0.3)";
        c.lineWidth = 2;
        c.beginPath(); c.moveTo(W / 2, 60); c.lineTo(W / 2, H); c.stroke();
        c.setLineDash([]);

        // Labels
        c.fillStyle = "rgba(100,80,60,0.5)";
        c.textAlign = "center";
        c.font = '14px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("\u2190 Dog Treats", 200, 80);
        c.fillText("Cat Treats \u2192", 600, 80);

        // Bowls
        c.save();
        c.fillStyle = "#D4A44C";
        c.beginPath(); c.ellipse(this.obiBowl.x, this.obiBowl.y, 40, 16, 0, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#E88070";
        c.beginPath(); c.ellipse(this.lunaBowl.x, this.lunaBowl.y, 40, 16, 0, 0, Math.PI * 2); c.fill();
        c.restore();

        // Pets
        const obiB = this.obiHappy > 0 ? 0.06 : 0;
        const lunaW = this.lunaHappy > 0 ? 0.1 : 0;
        drawObi(c, 150, 480, 0.9, { pose: "sit", expression: this.obiHappy > 0 ? "excited" : "happy", bounce: obiB, facing: 1 });
        drawLuna(c, 650, 470, 0.85, { pose: "sit", wiggle: lunaW, facing: -1 });

        // Wrong flash
        if (this.wrongFlash > 0) {
          c.save();
          c.globalAlpha = this.wrongFlash * 0.15;
          c.fillStyle = "#FF0000";
          c.fillRect(0, 0, W, H);
          c.restore();
        }

        // Treats
        for (const t of this.treats) {
          this.drawTreatShape(c, t);
        }

        // Combo display
        if (this.combo > 1) {
          c.save();
          c.fillStyle = COLORS.gold;
          c.textAlign = "center";
          c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText(this.combo + "x combo!", W / 2, 550);
          c.restore();
        }
      }
      drawInstructionIcon(c, x, y) {
        drawBone(c, x - 18, y, 18, 8, "#D4A44C");
        c.fillStyle = "#E88070";
        c.beginPath(); c.ellipse(x + 18, y, 10, 5, 0, 0, Math.PI * 2); c.fill();
      }
      drawResultCharacter(c) {
        drawObi(c, 340, 410, 0.85, { pose: "sit", expression: "excited", bounce: 0.04, facing: 1 });
        drawLuna(c, 460, 405, 0.8, { pose: "sit", wiggle: 0.03, facing: -1 });
      }
    }
    SceneRegistry.register("sort", () => new SnackSortScene());


    // ═══ 15d-scene-pillow-pop.js ═══
    const CUSHION_POSITIONS = [
      { x: 160, y: 420, color: "#E8B8A0" },
      { x: 290, y: 410, color: "#A8C686" },
      { x: 400, y: 400, color: "#FFB6C1" },
