          drawAnnie(c, 320, 370, 0.8, { pose: "cheer", breath: Math.sin(game.time * 2), blink: blinkSignal(game.time, 0.5), hairSway: Math.sin(game.time * 1.2) });
          drawObi(c, 420, 390, 0.7, { pose: "sit", expression: "happy", tail: Math.sin(game.time * 8) });
          drawLuna(c, 500, 382, 0.65, { pose: "sit", tail: Math.sin(game.time * 2), earTwitch: earSignal(game.time) });
          c.restore();

          /* click to continue */
          c.globalAlpha = a * (0.4 + Math.sin(game.time * 2.5) * 0.3);
          c.fillStyle = "#8A6045";
          c.font = '14px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText(isMobile ? "Tap anywhere to begin" : "Click anywhere to begin", W / 2, 454);

          c.restore();
        }
      }
    }

    class BaseMinigameScene extends BaseScene {
      constructor(gameId, title, instruction, thresholds, duration) {
        super(gameId);
        this.gameId = gameId;
        this.displayTitle = title;
        this.instruction = instruction;
        this.thresholds = thresholds;
        this.duration = duration;
        this.phase = "instructions";
        this.phaseTime = 0;
        this.timeLeft = duration;
        this.score = 0;
        this.scorePop = 0;
        this.combo = 1;
        this.hoveredButton = null;
        this.paused = false;
        this.achievementFreeze = 0;
        this.achievementBanner = null;
        this.newBest = false;
        this.resultsStars = 0;
        this.revealedStars = 0;
        this.starTimer = 0;
        this.scoreInT = 0;
        this.personalBest = 0;
        this.playHint = null;
        this.playHintTimer = 4;
      }
      enter() {
        this.phase = "instructions";
        this.phaseTime = 0;
        this.timeLeft = this.duration;
        this.score = 0;
        this.scorePop = 0;
        this.combo = 1;
        this.hoveredButton = null;
        this.paused = false;
        this.achievementFreeze = 0;
        this.achievementBanner = null;
        this.newBest = false;
        this.resultsStars = 0;
        this.revealedStars = 0;
        this.starTimer = 0;
        this.scoreInT = 0;
        this.personalBest = store["best_" + this.gameId] || 0;
      }
      resultsButtons() {
        return {
          playAgain: { x: 176, y: 500, w: 180, h: 58 },
          back: { x: 444, y: 500, w: 180, h: 58 }
        };
      }
      pauseButtons() {
        return {
          resume: { x: 270, y: 312, w: 120, h: 48 },
          quit: { x: 410, y: 312, w: 120, h: 48 }
        };
      }
      startCountdown() {
        this.phase = "countdown";
        this.phaseTime = 0;
      }
      startPlay() {
        this.phase = "play";
        this.phaseTime = 0;
      }
      update(dt) {
        super.update(dt);
        this.scorePop = Math.max(0, this.scorePop - dt * 4);
        if (this.achievementBanner) {
          this.achievementBanner.time -= dt;
          if (this.achievementBanner.time <= 0) this.achievementBanner = null;
        }
        if (this.phase === "instructions") {
          this.phaseTime += dt;
          if (this.phaseTime >= 3) this.startCountdown();
        } else if (this.phase === "countdown") {
          this.phaseTime += dt;
          if (this.phaseTime >= 4) this.startPlay();
        } else if (this.phase === "play") {
          if (!this.paused) {
            if (this.achievementFreeze > 0) {
              this.achievementFreeze -= dt;
            } else {
              this.timeLeft = Math.max(0, this.timeLeft - dt);
              this.updatePlay(dt);
              /* first-play hint timer */
              if (this.playHint) {
                this.playHint.life -= dt;
                if (this.playHint.life <= 0) this.playHint = null;
              } else if (this.playHintTimer > 0) {
                this.playHintTimer -= dt;
              }
              if (this.timeLeft <= 0) this.finishGame();
            }
          }
        } else if (this.phase === "ending") {
          this.updateEnding(dt);
        } else if (this.phase === "results") {
          this.phaseTime += dt;
          this.scoreInT = Math.min(1, this.phaseTime / 0.45);
          if (this.revealedStars < this.resultsStars) {
            this.starTimer += dt;
            if (this.starTimer >= 0.3) {
              this.starTimer = 0;
              this.revealedStars++;
              audio.tinyChime();
            }
          }
        }
      }
      updatePlay() {}
      updateEnding(dt) {
        this.phaseTime += dt;
        if (this.phaseTime > 1.2) this.finishGame();
      }
      addScore(value) {
        this.score += value;
        this.scorePop = 1;
      }
      onMouseMove(x, y) {
        this.hoveredButton = null;
        if (this.phase === "results") {
          const btns = this.resultsButtons();
          if (pointInRect(x, y, btns.playAgain)) this.hoveredButton = "again";
          else if (pointInRect(x, y, btns.back)) this.hoveredButton = "back";
        } else if (this.phase === "play" && this.paused) {
          const btns = this.pauseButtons();
          if (pointInRect(x, y, btns.resume)) this.hoveredButton = "resume";
          else if (pointInRect(x, y, btns.quit)) this.hoveredButton = "quit";
        }
      }
      interactiveAt(x, y) {
        if (this.phase === "results") {
          const b = this.resultsButtons();
          return pointInRect(x, y, b.playAgain) || pointInRect(x, y, b.back);
        }
        if (this.phase === "instructions") return true;
        if (this.phase === "countdown") return pointInRect(x, y, this.pauseButtonRect());
        if (this.phase === "play" && this.paused) {
          const b = this.pauseButtons();
          return pointInRect(x, y, b.resume) || pointInRect(x, y, b.quit);
        }
        if (this.phase === "play" && pointInRect(x, y, this.pauseButtonRect())) return true;
        return this.extraInteractiveAt ? this.extraInteractiveAt(x, y) : false;
      }
      onClick(x, y) {
        if (this.phase === "instructions") {
          audio.menu();
          this.startCountdown();
          return;
        }
        if (this.phase === "results") {
          const btns = this.resultsButtons();
          if (pointInRect(x, y, btns.playAgain)) {
            audio.menu();
            transitionTo(this.createReplay());
          } else if (pointInRect(x, y, btns.back)) {
            audio.menu();
            transitionTo(new HangoutScene());
          }
          return;
        }
        if (this.phase === "play" && this.paused) {
          const btns = this.pauseButtons();
          if (pointInRect(x, y, btns.resume)) {
            audio.menu();
            this.paused = false;
          } else if (pointInRect(x, y, btns.quit)) {
            audio.menu();
            transitionTo(new HangoutScene());
          }
          return;
        }
        if (this.phase === "countdown" && pointInRect(x, y, this.pauseButtonRect())) {
          audio.menu();
          transitionTo(new HangoutScene());
          return;
        }
        if (this.phase === "play") {
          if (pointInRect(x, y, this.pauseButtonRect())) {
            audio.menu();
            this.paused = true;
            return;
          }
          this.onGameClick(x, y);
        }
      }
      onGameClick() {}
      onKeyDown(key) {
        if (key === "Escape") {
          if (this.phase === "instructions" || this.phase === "countdown") {
            audio.menu();
            transitionTo(new HangoutScene());
          } else if (this.phase === "play") {
            this.paused = !this.paused;
          }
          return;
        }
        if (this.phase === "play" && key === " ") {
          this.paused = !this.paused;
        }
      }
      calculateStars(finalScore) {
        let stars = 0;
        if (finalScore >= this.thresholds[0]) stars = 1;
        if (finalScore >= this.thresholds[1]) stars = 2;
        if (finalScore >= this.thresholds[2]) stars = 3;
        return stars;
      }
      finishGame() {
        const finalScore = Math.round(this.gameId === "cuddle" ? this.score : this.score);
        this.resultsStars = this.calculateStars(finalScore);
        this.newBest = setBest(this.gameId, finalScore);
        this.personalBest = store["best_" + this.gameId] || finalScore;
        this.phase = "results";
        this.phaseTime = 0;
        this.scoreInT = 0;
        this.revealedStars = 0;
        this.starTimer = 0;
        this.confettiFired = false;
      }
      createReplay() {
        const map = { treat: TreatTossScene, laser: LaserChaseScene, cuddle: CuddlePileScene, walk: ObiWalkScene, nap: LunaNapScene };
        return new map[this.gameId]();

      queueAchievement(key) {
        if (store.achievements[key]) return;
        store.achievements[key] = true;
        saveAchievements();
        const info = ACHIEVEMENTS.find((a) => a.key === key);
        if (info) {

        }

        c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';

        c.fillStyle = "#8A6045";

        if (this.newBest) {
          const bestPulse = 1 + Math.sin(game.time * 4) * 0.04;
          c.save();
          c.translate(W / 2, 246);

          rr(c, -120, -21, 240, 42, 18);

          c.stroke();
          c.fillStyle = "#FFF8F0";

          c.fillText("✦ New Personal Best! ✦", 0, 6);
          c.restore();
        }

        for (let i = 0; i < 3; i++) {
          const revealed = i < this.revealedStars;
          const t = revealed ? easeOutBack(clamp((this.phaseTime - i * 0.3) / 0.28, 0, 1)) : 0;
          c.save();
          c.translate(W / 2 - 64 + i * 64, 310);
          c.scale(t, t);
          if (revealed) {
            drawGlowCircle(c, 0, 0, 28, "rgba(255,215,0,ALPHA)", 0.15);
          }
          drawStar(c, 0, 0, 22, revealed ? COLORS.gold : "#D3C8B4");
          c.restore();
        }

        /* celebration message for 3 stars */
        if (this.resultsStars >= 3 && this.revealedStars >= 3) {
          c.save();
          c.globalAlpha = clamp(this.phaseTime - 1.2, 0, 1);
          c.fillStyle = COLORS.gold;
          c.textAlign = "center";
          c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Perfect score! Amazing!", W / 2, 348);
          c.restore();
        }

        characterDraw(c);

        const btns = this.resultsButtons();
        drawButton(c, btns.playAgain, "Play Again", this.hoveredButton === "again", "#7DB36C");
        drawButton(c, btns.back, "Back", this.hoveredButton === "back", "#B86A58");
        c.restore();
      }
      draw(c) {
        this.drawScene(c);
        this.drawTopHud(c, true);
        if (this.phase === "instructions") this.drawInstructionCard(c, this.drawInstructionIcon.bind(this));
        else if (this.phase === "countdown") this.drawCountdown(c);
        else if (this.phase === "play" && this.paused) this.drawPause(c);
        else if (this.phase === "results") this.drawResults(c, this.drawResultCharacter.bind(this));
        else if (this.phase === "ending") this.drawEndingOverlay(c);
        /* first-play hint */
        if (this.playHint && this.phase === "play") {
          c.save();
          c.globalAlpha = clamp(this.playHint.life / 0.5, 0, 1) * 0.85;

          c.fillText(this.playHint.text, W/2, H - 38);
          c.restore();
        }
        drawAchievementBanner(c, this.achievementBanner);
      }
      drawScene() {}
      drawInstructionIcon() {}
      drawResultCharacter() {}
      drawEndingOverlay() {}
    }


    class TreatTossScene extends BaseMinigameScene {
      constructor() {
        super("treat", "Treat Toss", isMobile ? "Tap to toss treats to Obi! Consecutive catches build combos!" : "Click to toss treats to Obi! Consecutive catches build combos!", [200, 500, 1000], 60);
        this.treat = null;
        this.obiX = 120;
        this.obiPhase = 0;
        this.obiSpeed = 1;
        this.obiFacing = 1;
        this.catches = 0;
        this.goldenReady = false;
        this.happyTimer = 0;
        this.sadTimer = 0;
        this.rampStep = 0;
        this.perfectTimer = 0;
        this.goldenFlash = 0;
        this.missTimer = 0;
        this.speedUpTimer = 0;
      }
      enter() {
        super.enter();
        this.treat = null;
        this.obiX = 140;
        this.obiPhase = 0;
        this.obiSpeed = 1;
        this.obiFacing = 1;
        this.catches = 0;
        this.goldenReady = false;
        this.happyTimer = 0;
        this.sadTimer = 0;
        this.rampStep = 0;
        this.perfectTimer = 0;
        this.goldenFlash = 0;
        this.missTimer = 0;
        this.speedUpTimer = 0;
      }
      extraInteractiveAt() { return true; }
      onGameClick(x) {
        if (this.treat) return;
        const spawnX = W / 2 + 22;
        const spawnY = 104;
        const flight = 0.92;
        this.treat = {
          x: spawnX,
          y: spawnY,
          vx: (x - spawnX) / flight,
          vy: 30,
          gravity: 640,
          bounced: false,
          fade: 1,
          fading: false,
          golden: this.goldenReady
        };
        if (this.goldenReady) this.goldenReady = false;
        audio.menu();
      }
      updatePlay(dt) {
        if (this.playHintTimer <= 0 && !this.playHint && this.score === 0 && !this.treat) {
          this.playHint = { text: isMobile ? "Tap anywhere to toss a treat!" : "Click anywhere to toss a treat!", life: 5 };
          this.playHintTimer = -1;
        }
        const elapsed = this.duration - this.timeLeft;
        const newRamp = Math.floor(elapsed / 15);
        if (newRamp > this.rampStep) {
          this.rampStep = newRamp;
          this.obiSpeed = Math.pow(1.15, this.rampStep);
          this.speedUpTimer = 1.0;
          audio.pounce();
        }

        this.perfectTimer = Math.max(0, this.perfectTimer - dt);
        this.missTimer = Math.max(0, this.missTimer - dt);
        this.speedUpTimer = Math.max(0, this.speedUpTimer - dt);
        this.goldenFlash = Math.max(0, this.goldenFlash - dt);
        this.obiPhase += dt * (1.2 * this.obiSpeed);
        const prevX = this.obiX;
        this.obiX = 400 + Math.sin(this.obiPhase) * 250;
        this.obiFacing = this.obiX >= prevX ? 1 : -1;
        this.happyTimer = Math.max(0, this.happyTimer - dt);
        this.sadTimer = Math.max(0, this.sadTimer - dt);

        if (this.treat) {
          this.treat.x += this.treat.vx * dt;
          this.treat.y += this.treat.vy * dt;
          this.treat.vy += this.treat.gravity * dt;

          const obiY = 495;
          const catchX = this.obiX;
          if (!this.treat.fading && Math.abs(this.treat.x - catchX) < 48 && Math.abs(this.treat.y - obiY) < 44) {
            let value = (this.treat.golden ? 50 : 10) * this.combo;
            const perfect = Math.abs(this.treat.x - catchX) < 16 && Math.abs(this.treat.y - obiY) < 18;
            if (perfect) {
              value += 5 * this.combo;
              this.perfectTimer = 0.8;
              spawnParticleBurst(this.obiX, 454, [COLORS.gold, "#FFF4C0"], 12, ["star"]);
            }
            this.addScore(value);
            this.catches++;
            store.stats.totalTreatCatches++;
            store.stats.bestTreatCombo = Math.max(store.stats.bestTreatCombo, this.combo);
            saveStats();
            if (store.stats.totalTreatCatches >= 30) this.queueAchievement("obiBestFriend");
            this.combo++;
            if (this.combo >= 10) this.queueAchievement("comboStar");
            if (this.combo > 1 && this.combo % 5 === 0) audio.combo();
            this.happyTimer = 0.45;
            this.treat = null;
            if (this.catches > 0 && this.catches % 20 === 0) {
              this.goldenReady = true;
              this.goldenFlash = 1.2;
            }
            audio.catch();
            if (this.combo >= 5) screenShake(2, 0.12);
            spawnParticleBurst(this.obiX, 470, [COLORS.softPink, COLORS.gold], this.combo >= 3 ? 14 : 10, ["heart", "star"]);
            return;
          }

          const groundY = 525;
          if (!this.treat.fading && this.treat.y >= groundY) {
            if (!this.treat.bounced) {
              this.treat.bounced = true;
              this.treat.y = groundY;
              this.treat.vy *= -0.38;
            } else {
              this.treat.fading = true;
              this.treat.y = groundY;
              this.treat.vx *= 0.2;
              this.treat.vy = 0;
              this.combo = 1;
              this.sadTimer = 0.6;
              this.missTimer = 0.7;
              audio.miss();
            }
          }

          if (this.treat.fading) {
            this.treat.fade -= dt * 3.3;
            if (this.treat.fade <= 0) this.treat = null;
          }
        }
      }
      drawInstructionIcon(c, x, y) {
        c.save();
        c.translate(x, y);
        c.strokeStyle = "#7A4E36";
        c.lineWidth = 3;
        rr(c, -26, -16, 52, 32, 8);
        c.stroke();
        c.beginPath();
        c.moveTo(0, 18);
        c.lineTo(0, 38);
        c.stroke();
        c.beginPath();
        c.arc(-6, -2, 4, 0, Math.PI * 2);
        c.stroke();
        c.restore();
      }
      drawScene(c) {
        drawTreatBackdrop(c);

        if (!this.treat && this.phase === "play" && !this.paused) {
          drawAimPreview(c, W / 2 + 18, 98, game.mouse.x);
        }

        drawAnnie(c, 400, 120, 1.34, {
          pose: "upper",
          breath: Math.sin(game.time * 2),
          blink: blinkSignal(game.time + 0.3, 0.6),
          hairSway: Math.sin(game.time * 1.1),
          armRaise: this.treat ? 0.8 : 0.2
        });

        drawObi(c, this.obiX, 496, 1.02, {
          pose: "run",
          expression: this.sadTimer > 0 ? "sad" : (this.happyTimer > 0 ? "excited" : "happy"),
          tail: Math.sin(game.time * (this.happyTimer > 0 ? 12 : 7)),
          facing: this.obiFacing,
          bounce: this.happyTimer > 0 ? 0.14 * Math.sin(game.time * 18) : 0.06 * Math.sin(game.time * 8),
          earDroop: this.sadTimer > 0 ? 0.8 : 0
        });

        if (this.treat) {
          c.save();
          c.globalAlpha = this.treat.fade;
          if (this.treat.golden) {
            drawGlowCircle(c, this.treat.x, this.treat.y, 24, "rgba(255,215,0,ALPHA)", 0.22);
            spawnTrail(this.treat.x, this.treat.y, COLORS.gold);
          }
          drawBone(c, this.treat.x, this.treat.y, 22, 10, this.treat.golden ? COLORS.gold : "#8D5A2B");
          c.restore();
        }

        if (this.goldenReady) {
          const pulse = 1 + Math.sin(game.time * 8) * 0.04;
          c.save();
          c.translate(400, 76);
          c.scale(pulse, pulse);
          rr(c, -102, -20, 204, 38, 18);
          c.fillStyle = "rgba(255,215,0,0.92)";
          c.fill();
          c.fillStyle = "#7A4E36";
          c.textAlign = "center";
          c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Golden Bone Ready!", 0, 5);
          c.restore();
        }

        if (this.perfectTimer > 0) {
          c.save();
          c.globalAlpha = clamp(this.perfectTimer / 0.8, 0, 1);
          c.fillStyle = "#FFF4C0";
          c.strokeStyle = "#7A4E36";
          c.lineWidth = 5;
          c.font = '26px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.strokeText("Perfect Catch!", 400, 118);
          c.fillText("Perfect Catch!", 400, 118);
          c.restore();
        }
        if (this.missTimer > 0) {
          c.save();
          c.globalAlpha = clamp(this.missTimer / 0.4, 0, 1);
          c.fillStyle = COLORS.warmRed;

          c.textAlign = "center";
          c.strokeText("Miss!", 400, 118);
          c.fillText("Miss!", 400, 118);
          c.restore();
        }
        if (this.speedUpTimer > 0) {

      drawResultCharacter(c) {

    class LaserChaseScene extends BaseMinigameScene {
      constructor() {
        super("laser", "Luna's Laser Chase", isMobile ? "Drag your finger to control the laser dot! Lead Luna through the glowing targets!" : "Move your mouse to control the laser dot! Lead Luna through the glowing targets!", [150, 400, 800], 60);
        this.luna = { x: 220, y: 320, vx: 0, vy: 0, wiggle: 0, pounceTimer: 0, pounceTarget: null, pawBat: 0, facing: 1 };
        this.targets = [];
        this.spawnedTargetCap = 1;
        this.trail = [];
        this.scorePopups = [];
      }
      enter() {
        super.enter();
        this.luna = { x: 220, y: 320, vx: 0, vy: 0, wiggle: 0, pounceTimer: 0, pounceTarget: null, pawBat: 0, facing: 1 };
        this.targets = [];
        this.spawnedTargetCap = 1;
        this.trail = [];
        this.scorePopups = [];
        this.fillTargets();
      }
      obstacles() {
        return [
          { x: 44, y: 118, w: 160, h: 80 },
          { x: 272, y: 228, w: 150, h: 70 },
          { x: 608, y: 92, w: 100, h: 150 },
          { x: 588, y: 370, w: 96, h: 96 }
        ];
      }
      extraInteractiveAt() { return true; }
      onGameClick() {}
      fillTargets() {
        while (this.targets.length < this.spawnedTargetCap) this.targets.push(this.makeTarget());
      }
      makeTarget() {
        const obs = this.obstacles();
        const elapsed = this.duration - this.timeLeft;
        for (let attempt = 0; attempt < 80; attempt++) {
          const bonus = elapsed > 14 && Math.random() < 0.16;
          const t = { x: rand(80, W - 80), y: rand(110, H - 80), life: bonus ? 6.2 : 8, fade: 1, fading: false, pulse: rand(0, Math.PI * 2), bonus };
          let bad = false;
          for (const o of obs) {
            if (t.x > o.x - 32 && t.x < o.x + o.w + 32 && t.y > o.y - 32 && t.y < o.y + o.h + 32) { bad = true; break; }
          }
          if (!bad) return t;
        }
        return { x: rand(100, W - 100), y: rand(110, H - 90), life: 8, fade: 1, fading: false, pulse: rand(0, Math.PI * 2), bonus: false };
      }
      updatePlay(dt) {
        const elapsed = this.duration - this.timeLeft;
        this.spawnedTargetCap = elapsed >= 40 ? 2 : 1;
        this.fillTargets();

        for (let i = this.targets.length - 1; i >= 0; i--) {
          const t = this.targets[i];
          t.life -= dt;
          if (t.life <= 0 && !t.fading) {
            t.fading = true;
            if (this.combo > 1) {
              this.scorePopups.push({ x: t.x, y: t.y, text: "Miss!", life: 0.8 });
              audio.miss();
            }
            this.combo = 1;
          }
          if (t.fading) {
            t.fade -= dt * 2;
            if (t.fade <= 0) this.targets.splice(i, 1);
          }
        }
        this.fillTargets();

        this.luna.pawBat = Math.max(0, this.luna.pawBat - dt * 4);
        this.luna.wiggle += dt;
        const mx = clamp(game.mouse.x, 20, W - 20);
        const my = clamp(game.mouse.y, 60, H - 20);
        const d = dist(this.luna.x, this.luna.y, mx, my);
        const angle = Math.atan2(my - this.luna.y, mx - this.luna.x);
        this.luna.facing = mx >= this.luna.x ? 1 : -1;

        const lastTrail = this.trail[this.trail.length - 1];
        if (!lastTrail || dist(lastTrail.x, lastTrail.y, mx, my) > 8) {
          this.trail.push({ x: mx, y: my, life: 0.35 });
          if (this.trail.length > 14) this.trail.shift();
        }
        this.trail.forEach((p) => p.life -= dt);
        this.trail = this.trail.filter((p) => p.life > 0);

        if (this.luna.pounceTimer > 0) {
          this.luna.pounceTimer -= dt;
          if (this.luna.pounceTarget) {
            const px = this.luna.pounceTarget.x;
            const py = this.luna.pounceTarget.y;
            const ad = Math.atan2(py - this.luna.y, px - this.luna.x);
            this.luna.x += Math.cos(ad) * 280 * dt;
            this.luna.y += Math.sin(ad) * 280 * dt;
          }
          if (this.luna.pounceTimer <= 0) this.luna.pounceTarget = null;
        } else if (d < 50) {
          this.luna.pounceTimer = 0.5;
          this.luna.pounceTarget = { x: mx, y: my };
          audio.pounce();
        } else {
          const speed = d > 150 ? 72 : 142 + Math.sin(game.time * 10) * 15;
          const wobble = Math.sin(game.time * 5 + this.luna.y * 0.02) * 0.38;
          this.luna.x += Math.cos(angle + wobble) * speed * dt;
          this.luna.y += Math.sin(angle + wobble) * speed * dt;
        }

        this.luna.x = clamp(this.luna.x, 40, W - 40);
        this.luna.y = clamp(this.luna.y, 72, H - 40);

        for (let i = this.targets.length - 1; i >= 0; i--) {
          const t = this.targets[i];
          if (dist(this.luna.x, this.luna.y, t.x, t.y) < 30) {
            const pts = (t.bonus ? 35 : 20) * this.combo;
            this.addScore(pts);
            this.scorePopups.push({ x: t.x, y: t.y, text: "+" + pts, life: 1 });
            this.combo++;
            store.stats.bestLaserCombo = Math.max(store.stats.bestLaserCombo, this.combo);
            saveStats();
            if (this.score >= 400) this.queueAchievement("catWhisperer");
            if (this.combo >= 5) this.queueAchievement("pouncePerfect");
            if (this.combo > 1 && this.combo % 5 === 0) audio.combo();
            audio.targetHit();
            this.luna.pawBat = 1;
            spawnParticleBurst(t.x, t.y, t.bonus ? [COLORS.gold, COLORS.softPink, "#FFF4C0"] : [COLORS.gold, COLORS.softPink], t.bonus ? 16 : 12, ["star", "heart"]);
            this.targets.splice(i, 1);
            this.fillTargets();
            break;
          }
        }
        /* tick score popups */
        for (let i = this.scorePopups.length - 1; i >= 0; i--) {
          this.scorePopups[i].life -= dt;
          this.scorePopups[i].y -= 40 * dt;
          if (this.scorePopups[i].life <= 0) this.scorePopups.splice(i, 1);
        }
      }
      drawInstructionIcon(c, x, y) {
        c.save();
        c.translate(x, y);
        c.strokeStyle = "#7A4E36";
        c.lineWidth = 3;
        rr(c, -26, -16, 52, 32, 10);
        c.stroke();
        c.beginPath();
        c.moveTo(-8, -2);
        c.lineTo(8, -2);
        c.lineTo(8, 10);
        c.stroke();
        c.beginPath();
        c.arc(22, -24, 6, 0, Math.PI * 2);
        c.fillStyle = "#D32F2F";
        c.fill();
        c.restore();
      }
      drawScene(c) {
        drawLaserBackdrop(c);

        for (const t of this.trail) {
          c.save();
          c.globalAlpha = clamp(t.life / 0.35, 0, 1) * 0.35;
          drawGlowCircle(c, t.x, t.y, 18, "rgba(255,0,0,ALPHA)", 0.18);
          c.restore();
        }

        for (const t of this.targets) {
          c.save();
          c.globalAlpha = t.fade;
          if (t.bonus) {
            drawGlowCircle(c, t.x, t.y, 42 + Math.sin(game.time * 5 + t.pulse) * 6, "rgba(255,182,193,ALPHA)", 0.24);
            drawGlowCircle(c, t.x, t.y, 30 + Math.sin(game.time * 5 + t.pulse) * 4, "rgba(255,215,0,ALPHA)", 0.26);
          } else {
            drawGlowCircle(c, t.x, t.y, 34 + Math.sin(game.time * 4 + t.pulse) * 4, "rgba(255,215,0,ALPHA)", 0.3);
          }
          c.fillStyle = t.bonus ? COLORS.softPink : COLORS.gold;
          c.beginPath();
          c.arc(t.x, t.y, t.bonus ? 22 : 20, 0, Math.PI * 2);
          c.fill();
          c.fillStyle = "#FFF4C0";
          c.beginPath();
          c.arc(t.x, t.y, t.bonus ? 13 : 12, 0, Math.PI * 2);
          c.fill();
          c.restore();
        }

        drawGlowCircle(c, game.mouse.x, game.mouse.y, 24, "rgba(255,0,0,ALPHA)", 0.24);
        c.fillStyle = "#D32F2F";
        c.beginPath();
        c.arc(game.mouse.x, game.mouse.y, 5, 0, Math.PI * 2);
        c.fill();

        drawLuna(c, this.luna.x, this.luna.y + 8, 0.96, {
          pose: "topdown",
          tail: Math.sin(game.time * 2.4),
          wiggle: this.luna.pounceTarget ? (game.time * 4 % 1) : 0,
          earTwitch: earSignal(game.time + 1.1),
          pounceStretch: this.luna.pounceTarget ? 0.9 : 0,
          pawBat: this.luna.pawBat
        });

        /* score popups */
        for (const sp of this.scorePopups) {
          c.save();
          c.globalAlpha = clamp(sp.life, 0, 1);
          c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.strokeStyle = "rgba(60,40,20,0.7)";
          c.lineWidth = 3;
          c.strokeText(sp.text, sp.x, sp.y);
          c.fillStyle = COLORS.gold;
          c.fillText(sp.text, sp.x, sp.y);
          c.restore();
        }

        c.fillStyle = "rgba(92,68,52,0.5)";
        c.font = '15px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "center";
        c.fillText(isMobile ? "Drag to move the laser dot" : "Follow the laser dot", W / 2, 34);
      }
      drawResultCharacter(c) {
        drawLuna(c, 400, 405, 1.55, {
          pose: "sit",
          tail: Math.sin(game.time * 2.2),
          earTwitch: earSignal(game.time),
          blink: blinkSignal(game.time + 1.5, 0.45)
        });
      }
    }


    class CuddlePileScene extends BaseMinigameScene {
      constructor() {
        super("cuddle", "Cuddle Pile", isMobile ? "Keep everyone balanced on the couch! Tap the LEFT and RIGHT buttons to shift Annie's weight!" : "Keep everyone balanced on the couch! Press LEFT and RIGHT arrow keys to shift Annie's weight!", [30, 60, 90], 90);
        this.balance = 0;
        this.balanceTarget = 0;
        this.eventTimer = 0;
        this.bubble = null;
        this.failedSide = null;
        this.winState = false;
        this.btnFlash = { left: 0, right: 0 };
      }
      enter() {
        super.enter();
        this.balance = 0;
        this.balanceTarget = 0;
        this.eventTimer = rand(3.8, 4.8);
        this.bubble = null;
        this.failedSide = null;
        this.winState = false;
        this.btnFlash = { left: 0, right: 0 };
      }
      extraInteractiveAt(x, y) {
        if (isMobile) {
          const ab = this.cuddleArrowButtons();
          return pointInRect(x, y, ab.left) || pointInRect(x, y, ab.right);
        }
        return false;
      }
      onGameClick(x, y) {
        if (isMobile) {
          const ab = this.cuddleArrowButtons();
          if (pointInRect(x, y, ab.left)) {
            this.balanceTarget = clamp(this.balanceTarget - 10, -100, 100);
            this.btnFlash.left = 0.2;
          } else if (pointInRect(x, y, ab.right)) {
            this.balanceTarget = clamp(this.balanceTarget + 10, -100, 100);
            this.btnFlash.right = 0.2;
          }
        }
      }
      onKeyDown(key) {
        if (key === "Escape") {
          if (this.phase === "instructions" || this.phase === "countdown") {
            audio.menu();
            transitionTo(new HangoutScene());
          } else if (this.phase === "play") {
            this.paused = !this.paused;
          }
          return;
        }
        if (this.phase === "play") {
          if (key === " ") {
            this.paused = !this.paused;
            return;
          }
          if (key === "ArrowLeft") { this.balanceTarget = clamp(this.balanceTarget - 10, -100, 100); this.btnFlash.left = 0.2; }
          if (key === "ArrowRight") { this.balanceTarget = clamp(this.balanceTarget + 10, -100, 100); this.btnFlash.right = 0.2; }
        }
      }
      updatePlay(dt) {
        if (this.playHintTimer <= 0 && !this.playHint && this.score < 2) {
          this.playHint = { text: isMobile ? "Tap LEFT/RIGHT to keep balanced!" : "Press LEFT/RIGHT arrows to keep balanced!", life: 5 };
          this.playHintTimer = -1;
        }
        this.score = 90 - this.timeLeft;
        this.balance = lerp(this.balance, this.balanceTarget, dt * 6);
        this.btnFlash.left = Math.max(0, this.btnFlash.left - dt);
        this.btnFlash.right = Math.max(0, this.btnFlash.right - dt);
        if (this.bubble) {
          this.bubble.time -= dt;
          if (this.bubble.time <= 0) this.bubble = null;
        }
        const survived = this.score;
        let minGap = 4;
        let maxGap = 5;
        let shiftMin = 15;
        let shiftMax = 20;
        let allowDouble = false;
        if (survived >= 30) {
          minGap = 3;
          maxGap = 4;
          shiftMin = 20;
          shiftMax = 25;
        }
        if (survived >= 60) {
          minGap = 2;
          maxGap = 3;
          shiftMin = 20;
          shiftMax = 25;
          allowDouble = true;
        }
        this.eventTimer -= dt;
        if (this.eventTimer <= 0) {
          this.triggerFidget(shiftMin, shiftMax, allowDouble);
          this.eventTimer = rand(minGap, maxGap);
        }

        if (Math.abs(this.balance) >= 100) {
          this.failedSide = this.balance < 0 ? "obi" : "luna";
          this.phase = "ending";
          this.phaseTime = 0;
          return;
        }
        if (survived >= 90 && !this.winState) {
          this.winState = true;
          this.phase = "ending";
          this.phaseTime = 0;
          store.stats.bestCuddle = Math.max(store.stats.bestCuddle, 90);
          store.stats.cuddleWon = true;
          saveStats();
          this.queueAchievement("couchPotato");
          this.queueAchievement("maximumCozy");
          audio.lullaby();
          return;
        }
        if (survived >= 30) this.queueAchievement("couchPotato");
      }
      triggerFidget(shiftMin, shiftMax, allowDouble) {
        const obiLines = ["Obi dreams of squirrels!", "Obi stretches out!", "Obi rolls over!", "Obi kicks in his sleep!"];
        const lunaLines = ["Luna starts grooming!", "Luna kneads the cushion!", "Luna's tail goes wild!", "Luna stretches!"];
        const side = allowDouble && Math.random() < 0.18 ? "both" : (Math.random() < 0.5 ? "obi" : "luna");
        if (side === "obi" || side === "both") {
          const amount = -rand(shiftMin, shiftMax);
          this.balanceTarget = clamp(this.balanceTarget + amount, -100, 100);
          this.bubble = { who: "obi", text: obiLines[(Math.random() * obiLines.length) | 0], time: 1.2 };
        }
        if (side === "luna" || side === "both") {
          const amount = rand(shiftMin, shiftMax);
          this.balanceTarget = clamp(this.balanceTarget + amount, -100, 100);
          this.bubble = { who: side === "both" ? "both" : "luna", text: side === "both" ? "Double fidget chaos!" : lunaLines[(Math.random() * lunaLines.length) | 0], time: 1.2 };
        }
        audio.fidget();
      }
      updateEnding(dt) {
        this.phaseTime += dt;
        if (this.winState) {
          if (Math.random() < 0.4) spawnParticleBurst(rand(260, 540), rand(240, 420), [COLORS.softPink, COLORS.gold], 1, ["heart"]);
          if (this.phaseTime >= 2.3) {
            this.score = 90;
            this.finishGame();
          }
        } else if (this.phaseTime >= 1.3) {
          this.score = Math.floor(90 - this.timeLeft);
          this.finishGame();
        }
      }
      finishGame() {
        this.score = Math.round(this.score);
        this.resultsStars = this.calculateStars(this.score);
        this.newBest = setBest("cuddle", this.score);
        this.personalBest = store.best_cuddle;
        this.phase = "results";
        this.phaseTime = 0;
        this.scoreInT = 0;
        this.revealedStars = 0;
        this.starTimer = 0;
      }
      drawTopHud(c) {
        c.save();
        c.fillStyle = "rgba(92,68,52,0.82)";
        rr(c, 14, 12, 140, 42, 16);
        c.fill();
        rr(c, 200, 12, 430, 42, 16);
        c.fill();

        /* pause button */
        const pb = this.pauseButtonRect();
        const pbHover = pointInRect(game.mouse.x, game.mouse.y, pb);
        c.fillStyle = pbHover ? "rgba(92,68,52,0.92)" : "rgba(92,68,52,0.68)";
        rr(c, pb.x, pb.y, pb.w, pb.h, 12);
        c.fill();
        c.fillStyle = COLORS.cream;
        c.fillRect(pb.x + 13, pb.y + 10, 4, 16);
        c.fillRect(pb.x + 21, pb.y + 10, 4, 16);

        c.fillStyle = COLORS.cream;
        c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "left";
        c.fillText("Time: " + Math.floor(this.score) + "s", 28, 39);
        c.textAlign = "center";
        c.fillText("Balance Meter", 415, 39);
        c.strokeStyle = "#FFF8F0";
        c.lineWidth = 3;
        rr(c, 266, 22, 320, 20, 10);
        c.stroke();
        const markerX = lerp(276, 576, (this.balance + 100) / 200);
        c.fillStyle = "#7DB36C";
        rr(c, 270, 26, 152, 12, 6);
        c.fill();
        c.fillStyle = "#D39B6A";
        rr(c, 422, 26, 160, 12, 6);
        c.fill();
        c.fillStyle = COLORS.cream;
        c.beginPath();
        c.arc(markerX, 32, 10, 0, Math.PI * 2);
        c.fill();
        c.strokeStyle = "#7A4E36";
        c.stroke();
        c.restore();
      }
      cuddleArrowButtons() {
        return {
          left:  { x: 30,    y: H - 90, w: 110, h: 64 },
          right: { x: W - 140, y: H - 90, w: 110, h: 64 }
        };
      }
      drawScene(c) {
        drawLivingRoom(c, "cuddle");
        c.fillStyle = "rgba(255,255,255,0.06)";
        c.fillRect(0, 0, W, H);

        /* danger edge glow when balance is extreme */
        const absBal = Math.abs(this.balance);
        if (absBal > 60 && this.phase === "play" && !this.paused) {
          const danger = clamp((absBal - 60) / 40, 0, 1);
          const pulse = 0.12 + 0.08 * Math.sin(game.time * 6);
          const edgeAlpha = danger * pulse;
          const side = this.balance < 0 ? 0 : W;
          const grad = c.createLinearGradient(side, 0, side + (this.balance < 0 ? 120 : -120), 0);
          grad.addColorStop(0, `rgba(200,40,20,${edgeAlpha})`);
          grad.addColorStop(1, "rgba(200,40,20,0)");
          c.fillStyle = grad;
          c.fillRect(0, 0, W, H);
        }

        const tilt = this.balance / 100;

        c.save();
        c.translate(400, 330);
        c.rotate(tilt * 0.05);
        c.translate(-400, -330);

        drawObi(c, 300 + tilt * 14 + (this.failedSide === "obi" ? -this.phaseTime * 180 : 0), 360 + Math.abs(tilt) * 4 + (this.failedSide === "obi" ? this.phaseTime * 180 : 0), 1.04, this.winState ? {
          pose: "sleeping"
        } : {
          pose: "sit",
          expression: tilt < -0.45 ? "sad" : "happy",
          tail: Math.sin(game.time * 7) * (1 - Math.min(1, Math.abs(tilt))),
          bounce: 0.03 * Math.sin(game.time * 4)
        });

        drawAnnie(c, 402 + tilt * 8, 324, 1.22, this.winState ? {
          pose: "sleeping",
          breath: Math.sin(game.time * 1.5),
          blink: true,
          hairSway: Math.sin(game.time * 0.8),
          headTilt: 0.6
        } : {
          pose: "sit",
          breath: Math.sin(game.time * 2),
          blink: blinkSignal(game.time + 0.4, 0.6),
          hairSway: Math.sin(game.time * 1.2),
          headTilt: tilt * 0.25
        });

        drawLuna(c, 506 + tilt * 14 + (this.failedSide === "luna" ? this.phaseTime * 180 : 0), 352 + Math.abs(tilt) * 3 + (this.failedSide === "luna" ? this.phaseTime * 180 : 0), 1.02, this.winState ? {
          pose: "sleeping"
        } : {
          pose: "lounge",
          tail: Math.sin(game.time * 2.2),
          earTwitch: earSignal(game.time),
          blink: blinkSignal(game.time + 1.2, 0.45)
        });
        c.restore();

        c.fillStyle = "rgba(92,68,52,0.72)";
        c.font = '14px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "center";
        if (isMobile) {
          const ab = this.cuddleArrowButtons();
          const lHover = pointInRect(game.mouse.x, game.mouse.y, ab.left);
          const rHover = pointInRect(game.mouse.x, game.mouse.y, ab.right);
          const lFlash = this.btnFlash.left > 0;
          const rFlash = this.btnFlash.right > 0;
          c.fillStyle = lFlash ? "rgba(255,255,255,0.85)" : lHover ? "rgba(92,68,52,0.85)" : "rgba(92,68,52,0.55)";
          rr(c, ab.left.x, ab.left.y, ab.left.w, ab.left.h, 18);
          c.fill();
          c.fillStyle = rFlash ? "rgba(255,255,255,0.85)" : rHover ? "rgba(92,68,52,0.85)" : "rgba(92,68,52,0.55)";
          rr(c, ab.right.x, ab.right.y, ab.right.w, ab.right.h, 18);
          c.fill();
          c.font = '28px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillStyle = lFlash ? "#5C4434" : COLORS.cream;
          c.fillText("\u25C4 Left", ab.left.x + ab.left.w / 2, ab.left.y + 42);
          c.fillStyle = rFlash ? "#5C4434" : COLORS.cream;
          c.fillText("Right \u25BA", ab.right.x + ab.right.w / 2, ab.right.y + 42);
        } else {
          c.fillText("← Shift left", 150, 576);
          c.fillText("Shift right →", 650, 576);
        }

        if (this.bubble) {
          const bx = this.bubble.who === "obi" ? 258 : this.bubble.who === "luna" ? 556 : 400;
          const by = this.bubble.who === "obi" ? 270 : this.bubble.who === "luna" ? 244 : 230;
          drawTooltip(c, bx, by, "Fidget!", this.bubble.text, clamp(this.bubble.time / 1.2, 0, 1));
        }

        /* directional hint arrows (Update 13) */
        if (this.phase === "play" && !this.paused && Math.abs(this.balance) > 30) {
          const arrowAlpha = clamp((Math.abs(this.balance) - 30) / 40, 0, 0.6);
          const pulse = 0.7 + 0.3 * Math.sin(game.time * 4);
          const intensity = clamp((Math.abs(this.balance) - 30) / 70, 0, 1);
          const r = Math.floor(200 + 55 * intensity);
          const g2 = Math.floor(120 - 80 * intensity);
          const b = Math.floor(40 - 20 * intensity);
          c.save();
          c.globalAlpha = arrowAlpha * pulse;
          c.fillStyle = `rgb(${r},${g2},${b})`;
          if (this.balance < -30) {
            /* hint right */
            drawGlowCircle(c, 740, 300, 40, `rgba(${r},${g2},${b},ALPHA)`, 0.15);
            c.beginPath(); c.moveTo(720, 280); c.lineTo(760, 300); c.lineTo(720, 320); c.closePath(); c.fill();
            if (isMobile) {
              c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
              c.textAlign = "center";
              c.fillText("\u25BA", 740, 260);
            }
          } else {
            /* hint left */
            drawGlowCircle(c, 60, 300, 40, `rgba(${r},${g2},${b},ALPHA)`, 0.15);
            c.beginPath(); c.moveTo(80, 280); c.lineTo(40, 300); c.lineTo(80, 320); c.closePath(); c.fill();
            if (isMobile) {
              c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
              c.textAlign = "center";
              c.fillText("\u25C4", 60, 260);
            }
          }
          c.restore();
        }
      }
      drawEndingOverlay(c) {
        if (this.winState) {
          c.save();
          c.fillStyle = "rgba(255,248,240,0.18)";
          c.fillRect(0, 0, W, H);
          c.fillStyle = "#B84B3A";
          c.textAlign = "center";
          c.font = '42px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Maximum Cozy!", W / 2, 120);
          c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Everyone drifts into the happiest little cuddle nap.", W / 2, 154);
          c.restore();
        }
      }
      drawResultCharacter(c) {
        drawAnnie(c, 400, 416, 1.3, {
          pose: "sit",
          breath: Math.sin(game.time * 2),
          blink: blinkSignal(game.time, 0.6),
          hairSway: Math.sin(game.time * 1.1)
        });
        drawObi(c, 308, 426, 0.9, { pose: "sit", expression: "happy", tail: Math.sin(game.time * 8) });
        drawLuna(c, 500, 418, 0.88, { pose: "sit", tail: Math.sin(game.time * 2), earTwitch: earSignal(game.time) });
      }
    }

    /* ═══════════════════════════════════════════════════════
       Obi's Walk — side-scrolling walk through the neighborhood
       ═══════════════════════════════════════════════════════ */
    class ObiWalkScene extends BaseMinigameScene {
      constructor() {
        super("walk", "Obi's Walk", isMobile ? "Tap items along the path to let Obi sniff them! Tap squirrels before Obi chases them!" : "Click items along the path to let Obi sniff them! Click squirrels before Obi chases them!", [150, 300, 600], 45);
        this.scrollX = 0;
        this.obiY = 440;
        this.obiPose = "run";
        this.obiSniffTimer = 0;
        this.items = [];
        this.squirrels = [];
        this.collected = [];
        this.nextItemX = 500;
        this.missFlash = 0;
      }
      enter() {
        super.enter();
        this.scrollX = 0;
        this.obiPose = "run";
        this.obiSniffTimer = 0;
        this.items = [];
        this.squirrels = [];
        this.collected = [];
        this.nextItemX = 500;
        this.missFlash = 0;
        this.fillItems();
      }
      fillItems() {
        while (this.items.length < 4) {
          const types = ["hydrant", "bush", "mailbox", "flower", "bone"];
          const type = types[Math.floor(Math.random() * types.length)];
          const points = type === "bone" ? 30 : type === "flower" ? 20 : 15;
          this.items.push({ type, x: this.nextItemX, points, found: false, fade: 0 });
          this.nextItemX += rand(180, 280);
        }
        /* occasional squirrel */
        if (this.squirrels.length < 1 && Math.random() < 0.3) {
          this.squirrels.push({ x: this.nextItemX + rand(60, 140), y: rand(360, 420), caught: false, missed: false, timer: 2.5, fade: 1 });
        }
      }
      extraInteractiveAt() { return true; }
      onGameClick(x, y) {
        /* check squirrels first - generous hitbox */
        for (const sq of this.squirrels) {
          if (!sq.caught && !sq.missed && Math.abs(x - (sq.x - this.scrollX)) < 52 && Math.abs(y - sq.y) < 52) {
            sq.caught = true;
            this.addScore(25 * this.combo);
            this.combo++;
            audio.targetHit();
            spawnParticleBurst(x, y - 10, [COLORS.gold, "#FFF4C0"], 8, ["star"]);
            return;
          }
        }
        /* check items - generous hitbox for mobile */
        for (const it of this.items) {
          const ix = it.x - this.scrollX;
          if (!it.found && Math.abs(x - ix) < 56 && y > 340 && y < 490) {
            it.found = true;
            this.obiSniffTimer = 0.7;
            this.obiPose = "sniff";
            this.addScore(it.points * this.combo);
            this.combo++;
            audio.catch();
            this.collected.push({ x: ix, y: this.obiY - 40, text: "+" + (it.points * (this.combo - 1)), life: 1.2 });
            spawnParticleBurst(ix, this.obiY - 30, [COLORS.softPink, COLORS.gold], 6, ["heart", "star"]);
            return;
          }
        }
      }
      updatePlay(dt) {
        /* slow scroll while sniffing for better feel */
        const baseSpeed = 120 + (this.duration - this.timeLeft) * 1.5;
        const speed = this.obiSniffTimer > 0 ? baseSpeed * 0.25 : baseSpeed;
        this.scrollX += speed * dt;
        this.missFlash = Math.max(0, this.missFlash - dt * 3);

        /* obi sniff timer */
        if (this.obiSniffTimer > 0) {
          this.obiSniffTimer -= dt;
          if (this.obiSniffTimer <= 0) this.obiPose = "run";
        }

        /* remove off-screen items */
        this.items = this.items.filter(it => it.x - this.scrollX > -100);
        this.fillItems();

        /* update squirrels */
        for (let i = this.squirrels.length - 1; i >= 0; i--) {
          const sq = this.squirrels[i];
          if (sq.caught) {
            sq.fade -= dt * 3;
            if (sq.fade <= 0) this.squirrels.splice(i, 1);
          } else if (sq.missed) {
            /* squirrel runs away */
            sq.x -= 200 * dt;
            sq.y -= 80 * dt;
            sq.fade -= dt * 1.5;
            if (sq.fade <= 0) this.squirrels.splice(i, 1);
          } else if (sq.x - this.scrollX < -60) {
            this.squirrels.splice(i, 1);
          } else if (!sq.missed && sq.x - this.scrollX < 200) {
            sq.timer -= dt;
            if (sq.timer <= 0) {
              sq.missed = true;
              this.combo = 1;
              this.missFlash = 1;
              audio.miss();
            }
          }
        }

        /* floating score text */
        for (let i = this.collected.length - 1; i >= 0; i--) {
          this.collected[i].life -= dt;
          this.collected[i].y -= 30 * dt;
          if (this.collected[i].life <= 0) this.collected.splice(i, 1);
        }

        if (this.score >= 300) this.queueAchievement("goodWalker");
      }
      drawInstructionIcon(c, x, y) {
        drawBone(c, x, y, 26, 12, "#7A4E36");
      }
      drawScene(c) {
        /* sky */
        const skyG = c.createLinearGradient(0, 0, 0, 280);
        skyG.addColorStop(0, "#87CEEB");
        skyG.addColorStop(1, "#C8E8F8");
        c.fillStyle = skyG;
        c.fillRect(0, 0, W, 280);

        /* sun */
        c.fillStyle = "rgba(255,245,200,0.5)";
        c.beginPath(); c.arc(680, 60, 40, 0, Math.PI * 2); c.fill();

        /* clouds */
        c.fillStyle = "rgba(255,255,255,0.7)";
        for (let i = 0; i < 4; i++) {
          const cx = ((i * 260 + 100 - this.scrollX * 0.15) % (W + 200)) - 100;
          c.beginPath();
          c.ellipse(cx, 70 + i * 30, 50 + i * 10, 20, 0, 0, Math.PI * 2);
          c.ellipse(cx + 30, 65 + i * 30, 35, 16, 0, 0, Math.PI * 2);
          c.fill();
        }

        /* distant houses */
        const houseColors = ["#E8D4BC", "#D4BC9C", "#F0DCC8", "#DCCAB4", "#E0C8B0"];
        const roofColors = ["#C0392B", "#8E44AD", "#2980B9", "#27AE60", "#D35400"];
        for (let i = 0; i < 8; i++) {
          const hx = ((i * 140 + 40 - this.scrollX * 0.35) % (W + 300)) - 150;
          const hw = 80 + (i % 3) * 20;
          const hh = 70 + (i % 4) * 15;
          c.fillStyle = houseColors[i % houseColors.length];
          c.fillRect(hx, 260 - hh, hw, hh);
          c.fillStyle = roofColors[i % roofColors.length];
          c.beginPath();
          c.moveTo(hx - 8, 260 - hh);
          c.lineTo(hx + hw / 2, 260 - hh - 30);
          c.lineTo(hx + hw + 8, 260 - hh);
          c.closePath();
          c.fill();
          /* windows */
          c.fillStyle = "rgba(180,220,255,0.6)";
          c.fillRect(hx + 12, 260 - hh + 18, 14, 14);
          c.fillRect(hx + hw - 26, 260 - hh + 18, 14, 14);
          /* door */
          c.fillStyle = "#8B6B4A";
          rr(c, hx + hw / 2 - 8, 260 - 36, 16, 36, 3);
          c.fill();
        }

        /* trees */
        for (let i = 0; i < 6; i++) {
          const tx = ((i * 190 + 80 - this.scrollX * 0.45) % (W + 300)) - 100;
          c.fillStyle = "#8B6B4A";
          c.fillRect(tx + 10, 240, 10, 40);
          c.fillStyle = "#5B8C3E";
          c.beginPath(); c.arc(tx + 15, 230, 28 + (i % 3) * 6, 0, Math.PI * 2); c.fill();
          c.fillStyle = "#6EA84A";
          c.beginPath(); c.arc(tx + 10, 222, 20 + (i % 2) * 5, 0, Math.PI * 2); c.fill();
        }

        /* ground */
        c.fillStyle = "#78B84A";
        c.fillRect(0, 260, W, 40);
        /* sidewalk */
        c.fillStyle = "#D8D0C4";
        c.fillRect(0, 300, W, 160);
        /* sidewalk lines */
        c.strokeStyle = "rgba(180,170,155,0.3)";
        c.lineWidth = 2;
        for (let i = 0; i < 14; i++) {
          const lx = ((i * 70 - this.scrollX * 0.98) % (W + 70));
          c.beginPath(); c.moveTo(lx, 300); c.lineTo(lx, 460); c.stroke();
        }
        /* curb */
        c.fillStyle = "#C0B8A8";
        c.fillRect(0, 296, W, 6);

        /* draw items on sidewalk */
        for (const it of this.items) {
          const ix = it.x - this.scrollX;
          if (ix < -60 || ix > W + 60) continue;
          c.save();
          c.translate(ix, 420);
          if (it.found) {
            c.globalAlpha = 0.3;
            /* sparkle marker where item was */
            drawStar(c, 0, -10, 8, COLORS.gold);
          } else {
            /* draw item based on type */
            if (it.type === "hydrant") {
              c.fillStyle = "#D44040";
              rr(c, -10, -40, 20, 40, 4); c.fill();
              c.fillStyle = "#B83030";
              c.fillRect(-14, -32, 28, 6);
              c.fillRect(-6, -44, 12, 8);
            } else if (it.type === "bush") {
              c.fillStyle = "#4A8C30";
              c.beginPath(); c.ellipse(0, -18, 28, 22, 0, 0, Math.PI * 2); c.fill();
              c.fillStyle = "#5AA040";
              c.beginPath(); c.ellipse(-8, -24, 18, 16, 0, 0, Math.PI * 2); c.fill();
            } else if (it.type === "mailbox") {
              c.fillStyle = "#4A78B8";
              c.fillRect(-4, -40, 8, 40);
              rr(c, -16, -56, 32, 22, 6); c.fill();
              c.fillStyle = "#3A68A0";
              c.fillRect(-12, -42, 24, 4);
            } else if (it.type === "flower") {
              c.fillStyle = "#5A8A38";
              c.fillRect(-2, -24, 4, 24);
              c.fillStyle = "#FF8FAA";
              for (let p = 0; p < 5; p++) {
                const a = p * Math.PI * 2 / 5;
                c.beginPath(); c.arc(Math.cos(a) * 8, -30 + Math.sin(a) * 8, 5, 0, Math.PI * 2); c.fill();
              }
              c.fillStyle = "#FFD700";
              c.beginPath(); c.arc(0, -30, 4, 0, Math.PI * 2); c.fill();
            } else if (it.type === "bone") {
              drawGlowCircle(c, 0, -16, 20, "rgba(255,215,0,ALPHA)", 0.2);
              drawBone(c, 0, -16, 22, 10, "#FFD700");
            }
            /* sniff indicator - pulsing ? */
            if (ix > 60 && ix < 340) {
              const pulse = 0.7 + Math.sin(game.time * 5) * 0.3;
              c.globalAlpha = pulse;
              c.fillStyle = "#FFF8F0";
              c.strokeStyle = "#8A6045";
              c.lineWidth = 2;
              c.font = '20px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
              c.textAlign = "center";
              c.strokeText("?", 0, -56);
              c.fillText("?", 0, -56);
            }
          }
          c.restore();
        }

        /* draw squirrels */
        for (const sq of this.squirrels) {
          const sx = sq.x - this.scrollX;
          if (sx < -60 || sx > W + 60) continue;
          c.save();
          c.globalAlpha = sq.fade;
          c.translate(sx, sq.y);
          if (sq.caught) {
            c.globalAlpha = sq.fade * 0.5;
            drawStar(c, 0, -10, 10, COLORS.gold);
          } else {
            /* draw squirrel */
            c.fillStyle = "#A0704C";
            c.beginPath(); c.ellipse(0, -8, 14, 10, 0, 0, Math.PI * 2); c.fill(); /* body */
            c.fillStyle = "#8C604A";
            c.beginPath(); c.arc(-12, -14, 7, 0, Math.PI * 2); c.fill(); /* head */
            c.fillStyle = "#000";
            c.beginPath(); c.arc(-14, -16, 2, 0, Math.PI * 2); c.fill(); /* eye */
            /* bushy tail */
            c.fillStyle = "#B08060";
            c.beginPath();
            c.moveTo(10, -12);
            c.quadraticCurveTo(22, -32, 12, -36);
            c.quadraticCurveTo(4, -28, 8, -10);
            c.fill();
            /* warning indicator */
            if (!sq.caught && !sq.missed && sq.timer < 1.5) {
              const urgency = 1 - sq.timer / 1.5;
              c.fillStyle = `rgba(220,60,40,${0.5 + urgency * 0.5})`;
              c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
              c.textAlign = "center";
              c.fillText("!", 0, -36);
            }
          }
          c.restore();
        }

        /* warm glow behind Annie and Obi */
        drawGlowCircle(c, 210, 400, 140, "rgba(255,240,200,ALPHA)", 0.08);

        /* Annie upper body holding leash */
        drawAnnie(c, 160, 340, 0.9, {
          pose: "upper",
          breath: Math.sin(game.time * 2.5),
          blink: blinkSignal(game.time, 0.5),
          hairSway: Math.sin(game.time * 1.8),
          armRaise: 0.3
        });

        /* leash line */
        c.strokeStyle = "#8B6B4A";
        c.lineWidth = 2;
        c.beginPath();
        c.moveTo(190, 320);
        c.quadraticCurveTo(220, 380 + Math.sin(game.time * 3) * 4, 248, this.obiY - 30);
        c.stroke();

        /* Obi */
        drawObi(c, 260, this.obiY, 1.0, {
          pose: this.obiPose,
          expression: this.obiSniffTimer > 0 ? "excited" : "happy",
          tail: Math.sin(game.time * (this.obiPose === "run" ? 12 : 4)) * 0.9,
          bounce: this.obiPose === "run" ? 0.06 * Math.sin(game.time * 14) : 0,
          facing: 1
        });

        /* floating score text */
        for (const ft of this.collected) {
          c.save();
          c.globalAlpha = clamp(ft.life, 0, 1);
          c.fillStyle = COLORS.gold;
          c.strokeStyle = "#5C3D2E";
          c.lineWidth = 3;
          c.font = '20px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.strokeText(ft.text, ft.x, ft.y);
          c.fillText(ft.text, ft.x, ft.y);
          c.restore();
        }

        /* miss flash */
        if (this.missFlash > 0) {
          c.fillStyle = `rgba(200,40,20,${this.missFlash * 0.12})`;
          c.fillRect(0, 0, W, H);
        }
      }
      drawResultCharacter(c) {
        drawAnnie(c, 340, 410, 1.1, { pose: "cheer", breath: Math.sin(game.time * 2), blink: blinkSignal(game.time, 0.5), hairSway: Math.sin(game.time * 1.2) });
        drawObi(c, 460, 420, 1.2, { pose: "sit", expression: "excited", tail: Math.sin(game.time * 10), bounce: 0.06 * Math.sin(game.time * 8) });
      }
    }

    /* ═══════════════════════════════════════════════════════
       Luna's Nap Spot — place cushions in drifting sunbeams
       ═══════════════════════════════════════════════════════ */
    class LunaNapScene extends BaseMinigameScene {
      constructor() {
        super("nap", "Luna's Nap Spot", isMobile ? "Tap to place cushions in the sunbeams! Luna will nap on the coziest spot." : "Click to place cushions in the sunbeams! Luna will nap on the coziest spot.", [200, 450, 800], 60);
        this.beams = [];
        this.cushions = [];
        this.luna = { x: 400, y: 350, targetX: 400, targetY: 350, napping: false, napTimer: 0, facing: 1 };
        this.scoreRate = 0;
        this.napParticleTimer = 0;
        this.maxCushions = 3;
      }
      enter() {
        super.enter();
        this.beams = [];
        this.cushions = [];
        this.luna = { x: 400, y: 350, targetX: 400, targetY: 350, napping: false, napTimer: 0, facing: 1 };
        this.scoreRate = 0;
        this.napParticleTimer = 0;
        this.spawnBeams();
      }
      spawnBeams() {
        this.beams = [];
        const count = 2 + Math.floor((this.duration - this.timeLeft) / 20);
        for (let i = 0; i < Math.min(count, 4); i++) {
          this.beams.push({
            x: rand(120, W - 120),
            y: rand(200, 450),
            w: rand(90, 140),
            h: rand(100, 160),
            vx: rand(-15, 15),
            vy: rand(-5, 5),
            phase: rand(0, Math.PI * 2),
            life: rand(8, 14)
          });
        }
      }
      extraInteractiveAt() { return true; }
      onGameClick(x, y) {
        if (y < 100) return;
        /* place or remove cushion */
        /* check if clicking an existing cushion to pick it up */
        for (let i = this.cushions.length - 1; i >= 0; i--) {
          if (dist(x, y, this.cushions[i].x, this.cushions[i].y) < 30) {
            this.cushions.splice(i, 1);
            audio.menu();
            return;
          }
        }
        if (this.cushions.length >= this.maxCushions) {
          /* remove oldest with visual feedback */
          const old = this.cushions.shift();
          spawnParticleBurst(old.x, old.y - 6, ["rgba(200,170,210,0.6)"], 3, ["star"]);
        }
        this.cushions.push({ x, y, warmth: 0 });
        audio.tinyChime();
        spawnParticleBurst(x, y - 10, ["#FFF4C0"], 4, ["star"]);
      }
      updatePlay(dt) {
        if (this.playHintTimer <= 0 && !this.playHint && this.cushions.length === 0) {
          this.playHint = { text: isMobile ? "Tap in the bright spots to place cushions!" : "Click in the bright spots to place cushions!", life: 5 };
          this.playHintTimer = -1;
        }
        /* update sunbeams */
        for (let i = this.beams.length - 1; i >= 0; i--) {
          const b = this.beams[i];
          b.x += b.vx * dt + Math.sin(game.time * 0.5 + b.phase) * 8 * dt;
          b.y += b.vy * dt + Math.cos(game.time * 0.3 + b.phase) * 4 * dt;
          b.x = clamp(b.x, 60, W - 60);
          b.y = clamp(b.y, 150, 480);
          b.life -= dt;
          if (b.life <= 0) {
            this.beams.splice(i, 1);
          }
        }
        /* respawn beams */
        const targetCount = 2 + Math.floor((this.duration - this.timeLeft) / 18);
        while (this.beams.length < Math.min(targetCount, 4)) {
          this.beams.push({
            x: rand(120, W - 120),
            y: rand(200, 450),
            w: rand(90, 140),
            h: rand(100, 160),
            vx: rand(-15, 15),
            vy: rand(-5, 5),
            phase: rand(0, Math.PI * 2),
            life: rand(8, 14)
          });
        }

        /* calculate cushion warmth */
        for (const cu of this.cushions) {
          cu.warmth = 0;
          for (const b of this.beams) {
            const dx = Math.abs(cu.x - b.x) / (b.w * 0.5);
            const dy = Math.abs(cu.y - b.y) / (b.h * 0.5);
            if (dx < 1 && dy < 1) {
              cu.warmth += (1 - dx) * (1 - dy);
            }
          }
        }

        /* find best cushion */
        let bestCushion = null;
        let bestWarmth = 0.2;
        for (const cu of this.cushions) {
          if (cu.warmth > bestWarmth) { bestWarmth = cu.warmth; bestCushion = cu; }
        }

        /* Luna behavior */
        if (bestCushion) {
          this.luna.targetX = bestCushion.x;
          this.luna.targetY = bestCushion.y;
          const d = dist(this.luna.x, this.luna.y, bestCushion.x, bestCushion.y);
          if (d < 20 && bestCushion.warmth > 0.3) {
            if (!this.luna.napping) {
              this.luna.napping = true;
              this.luna.napTimer = 0;
            }
            this.luna.napTimer += dt;
            this.scoreRate = bestCushion.warmth * 3;
            this.addScore(this.scoreRate * dt * 10);
            this.napParticleTimer -= dt;
            if (this.napParticleTimer <= 0) {
              this.napParticleTimer = 0.8;
              spawnParticleBurst(this.luna.x, this.luna.y - 30, [COLORS.softPink, "#FFF4C0"], 2, ["heart"]);
            }
          } else {
            this.luna.napping = false;
            this.luna.napTimer = 0;
            this.scoreRate = 0;
          }
        } else {
          this.luna.targetX = 400 + Math.sin(game.time * 0.8) * 100;
          this.luna.targetY = 350;
          this.luna.napping = false;
          this.luna.napTimer = 0;
          this.scoreRate = 0;
        }

        /* move Luna */
        if (!this.luna.napping) {
          const dx = this.luna.targetX - this.luna.x;
          const dy = this.luna.targetY - this.luna.y;
          const d = Math.hypot(dx, dy);
          if (d > 3) {
            const speed = 90;
            this.luna.x += dx / d * speed * dt;
            this.luna.y += dy / d * speed * dt;
            this.luna.facing = dx >= 0 ? 1 : -1;
          }
        }
        this.luna.x = clamp(this.luna.x, 60, W - 60);
        this.luna.y = clamp(this.luna.y, 160, 500);

        if (this.score >= 400) this.queueAchievement("napMaster");
      }
      drawInstructionIcon(c, x, y) {
        drawHeart(c, x, y, 1.2, COLORS.softPink);
      }
      drawScene(c) {
        drawLivingRoom(c);
        c.fillStyle = "rgba(255,250,240,0.04)";
        c.fillRect(0, 0, W, H);

        /* sunbeams with dust motes */
        for (const b of this.beams) {
          const fadeEdge = clamp(b.life / 2, 0, 1);
          c.save();
          c.globalAlpha = 0.18 * fadeEdge;
          const g = c.createRadialGradient(b.x, b.y - b.h * 0.3, 10, b.x, b.y, Math.max(b.w, b.h) * 0.6);
          g.addColorStop(0, "rgba(255,240,180,1)");
          g.addColorStop(0.5, "rgba(255,230,150,0.5)");
          g.addColorStop(1, "rgba(255,220,120,0)");
          c.fillStyle = g;
          c.fillRect(b.x - b.w, b.y - b.h, b.w * 2, b.h * 2);

          /* beam shaft from top */
          c.globalAlpha = 0.06 * fadeEdge;
          c.fillStyle = "rgba(255,240,180,1)";
          c.beginPath();
          c.moveTo(b.x - b.w * 0.3, 0);
          c.lineTo(b.x + b.w * 0.3, 0);
          c.lineTo(b.x + b.w * 0.5, b.y + b.h * 0.3);
          c.lineTo(b.x - b.w * 0.5, b.y + b.h * 0.3);
          c.closePath();
          c.fill();

          /* floating dust motes in beam */
          c.globalAlpha = 0.35 * fadeEdge;
          c.fillStyle = "rgba(255,245,200,0.9)";
          for (let m = 0; m < 5; m++) {
            const mx = b.x + Math.sin(game.time * 0.7 + m * 2.3 + b.phase) * b.w * 0.35;
            const my = b.y + Math.cos(game.time * 0.5 + m * 1.7 + b.phase) * b.h * 0.3 - b.h * 0.1;
            const mr = 1.5 + Math.sin(game.time * 1.5 + m) * 0.8;
            c.beginPath(); c.arc(mx, my, mr, 0, Math.PI * 2); c.fill();
          }
          c.restore();
        }

        /* cushions with warmth indicators */
        for (const cu of this.cushions) {
          c.save();
          c.translate(cu.x, cu.y);
          const warm = clamp(cu.warmth, 0, 1);
          /* cushion shadow */
          c.fillStyle = "rgba(0,0,0,0.08)";
          c.beginPath(); c.ellipse(2, 6, 28, 10, 0, 0, Math.PI * 2); c.fill();
          /* cushion body - shifts from cool purple to warm golden */
          if (warm > 0.3) {
            const r = Math.round(200 + warm * 55);
            const g = Math.round(180 + warm * 60);
            const b = Math.round(160 + warm * 40);
            c.fillStyle = `rgb(${r},${g},${b})`;
          } else {
            c.fillStyle = "#C8ACD8";
          }
          c.beginPath(); c.ellipse(0, 0, 26, 14, 0, 0, Math.PI * 2); c.fill();
          /* cushion highlight */
          c.fillStyle = "rgba(255,255,255,0.3)";
          c.beginPath(); c.ellipse(-4, -4, 14, 7, -0.3, 0, Math.PI * 2); c.fill();
          /* warmth glow */
          if (warm > 0.2) {
            c.globalAlpha = warm * 0.35;
            drawGlowCircle(c, 0, 0, 34, "rgba(255,230,150,ALPHA)", 0.3);
          } else {
            /* cool indicator - subtle pulse to hint "move me" */
            c.globalAlpha = 0.15 + Math.sin(game.time * 3) * 0.08;
            c.strokeStyle = "#9880B0";
            c.lineWidth = 1.5;
            c.setLineDash([4, 4]);
            c.beginPath(); c.ellipse(0, 0, 30, 18, 0, 0, Math.PI * 2); c.stroke();
            c.setLineDash([]);
          }
          c.restore();
        }

        /* Luna */
        drawLuna(c, this.luna.x, this.luna.y, 1.05, {
          pose: this.luna.napping ? "sleeping" : (dist(this.luna.x, this.luna.y, this.luna.targetX, this.luna.targetY) > 10 ? "topdown" : "sit"),
          tail: Math.sin(game.time * (this.luna.napping ? 0.8 : 2.2)),
          earTwitch: earSignal(game.time),
          blink: this.luna.napping ? true : blinkSignal(game.time + 1.2, 0.45),
          facing: this.luna.facing
        });

        /* cozy meter display */
        if (this.scoreRate > 0 && this.luna.napping) {
          c.save();
          c.globalAlpha = 0.8;
          c.fillStyle = "#FFF8F0";
          c.strokeStyle = "#8A6045";
          c.lineWidth = 2;
          c.font = '14px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          const cozyLabel = this.scoreRate > 2 ? "Maximum Cozy!" : this.scoreRate > 1 ? "Very Cozy!" : "Cozy!";
          c.strokeText(cozyLabel, this.luna.x, this.luna.y - 60);
          c.fillText(cozyLabel, this.luna.x, this.luna.y - 60);
          c.restore();
        }

        /* HUD hint */
        c.fillStyle = "rgba(92,68,52,0.5)";
        c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "center";
        c.fillText("Cushions: " + this.cushions.length + " / " + this.maxCushions + "  •  " + (isMobile ? "Tap" : "Click") + " to place or pick up", W / 2, 580);
      }
      drawResultCharacter(c) {
        drawLuna(c, 400, 410, 1.4, { pose: "sleeping", tail: Math.sin(game.time * 0.8), earTwitch: 0, blink: true });
      }
    }

    function blinkSignal(t, offset = 0.6) {
      const mod = (t + offset) % 4.2;
      return mod < 0.14 || (mod > 2.4 && mod < 2.53);
    }
    function earSignal(t) {
      const mod = t % 3.8;
      if (mod < 0.18) return Math.sin(mod / 0.18 * Math.PI);
      return 0;
    }

    function maybeSparkle(x, y, dt) {
      if (game.particles.length > 260) return;
      if (Math.random() < dt * 6) {
        game.particles.push({
          x: x + rand(-30, 30),
          y: y + rand(-30, 24),
          vx: rand(-10, 10),
          vy: rand(-30, -10),
          life: 0.6,
          maxLife: 0.6,
          size: rand(4, 6),
          rot: rand(0, Math.PI * 2),
          vr: rand(-3, 3),
          shape: "star",
          color: COLORS.gold
        });
      }
    }

    function spawnTrail(x, y, color) {
      if (game.particles.length > 280) return;
      if (Math.random() < 0.55) {
        game.particles.push({
          x: x + rand(-4, 4),
          y: y + rand(-4, 4),
          vx: rand(-8, 8),
          vy: rand(-15, -5),
          life: 0.35,
          maxLife: 0.35,
          size: rand(3, 5),
          rot: rand(0, Math.PI * 2),
          vr: rand(-2, 2),
          shape: "star",
          color
        });
      }
    }

    function transitionTo(nextScene) {
      nextScene.enter();
      game.transition = {
        from: game.scene,
        to: nextScene,
        t: 0,
        duration: 0.6
      };
    }

    function currentScene() {
      return game.transition ? game.transition.from : game.scene;
    }

    function drawMuteIcon(c) {
      const hovered = pointInRect(game.mouse.x, game.mouse.y, { x: W - 54, y: 12, w: 40, h: 40 });
      drawSpeakerIcon(c, W - 34, 32, store.muted, hovered);
    }

    function handleMuteClick(x, y) {
      const rect = { x: W - 54, y: 12, w: 40, h: 40 };
      if (pointInRect(x, y, rect)) {
        audio.ensure();
        store.muted = !store.muted;
        saveBool("muted", store.muted);
        if (!store.muted) { audio.menu(); if (game.scene && game.scene.name === "hangout") audio.startAmbient(); }
        else { audio.stopAmbient(); }
        return true;
      }
      return false;
    }

    function loop(ts) {
      if (!game.last) game.last = ts;
      let dt = (ts - game.last) / 1000;
      game.last = ts;
      dt = clamp(dt, 0, 0.033);
      game.time += dt;

      updateSharedParticles(dt);

      if (game.transition) {
        game.transition.t += dt;
        if (game.transition.from) game.transition.from.update(dt);
        if (game.transition.t >= game.transition.duration) {
          game.scene = game.transition.to;
          game.transition = null;
        }
      } else if (game.scene) {
        game.scene.update(dt);
      }

      /* screen shake */
      if (game.shake > 0) {
        game.shake -= dt;
        const intensity = game.shakeIntensity * clamp(game.shake / 0.1, 0, 1);
        game.shakeX = (Math.random() - 0.5) * intensity * 2;
        game.shakeY = (Math.random() - 0.5) * intensity * 2;
      } else {
        game.shakeX = 0;
        game.shakeY = 0;
      }

      ctx.clearRect(0, 0, W, H);
      ctx.save();
      ctx.translate(game.shakeX, game.shakeY);
      if (game.transition) {
        const p = clamp(game.transition.t / game.transition.duration, 0, 1);
        if (game.transition.from) {
          ctx.save();
          ctx.globalAlpha = 1 - p;
          ctx.translate(W/2, H/2); ctx.scale(1 - p*0.03, 1 - p*0.03); ctx.translate(-W/2, -H/2);
          game.transition.from.draw(ctx);
          drawMuteIcon(ctx);
          ctx.restore();
        }
        ctx.save();
        ctx.globalAlpha = p;
        ctx.translate(W/2, H/2); ctx.scale(0.97 + p*0.03, 0.97 + p*0.03); ctx.translate(-W/2, -H/2);
        game.transition.to.draw(ctx);
        drawMuteIcon(ctx);
        ctx.restore();
      } else if (game.scene) {
        game.scene.draw(ctx);
        drawMuteIcon(ctx);
      }
      drawSharedParticles(ctx);

      /* warm vignette */
      ctx.save();
      const vg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.35, W/2, H/2, Math.max(W,H)*0.72);
      vg.addColorStop(0, "rgba(0,0,0,0)");
      vg.addColorStop(1, "rgba(40,25,15,0.18)");
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();

      ctx.restore(); /* end screen shake transform */

      if (game.scene || game.transition) {
        const activeScene = game.transition ? game.transition.from : game.scene;
        const overMute = pointInRect(game.mouse.x, game.mouse.y, { x: W - 54, y: 12, w: 40, h: 40 });
        canvas.style.cursor = (overMute || (activeScene && activeScene.interactiveAt(game.mouse.x, game.mouse.y))) ? "pointer" : "default";
      }

      requestAnimationFrame(loop);
    }

    canvas.addEventListener("mousemove", (e) => {
      const r = canvas.getBoundingClientRect();
      game.mouse.x = (e.clientX - r.left) * (canvas.width / r.width);
      game.mouse.y = (e.clientY - r.top) * (canvas.height / r.height);
      const activeScene = game.transition ? game.transition.from : game.scene;
      if (activeScene && activeScene.onMouseMove) activeScene.onMouseMove(game.mouse.x, game.mouse.y);
    });
    canvas.addEventListener("mousedown", () => { game.mouse.down = true; });
    window.addEventListener("mouseup", () => { game.mouse.down = false; });
    canvas.addEventListener("mouseleave", () => { game.mouse.down = false; });

    canvas.addEventListener("click", (e) => {
      const r = canvas.getBoundingClientRect();
      const x = (e.clientX - r.left) * (canvas.width / r.width);
      const y = (e.clientY - r.top) * (canvas.height / r.height);
      game.mouse.x = x;
      game.mouse.y = y;
      audio.ensure();
      if (game.transition) return;
      if (handleMuteClick(x, y)) return;
      const activeScene = game.scene;
      if (activeScene && activeScene.onClick) activeScene.onClick(x, y);
    });

    /* ── Touch support ── */
    function touchCoords(e) {
      const t = e.changedTouches[0];
      const r = canvas.getBoundingClientRect();
      return {
        x: (t.clientX - r.left) * (canvas.width / r.width),
        y: (t.clientY - r.top) * (canvas.height / r.height)
      };
    }
    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      const { x, y } = touchCoords(e);
      game.mouse.x = x;
      game.mouse.y = y;
      game.mouse.down = true;
      audio.ensure();
      if (game.transition) return;
      const activeScene = game.scene;
      if (activeScene && activeScene.onMouseMove) activeScene.onMouseMove(x, y);
      if (handleMuteClick(x, y)) return;
      if (activeScene && activeScene.onClick) activeScene.onClick(x, y);
    }, { passive: false });
    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();
      const { x, y } = touchCoords(e);
      game.mouse.x = x;
      game.mouse.y = y;
      const activeScene = game.transition ? game.transition.from : game.scene;
      if (activeScene && activeScene.onMouseMove) activeScene.onMouseMove(x, y);
    }, { passive: false });
    canvas.addEventListener("touchend", (e) => {
      e.preventDefault();
      game.mouse.down = false;
    }, { passive: false });
    canvas.addEventListener("touchcancel", (e) => {
      e.preventDefault();
      game.mouse.down = false;
    }, { passive: false });

    window.addEventListener("keydown", (e) => {
      game.keys[e.key] = true;
      const activeScene = game.transition ? game.transition.from : game.scene;
      if (activeScene && activeScene.onKeyDown) activeScene.onKeyDown(e.key);
      if ([" ", "ArrowLeft", "ArrowRight", "Escape"].includes(e.key)) e.preventDefault();
    });
    window.addEventListener("keyup", (e) => { game.keys[e.key] = false; });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        const activeScene = game.transition ? game.transition.from : game.scene;
        if (activeScene instanceof BaseMinigameScene && activeScene.phase === "play") activeScene.paused = true;
      }
    });

    buildStaticCaches();
    loadCozyArt();
    game.scene = new TitleScene();
    game.scene.enter();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
