    class PillowPopScene extends BaseMinigameScene {
      constructor() {
        super("pillow", "Pillow Pop",
          isMobile ? "Tap Luna when she pops up! Don't tap Obi!"
                   : "Click Luna when she pops up! Don't click Obi!",
          [150, 350, 650], 45);
        this.popups = [];
        this.spawnTimer = 0;
        this.spawnRate = 1.4;
        this.boopEffects = [];
        this.missEffects = [];
        this.streak = 0;
        this.obiAppearChance = 0.15;
      }
      updatePlay(dt) {
        const elapsed = this.duration - this.timeLeft;
        this.spawnRate = Math.max(0.5, 1.4 - elapsed * 0.018);
        const holdDuration = Math.max(0.4, 1.2 - elapsed * 0.015);
        this.obiAppearChance = Math.min(0.3, 0.15 + elapsed * 0.003);
        this.spawnTimer -= dt;
        if (this.spawnTimer <= 0 && this.popups.filter(p => !p.hit).length < 2) {
          this.spawnPopup(holdDuration);
          this.spawnTimer = this.spawnRate;
        }
        for (let i = this.popups.length - 1; i >= 0; i--) {
          const p = this.popups[i];
          if (p.phase === "rise") {
            p.riseT += dt * 4;
            if (p.riseT >= 1) { p.riseT = 1; p.phase = "hold"; }
          } else if (p.phase === "hold") {
            p.holdT += dt;
            if (p.holdT >= p.holdDuration) { p.phase = "fall"; }
          } else if (p.phase === "fall") {
            p.fallT += dt * 3;
            if (p.fallT >= 1) {
              if (p.type === "luna" && !p.hit) { this.combo = 1; this.streak = 0; }
              this.popups.splice(i, 1);
            }
          }
        }
        for (let i = this.boopEffects.length - 1; i >= 0; i--) {
          this.boopEffects[i].life -= dt;
          if (this.boopEffects[i].life <= 0) this.boopEffects.splice(i, 1);
        }
        for (let i = this.missEffects.length - 1; i >= 0; i--) {
          this.missEffects[i].life -= dt;
          if (this.missEffects[i].life <= 0) this.missEffects.splice(i, 1);
        }
        if (this.score >= 250) this.queueAchievement("whackQueen");
      }
      spawnPopup(holdDuration) {
        const usedSlots = this.popups.map(p => p.slot);
        const available = [0,1,2,3,4].filter(s => !usedSlots.includes(s));
        if (available.length === 0) return;
        const slot = available[Math.floor(Math.random() * available.length)];
        let type = "luna";
        const r = Math.random();
        if (r < this.obiAppearChance) type = "obi";
        else if (r < this.obiAppearChance + 0.08) type = "earFake";
        this.popups.push({ slot, type, riseT: 0, holdT: 0, holdDuration, fallT: 0, phase: "rise", hit: false });
      }
      onGameClick(x, y) {
        for (const p of this.popups) {
          if (p.hit || p.phase === "fall") continue;
          const pos = CUSHION_POSITIONS[p.slot];
          const visibility = p.phase === "rise" ? p.riseT : p.phase === "hold" ? 1 : 1 - p.fallT;
          if (visibility < 0.3) continue;
          const hitbox = { x: pos.x - 40, y: pos.y - 80 * visibility, w: 80, h: 80 * visibility };
          if (pointInRect(x, y, hitbox)) {
            if (p.type === "luna") {
              const pts = 15 * this.combo;
              this.addScore(pts);
              this.combo++;
              this.streak++;
              p.hit = true;
              p.phase = "fall"; p.fallT = 0.3;
              this.boopEffects.push({ x: pos.x, y: pos.y - 50, life: 0.6, text: "+" + pts });
              spawnParticleBurst(pos.x, pos.y - 50, [COLORS.softPink, COLORS.gold], 8, ["heart", "star"]);
              audio.catch();
              if (this.combo >= 5) screenShake(2, 0.1);
              if (this.combo > 1 && this.combo % 5 === 0) audio.combo();
              return;
            } else if (p.type === "obi") {
              this.addScore(-10);
              this.combo = 1;
              this.streak = 0;
              p.hit = true;
              p.phase = "fall";
              this.missEffects.push({ x: pos.x, y: pos.y - 50, life: 0.7 });
              audio.miss();
              screenShake(3, 0.15);
              return;
            }
            return;
          }
        }
      }
      drawScene(c) {
        drawLivingRoom(c);
        c.fillStyle = "rgba(40,28,18,0.15)";
        c.fillRect(0, 0, W, H);
        for (let i = 0; i < CUSHION_POSITIONS.length; i++) {
          const pos = CUSHION_POSITIONS[i];
          const popup = this.popups.find(p => p.slot === i);
          if (popup && !popup.hit) {
            const visibility = popup.phase === "rise" ? popup.riseT : popup.phase === "hold" ? 1 : 1 - popup.fallT;
            c.save();
            c.beginPath();
            c.rect(pos.x - 60, pos.y - 120, 120, 80 * visibility + 5);
            c.clip();
            if (popup.type === "luna") {
              drawLuna(c, pos.x, pos.y - 10, 0.85, { pose: "sit", tail: Math.sin(game.time * 3), earTwitch: earSignal(game.time + i), blink: blinkSignal(game.time + i * 0.7, 0.5), facing: i < 2 ? -1 : 1 });
            } else if (popup.type === "obi") {
              drawObi(c, pos.x, pos.y - 5, 0.8, { pose: "sit", expression: "happy", tail: Math.sin(game.time * 8), bounce: 0.03, facing: i < 2 ? 1 : -1 });
            } else if (popup.type === "earFake") {
              c.fillStyle = "#B8956A";
              const earY = pos.y - 10 - 20 * visibility;
              c.beginPath(); c.moveTo(pos.x - 12, earY + 14); c.lineTo(pos.x - 6, earY); c.lineTo(pos.x, earY + 14); c.fill();
              c.beginPath(); c.moveTo(pos.x + 6, earY + 14); c.lineTo(pos.x + 12, earY); c.lineTo(pos.x + 18, earY + 14); c.fill();
            }
            c.restore();
          }
          c.save();
          c.fillStyle = pos.color;
          c.beginPath(); c.ellipse(pos.x, pos.y, 52, 28, 0, 0, Math.PI * 2); c.fill();
          c.fillStyle = "rgba(255,255,255,0.2)";
          c.beginPath(); c.ellipse(pos.x - 8, pos.y - 6, 30, 14, -0.2, 0, Math.PI * 2); c.fill();
          c.fillStyle = "rgba(0,0,0,0.08)";
          c.beginPath(); c.ellipse(pos.x, pos.y + 16, 48, 10, 0, 0, Math.PI * 2); c.fill();
          c.restore();
        }
        for (const e of this.boopEffects) {
          c.save();
          c.globalAlpha = clamp(e.life / 0.3, 0, 1);
          c.fillStyle = COLORS.gold;
          c.font = '20px "Fredoka One", sans-serif';
          c.textAlign = "center";
          c.strokeStyle = "rgba(255,255,255,0.7)"; c.lineWidth = 3;
          c.strokeText(e.text, e.x, e.y - (0.6 - e.life) * 30);
          c.fillText(e.text, e.x, e.y - (0.6 - e.life) * 30);
          c.restore();
        }
        for (const e of this.missEffects) {
          c.save();
          c.globalAlpha = clamp(e.life / 0.3, 0, 1);
          c.fillStyle = COLORS.warmRed;
          c.font = '18px "Fredoka One", sans-serif';
          c.textAlign = "center";
          c.strokeStyle = "rgba(255,255,255,0.6)"; c.lineWidth = 3;
          c.strokeText("Obi! No!", e.x, e.y - (0.7 - e.life) * 25);
          c.fillText("Obi! No!", e.x, e.y - (0.7 - e.life) * 25);
          c.restore();
        }
        if (this.streak >= 3) {
          c.fillStyle = "rgba(255,248,240,0.7)";
          c.font = '14px "Fredoka One", sans-serif';
          c.textAlign = "center";
          c.fillText("Streak: " + this.streak + " boops!", W / 2, 86);
        }
      }
      drawInstructionIcon(c, x, y) {
        c.save(); c.translate(x, y);
        c.fillStyle = "#FFB6C1";
        c.beginPath(); c.ellipse(0, 8, 30, 16, 0, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#B8956A";
        c.beginPath(); c.moveTo(-10, 4); c.lineTo(-5, -12); c.lineTo(0, 4); c.fill();
        c.beginPath(); c.moveTo(6, 4); c.lineTo(11, -12); c.lineTo(16, 4); c.fill();
        c.restore();
      }
      drawResultCharacter(c) {
        drawLuna(c, 400, 405, 1.45, { pose: "sit", tail: Math.sin(game.time * 2.2), earTwitch: earSignal(game.time), blink: blinkSignal(game.time + 1.5, 0.45) });
      }
    }
    SceneRegistry.register("pillow", () => new PillowPopScene());


    // ═══ 15e-scene-wheres-luna.js ═══
    class WheresLunaScene extends BaseMinigameScene {
      constructor() {
        super("findluna", "Where's Luna?",
          isMobile ? "Watch where Luna hides, then tap the right cushion!"
                   : "Watch where Luna hides, then click the right cushion!",
          [100, 250, 500], 60);
        this.cushions = [
          { x: 200, y: 380, targetX: 200 },
          { x: 400, y: 380, targetX: 400 },
          { x: 600, y: 380, targetX: 600 }
        ];
        this.lunaSlot = 0;
        this.roundPhase = "show";
        this.roundTimer = 0;
        this.shuffleMoves = [];
        this.shuffleIndex = 0;
        this.shuffleT = 0;
        this.shuffleSpeed = 1.5;
        this.numShuffles = 2;
        this.round = 0;
        this.consecutiveCorrect = 0;
        this.revealResult = null;
        this.resultTimer = 0;
        this.pickable = false;
      }
      enter() {
        super.enter();
        this.round = 0;
        this.consecutiveCorrect = 0;
      }
      startPlay() {
        super.startPlay();
        this.startRound();
      }
      startRound() {
        this.round++;
        this.numShuffles = Math.min(8, 2 + Math.floor(this.round / 2));
        this.shuffleSpeed = Math.max(0.2, 1.2 - this.round * 0.08);
        this.lunaSlot = Math.floor(Math.random() * 3);
        this.roundPhase = "show";
        this.roundTimer = 0;
        this.pickable = false;
        this.revealResult = null;
        this.cushions[0].x = 200; this.cushions[0].targetX = 200;
        this.cushions[1].x = 400; this.cushions[1].targetX = 400;
        this.cushions[2].x = 600; this.cushions[2].targetX = 600;
        this.shuffleMoves = [];
        for (let i = 0; i < this.numShuffles; i++) {
          const a = Math.floor(Math.random() * 3);
          const b = (a + 1 + Math.floor(Math.random() * 2)) % 3;
          this.shuffleMoves.push({ a, b });
        }
        this.shuffleIndex = 0;
        this.shuffleT = 0;
      }
      updatePlay(dt) {
        this.roundTimer += dt;
        if (this.roundPhase === "show") {
          if (this.roundTimer >= 1.2) {
            this.roundPhase = "shuffle";
            this.roundTimer = 0;
            this.shuffleIndex = 0;
            this.shuffleT = 0;
          }
        } else if (this.roundPhase === "shuffle") {
          if (this.shuffleIndex >= this.shuffleMoves.length) {
            this.roundPhase = "pick";
            this.roundTimer = 0;
            this.pickable = true;
            return;
          }
          const swap = this.shuffleMoves[this.shuffleIndex];
          this.shuffleT += dt / this.shuffleSpeed;
          const ca = this.cushions[swap.a];
          const cb = this.cushions[swap.b];
          const t = easeOutQuad(clamp(this.shuffleT, 0, 1));
          const baseAX = [200, 400, 600][swap.a];
          const baseBX = [200, 400, 600][swap.b];
          ca.x = lerp(baseAX, baseBX, t);
          cb.x = lerp(baseBX, baseAX, t);
          if (this.shuffleT >= 1) {
            ca.x = baseBX; ca.targetX = baseBX;
            cb.x = baseAX; cb.targetX = baseAX;
            const tmp = this.cushions[swap.a];
            this.cushions[swap.a] = this.cushions[swap.b];
            this.cushions[swap.b] = tmp;
            if (this.lunaSlot === swap.a) this.lunaSlot = swap.b;
            else if (this.lunaSlot === swap.b) this.lunaSlot = swap.a;
            this.shuffleIndex++;
            this.shuffleT = 0;
            this.cushions[0].x = this.cushions[0].targetX;
            this.cushions[1].x = this.cushions[1].targetX;
            this.cushions[2].x = this.cushions[2].targetX;
            audio.menu();
          }
        } else if (this.roundPhase === "pick") {
          if (this.roundTimer >= 4) {
            this.revealResult = "wrong";
            this.roundPhase = "reveal";
            this.roundTimer = 0;
            this.combo = 1;
            this.consecutiveCorrect = 0;
            audio.miss();
          }
        } else if (this.roundPhase === "reveal") {
          if (this.roundTimer >= 1.5) {
            this.startRound();
          }
        }
      }
      onGameClick(x, y) {
        if (!this.pickable) return;
        for (let i = 0; i < 3; i++) {
          const cx = this.cushions[i].x;
          if (Math.abs(x - cx) < 70 && Math.abs(y - 380) < 50) {
            this.pickable = false;
            const pickTime = this.roundTimer;
            this.roundPhase = "reveal";
            this.roundTimer = 0;
            if (i === this.lunaSlot) {
              const speedBonus = Math.max(0, Math.round(20 - pickTime * 5));
              const pts = (20 + speedBonus) * this.combo;
              this.addScore(pts);
              this.combo++;
              this.consecutiveCorrect++;
              this.revealResult = "correct";
              spawnParticleBurst(cx, 340, [COLORS.gold, COLORS.softPink], 12, ["star", "heart"]);
              audio.catch();
              if (this.consecutiveCorrect >= 8) this.queueAchievement("sharpEye");
              if (this.combo > 1 && this.combo % 5 === 0) audio.combo();
            } else {
              this.revealResult = "wrong";
              this.combo = 1;
              this.consecutiveCorrect = 0;
              audio.miss();
              screenShake(2, 0.12);
            }
            return;
          }
        }
      }
      drawScene(c) {
        drawLivingRoom(c);
        c.fillStyle = "rgba(40,28,18,0.2)";
        c.fillRect(0, 0, W, H);
        const cushionColors = ["#E8B8A0", "#A8C686", "#C39BD3"];
        for (let i = 0; i < 3; i++) {
          const cx = this.cushions[i].x;
          const cy = 380;
          if (i === this.lunaSlot && this.roundPhase === "show") {
            drawLuna(c, cx, cy - 30, 0.7, { pose: "sit", tail: Math.sin(game.time * 3), blink: blinkSignal(game.time, 0.5), facing: 1 });
          }
          if (i === this.lunaSlot && this.roundPhase === "reveal") {
            drawLuna(c, cx, cy - 30, 0.7, { pose: "sit", tail: Math.sin(game.time * 4), earTwitch: earSignal(game.time), facing: 1 });
          }
          if (!(this.roundPhase === "reveal" && i === this.lunaSlot)) {
            c.save();
            const hover = this.pickable && pointInRect(game.mouse.x, game.mouse.y, { x: cx - 70, y: cy - 50, w: 140, h: 100 });
            if (hover) drawGlowCircle(c, cx, cy, 70, "rgba(255,215,0,ALPHA)", 0.15);
            c.fillStyle = cushionColors[i % 3];
            c.beginPath(); c.ellipse(cx, cy, 60, 35, 0, 0, Math.PI * 2); c.fill();
            c.fillStyle = "rgba(255,255,255,0.15)";
            c.beginPath(); c.ellipse(cx - 10, cy - 8, 35, 18, -0.15, 0, Math.PI * 2); c.fill();
            if (this.roundPhase === "pick") {
              c.fillStyle = "rgba(92,68,52,0.5)";
              c.font = '28px "Fredoka One", sans-serif';
              c.textAlign = "center";
              c.fillText("?", cx, cy + 10);
            }
            c.restore();
          }
        }
        if (this.roundPhase === "reveal" && this.revealResult) {
          c.save();
          c.globalAlpha = clamp(1 - this.roundTimer / 1.2, 0, 1);
          c.font = '32px "Fredoka One", sans-serif';
          c.textAlign = "center";
          if (this.revealResult === "correct") {
            c.fillStyle = COLORS.gold;
            c.strokeStyle = "rgba(255,255,255,0.7)"; c.lineWidth = 4;
            c.strokeText("Found her!", W / 2, 200);
            c.fillText("Found her!", W / 2, 200);
          } else {
            c.fillStyle = COLORS.warmRed;
            c.strokeStyle = "rgba(255,255,255,0.6)"; c.lineWidth = 4;
            c.strokeText("Not there!", W / 2, 200);
            c.fillText("Not there!", W / 2, 200);
          }
          c.restore();
        }
        if (this.roundPhase === "shuffle") {
          c.fillStyle = "rgba(92,68,52,0.4)";
          c.font = '14px "Fredoka One", sans-serif';
          c.textAlign = "center";
          c.fillText("Shuffling... " + (this.shuffleIndex + 1) + "/" + this.shuffleMoves.length, W / 2, 300);
        }
        c.fillStyle = "rgba(92,68,52,0.4)";
        c.font = '13px "Fredoka One", sans-serif';
        c.textAlign = "center";
        c.fillText("Round " + this.round, W / 2, 86);
      }
      drawInstructionIcon(c, x, y) {
        c.save(); c.translate(x, y);
        for (let i = -1; i <= 1; i++) {
          c.fillStyle = ["#E8B8A0", "#A8C686", "#C39BD3"][i + 1];
          c.beginPath(); c.ellipse(i * 30, 0, 22, 14, 0, 0, Math.PI * 2); c.fill();
        }
        c.fillStyle = "#7A4E36";
        c.font = '16px "Fredoka One", sans-serif';
        c.textAlign = "center";
        c.fillText("?", 0, 6);
        c.restore();
      }
      drawResultCharacter(c) {
        drawLuna(c, 400, 405, 1.5, { pose: "sit", tail: Math.sin(game.time * 2.4), earTwitch: earSignal(game.time), blink: blinkSignal(game.time + 1, 0.4) });
      }
    }
    SceneRegistry.register("findluna", () => new WheresLunaScene());


    // ═══ 15f-scene-window-watch.js ═══
    class WindowWatchScene extends BaseMinigameScene {
      constructor() {
        super("window", "Window Watch",
          isMobile ? "Tap birds and butterflies! Don't tap the leaves!"
                   : "Click birds and butterflies! Don't click the leaves!",
          [150, 400, 750], 60);
        this.flyers = [];
        this.spawnTimer = 0;
        this.spawnRate = 1.2;
        this.lunaReact = 0;
        this.scorePopups = [];
        this.leafWarning = 0;
        this.goldenReady = false;
      }
      updatePlay(dt) {
        const elapsed = this.duration - this.timeLeft;
        this.spawnRate = Math.max(0.3, 1.2 - elapsed * 0.012);
        this.lunaReact = Math.max(0, this.lunaReact - dt);
        this.leafWarning = Math.max(0, this.leafWarning - dt * 3);
        this.spawnTimer -= dt;
        if (this.spawnTimer <= 0) {
          this.spawnFlyer(elapsed);
          this.spawnTimer = this.spawnRate;
        }
        for (let i = this.flyers.length - 1; i >= 0; i--) {
          const f = this.flyers[i];
          f.x += f.vx * dt;
          f.y += Math.sin(game.time * 2 + f.phase) * (f.type === "leaf" ? 30 : 15) * dt;
          f.wingPhase += dt * (f.type === "butterfly" || f.type === "golden" ? 16 : 10);
          if ((f.vx > 0 && f.x > W + 40) || (f.vx < 0 && f.x < -40)) {
            if (f.alive && (f.type === "bird" || f.type === "butterfly" || f.type === "golden")) {
              this.combo = 1;
            }
            this.flyers.splice(i, 1);
          }
        }
        for (let i = this.scorePopups.length - 1; i >= 0; i--) {
          this.scorePopups[i].life -= dt;
          this.scorePopups[i].y -= 35 * dt;
          if (this.scorePopups[i].life <= 0) this.scorePopups.splice(i, 1);
        }
        if (this.combo >= 5 && !this.goldenReady) {
          this.goldenReady = true;
        }
        if (this.score >= 300) this.queueAchievement("birdWatcher");
      }
      spawnFlyer(elapsed) {
        const fromLeft = Math.random() < 0.5;
        const x = fromLeft ? -30 : W + 30;
        const dir = fromLeft ? 1 : -1;
        const speed = rand(40, 80) + elapsed * 0.5;
        let type;
        const r = Math.random();
        if (this.goldenReady && r < 0.15) {
          type = "golden";
          this.goldenReady = false;
        } else if (r < 0.35) type = "bird";
        else if (r < 0.65) type = "butterfly";
        else type = "leaf";
        this.flyers.push({ type, x, y: rand(80, 190), vx: speed * dir, vy: 0, phase: rand(0, 6.28), wingPhase: rand(0, 6.28), alive: true });
      }
      extraInteractiveAt() { return true; }
      onGameClick(x, y) {
        for (let i = this.flyers.length - 1; i >= 0; i--) {
          const f = this.flyers[i];
          if (!f.alive) continue;
          if (dist(x, y, f.x, f.y) < 36) {
            f.alive = false;
            if (f.type === "leaf") {
              this.addScore(-10);
              this.combo = 1;
              this.leafWarning = 1;
              audio.miss();
              this.scorePopups.push({ x: f.x, y: f.y, text: "-10", color: COLORS.warmRed, life: 0.8 });
              screenShake(2, 0.1);
            } else {
              const base = f.type === "golden" ? 50 : f.type === "butterfly" ? 25 : 15;
              const pts = base * this.combo;
              this.addScore(pts);
              this.combo++;
              this.lunaReact = 0.4;
              this.scorePopups.push({ x: f.x, y: f.y, text: "+" + pts, color: COLORS.gold, life: 1 });
              spawnParticleBurst(f.x, f.y, f.type === "golden" ? [COLORS.gold, "#FFF4C0"] : [COLORS.softPink, COLORS.gold], f.type === "golden" ? 14 : 8, ["star", "heart"]);
              audio.catch();
              if (this.combo > 1 && this.combo % 5 === 0) audio.combo();
            }
            this.flyers.splice(i, 1);
            return;
          }
        }
      }
      drawBirdFlyer(c, f) {
        const dir = f.vx > 0 ? 1 : -1;
        c.scale(dir, 1);
        c.fillStyle = "#6B4A2A";
        c.beginPath(); c.ellipse(0, 0, 10, 7, 0, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#5A3A2A";
        c.beginPath(); c.arc(8, -5, 5, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#E8A84C";
        c.beginPath(); c.moveTo(12, -5); c.lineTo(18, -4); c.lineTo(12, -3); c.closePath(); c.fill();
        c.fillStyle = "#1A1A1A";
        c.beginPath(); c.arc(10, -6, 1.2, 0, Math.PI * 2); c.fill();
        const wingY = Math.sin(f.wingPhase) * 6;
        c.fillStyle = "#8B6B4A";
        c.beginPath(); c.ellipse(-2, wingY - 5, 10, 4, -0.3, 0, Math.PI * 2); c.fill();
      }
      drawButterflyFlyer(c, f) {
        const wingAngle = Math.sin(f.wingPhase) * 0.6;
        const color = f.type === "golden" ? COLORS.gold : ["#E88090", "#87CEEB", "#C39BD3"][Math.floor(f.phase) % 3];
        if (f.type === "golden") {
          drawGlowCircle(c, 0, 0, 18, "rgba(255,215,0,ALPHA)", 0.2);
        }
        c.fillStyle = color;
        c.save(); c.rotate(-wingAngle);
        c.beginPath(); c.ellipse(-6, 0, 9, 5, -0.3, 0, Math.PI * 2); c.fill();
        c.restore();
        c.save(); c.rotate(wingAngle);
        c.beginPath(); c.ellipse(6, 0, 9, 5, 0.3, 0, Math.PI * 2); c.fill();
        c.restore();
        c.fillStyle = "#3E2723";
        c.fillRect(-1, -4, 2, 8);
      }
      drawLeafFlyer(c, f) {
        c.save();
        c.rotate(Math.sin(game.time * 2 + f.phase) * 0.5);
        c.fillStyle = "#8BC860";
        c.beginPath(); c.ellipse(0, 0, 10, 6, 0.3, 0, Math.PI * 2); c.fill();
        c.strokeStyle = "#6BAA48";
        c.lineWidth = 1;
        c.beginPath(); c.moveTo(-8, 0); c.lineTo(8, 0); c.stroke();
        c.restore();
      }

    const PAWSTEP_ACTIONS = [
      { key: "sit", label: "Sit", pet: "obi", pose: "sit", expression: "happy", color: "#4A90D9" },
      { key: "paw", label: "Paw", pet: "luna", pose: "pounce", expression: null, color: "#A8C686" },
      { key: "shake", label: "Shake", pet: "obi", pose: "shake", expression: "excited", color: "#E8A84C" },
      { key: "groom", label: "Groom", pet: "luna", pose: "groom", expression: null, color: "#C39BD3" }
    ];

    const PAWSTEP_BUTTONS = [
      { x: 200, y: 440, w: 150, h: 60 },
      { x: 450, y: 440, w: 150, h: 60 },
      { x: 200, y: 510, w: 150, h: 60 },
      { x: 450, y: 510, w: 150, h: 60 }
    ];

    class PawstepPatternsScene extends BaseMinigameScene {
      constructor() {
        super("pawstep", "Pawstep Patterns",
          isMobile ? "Watch the pets, then tap the actions in the same order!"
                   : "Watch the pets, then click the actions in the same order!",
          [80, 200, 400], 90);
        this.sequence = [];
        this.playbackIndex = 0;
        this.inputIndex = 0;
        this.roundPhase = "generate";
        this.showTimer = 0;
        this.showDuration = 0.8;
        this.activeAction = null;
        this.resultTimer = 0;
        this.resultType = null;
        this.buttonFlash = {};
        this.longestSequence = 0;
        this.round = 0;
      }
      enter() {
        super.enter();
        this.sequence = [];
        this.longestSequence = 0;
        this.round = 0;
        this.buttonFlash = {};
      }
      startPlay() {
        super.startPlay();
        this.startNewSequence();
      }
      startNewSequence() {
        this.sequence = [];
        this.addToSequence();
        this.addToSequence();
        this.round = 0;
        this.beginShowPhase();
      }
      addToSequence() {
        const keys = PAWSTEP_ACTIONS.map(a => a.key);
        let next;
        do {
          next = keys[Math.floor(Math.random() * keys.length)];
        } while (this.sequence.length > 0 && next === this.sequence[this.sequence.length - 1]);
        this.sequence.push(next);
      }
      beginShowPhase() {
        this.roundPhase = "show";
        this.playbackIndex = 0;
        this.showTimer = 0;
        this.showDuration = Math.max(0.35, 0.8 - this.sequence.length * 0.04);
        this.activeAction = null;
      }
      beginInputPhase() {
        this.roundPhase = "input";
        this.inputIndex = 0;
        this.activeAction = null;
      }
      updatePlay(dt) {
        for (const key in this.buttonFlash) {
          this.buttonFlash[key] -= dt;
          if (this.buttonFlash[key] <= 0) delete this.buttonFlash[key];
        }
        if (this.activeAction) {
          this.activeAction.timer -= dt;
          if (this.activeAction.timer <= 0) this.activeAction = null;
        }
        if (this.roundPhase === "show") {
          this.showTimer += dt;
          if (this.showTimer >= this.showDuration) {
            this.showTimer = 0;
            if (this.playbackIndex < this.sequence.length) {
              const actionKey = this.sequence[this.playbackIndex];
              this.activeAction = { key: actionKey, timer: this.showDuration * 0.7 };
              this.buttonFlash[actionKey] = this.showDuration * 0.7;
              audio.tinyChime();
              this.playbackIndex++;
            } else {
              this.beginInputPhase();
            }
          }
        } else if (this.roundPhase === "result") {
          this.resultTimer += dt;
          if (this.resultTimer >= 1.2) {
            if (this.resultType === "correct") {
              this.round++;
              this.addToSequence();
              this.beginShowPhase();
            } else {
              this.startNewSequence();
            }
          }
        }
      }
      extraInteractiveAt(x, y) {
        if (this.roundPhase !== "input") return false;
        return PAWSTEP_BUTTONS.some(b => pointInRect(x, y, b));
      }
      onGameClick(x, y) {
        if (this.roundPhase !== "input") return;
        for (let i = 0; i < PAWSTEP_BUTTONS.length; i++) {
          if (pointInRect(x, y, PAWSTEP_BUTTONS[i])) {
            const clickedKey = PAWSTEP_ACTIONS[i].key;
            const expectedKey = this.sequence[this.inputIndex];
            this.buttonFlash[clickedKey] = 0.3;
            this.activeAction = { key: clickedKey, timer: 0.4 };
            if (clickedKey === expectedKey) {
              audio.tinyChime();
              this.inputIndex++;
              if (this.inputIndex >= this.sequence.length) {
                this.longestSequence = Math.max(this.longestSequence, this.sequence.length);
                const pts = this.sequence.length * 10 * this.combo;
                this.addScore(pts);
                this.combo++;
                this.roundPhase = "result";
                this.resultTimer = 0;
                this.resultType = "correct";
                spawnParticleBurst(400, 300, [COLORS.gold, COLORS.softPink], 12, ["star", "heart"]);
                audio.catch();
                if (this.combo > 1 && this.combo % 3 === 0) audio.combo();
                if (this.sequence.length >= 7) this.queueAchievement("goodMemory");
              }
            } else {
              this.roundPhase = "result";
              this.resultTimer = 0;
              this.resultType = "wrong";
              this.combo = 1;
              audio.miss();
              screenShake(3, 0.15);
            }
            return;
          }
        }
      }
      drawScene(c) {
        const bg = c.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, "#FFF8F0");
        bg.addColorStop(1, "#F5E6D3");
        c.fillStyle = bg;
        c.fillRect(0, 0, W, H);
        drawGlowCircle(c, 400, 300, 250, "rgba(255,240,210,ALPHA)", 0.08);
        const activeAct = this.activeAction ? PAWSTEP_ACTIONS.find(a => a.key === this.activeAction.key) : null;
        const obiPose = activeAct && activeAct.pet === "obi" ? activeAct.pose : "sit";
        const lunaPose = activeAct && activeAct.pet === "luna" ? activeAct.pose : "sit";
        drawObi(c, 280, 370, 1.3, {
          pose: obiPose,
          expression: obiPose === "shake" ? "excited" : "happy",
          tail: Math.sin(game.time * (obiPose === "shake" ? 12 : 6)),
          bounce: obiPose !== "sit" ? 0.06 : 0.02, facing: 1
        });
        drawLuna(c, 520, 360, 1.2, {
          pose: lunaPose === "pounce" ? "pounce" : lunaPose === "groom" ? "groom" : "sit",
          tail: Math.sin(game.time * 2.4),
          earTwitch: earSignal(game.time),
          pounceStretch: lunaPose === "pounce" ? 0.7 : 0, facing: -1
        });
        for (let i = 0; i < 4; i++) {
          const btn = PAWSTEP_BUTTONS[i];
          const action = PAWSTEP_ACTIONS[i];
          const flash = this.buttonFlash[action.key] || 0;
          const hover = this.roundPhase === "input" && pointInRect(game.mouse.x, game.mouse.y, btn);
          const isInputPhase = this.roundPhase === "input";
          c.save();
          if (flash > 0) {
            drawGlowCircle(c, btn.x + btn.w / 2, btn.y + btn.h / 2, btn.w * 0.7, "rgba(255,215,0,ALPHA)", flash * 0.3);
          }
          rr(c, btn.x, btn.y, btn.w, btn.h, 14);
          c.fillStyle = flash > 0 ? action.color : hover ? "rgba(255,255,255,1)" : "rgba(255,252,245,0.9)";
          c.fill();
          c.strokeStyle = flash > 0 ? COLORS.gold : hover ? action.color : "rgba(146,104,72,0.2)";
          c.lineWidth = flash > 0 ? 3 : 2;
          c.stroke();
          c.fillStyle = flash > 0 ? "#FFF8F0" : isInputPhase ? "#5C3D2E" : "rgba(92,61,46,0.4)";
          c.font = '18px "Fredoka One", sans-serif';
          c.textAlign = "center";
          c.fillText(action.label, btn.x + btn.w / 2, btn.y + btn.h / 2 + 7);
          c.font = '11px "Fredoka One", sans-serif';
          c.fillStyle = flash > 0 ? "rgba(255,248,240,0.7)" : "rgba(92,61,46,0.4)";
          c.fillText(action.pet === "obi" ? "Obi" : "Luna", btn.x + btn.w / 2, btn.y + 18);
          c.restore();
        }
        c.save();
        c.fillStyle = "rgba(92,68,52,0.5)";
        c.font = '16px "Fredoka One", sans-serif';
        c.textAlign = "center";
        if (this.roundPhase === "show") {
          c.fillText("Watch carefully...", W / 2, 80);
          for (let i = 0; i < this.sequence.length; i++) {
            c.fillStyle = i < this.playbackIndex ? COLORS.gold : "rgba(200,180,160,0.5)";
            c.beginPath(); c.arc(W / 2 - (this.sequence.length - 1) * 10 + i * 20, 100, 5, 0, Math.PI * 2); c.fill();
          }
        } else if (this.roundPhase === "input") {
          c.fillText("Your turn! Repeat the pattern", W / 2, 80);
          for (let i = 0; i < this.sequence.length; i++) {
            c.fillStyle = i < this.inputIndex ? COLORS.gold : "rgba(200,180,160,0.5)";
            c.beginPath(); c.arc(W / 2 - (this.sequence.length - 1) * 10 + i * 20, 100, 5, 0, Math.PI * 2); c.fill();
          }
        }
        c.restore();
        if (this.roundPhase === "result") {
          c.save();
          c.globalAlpha = clamp(1 - this.resultTimer / 1, 0, 1);
          c.font = '28px "Fredoka One", sans-serif';
          c.textAlign = "center";
          if (this.resultType === "correct") {
            c.fillStyle = COLORS.gold;
            c.strokeStyle = "rgba(255,255,255,0.7)"; c.lineWidth = 4;
            c.strokeText("Sequence length: " + this.sequence.length + "!", W / 2, 200);
            c.fillText("Sequence length: " + this.sequence.length + "!", W / 2, 200);
          } else {
            c.fillStyle = COLORS.warmRed;
            c.strokeStyle = "rgba(255,255,255,0.6)"; c.lineWidth = 4;
            c.strokeText("Wrong! Starting over...", W / 2, 200);
            c.fillText("Wrong! Starting over...", W / 2, 200);
          }
          c.restore();
        }
        c.fillStyle = "rgba(92,68,52,0.4)";
        c.font = '13px "Fredoka One", sans-serif';
        c.textAlign = "center";
        c.fillText("Longest: " + this.longestSequence + " steps", W / 2, H - 10);
      }
      drawInstructionIcon(c, x, y) {
        c.save(); c.translate(x, y);
        for (let i = -1; i <= 1; i++) {
          c.fillStyle = ["#4A90D9", "#A8C686", "#C39BD3"][i + 1];
          c.beginPath(); c.arc(i * 18, 0, 7, 0, Math.PI * 2); c.fill();
        }
        c.restore();
      }
      drawResultCharacter(c) {
        drawObi(c, 340, 405, 1.2, { pose: "sit", expression: "excited", tail: Math.sin(game.time * 10), bounce: 0.06 });
        drawLuna(c, 460, 400, 1.1, { pose: "sit", tail: Math.sin(game.time * 2.2), earTwitch: earSignal(game.time) });
      }
    }
    SceneRegistry.register("pawstep", () => new PawstepPatternsScene());


    // ═══ 16-scene-laser-chase.js ═══
    class LaserChaseScene extends BaseMinigameScene {
      constructor() {
        super("laser", "Luna's Laser Chase", isMobile ? "Drag your finger to control the laser dot! Lead Luna through the glowing targets!" : "Move your mouse to control the laser dot! Lead Luna through the glowing targets!", [200, 500, 1000], 60);
        this.luna = { x: 220, y: 320, vx: 0, vy: 0, wiggle: 0, pounceTimer: 0, pounceTarget: null, pawBat: 0, facing: 1 };
        this.targets = [];
        this.spawnedTargetCap = 1;
        this.trail = [];
        this.scorePopups = [];
      }
      enter() {
        super.enter();
        this.luna = { x: 220, y: 320, vx: 0, vy: 0, wiggle: 0, pounceTimer: 0, pounceTarget: null, pawBat: 0, facing: 1 };
        this.targets = [];
        this.spawnedTargetCap = 1;
        this.trail = [];
        this.scorePopups = [];
        this.fillTargets();
      }
      obstacles() {
        return [
          { x: 44, y: 118, w: 160, h: 80 },
          { x: 272, y: 228, w: 150, h: 70 },
          { x: 608, y: 92, w: 100, h: 150 },
          { x: 588, y: 370, w: 96, h: 96 }
        ];
      }
      extraInteractiveAt() { return true; }
      onGameClick() {}
      fillTargets() {
        while (this.targets.length < this.spawnedTargetCap) this.targets.push(this.makeTarget());
      }
      makeTarget() {
        const obs = this.obstacles();
        const elapsed = this.duration - this.timeLeft;
        for (let attempt = 0; attempt < 80; attempt++) {
          const bonus = elapsed > 14 && Math.random() < 0.16;
          const t = { x: rand(80, W - 80), y: rand(110, H - 80), life: bonus ? 6.2 : 8, fade: 1, fading: false, pulse: rand(0, Math.PI * 2), bonus };
          let bad = false;
          for (const o of obs) {
            if (t.x > o.x - 32 && t.x < o.x + o.w + 32 && t.y > o.y - 32 && t.y < o.y + o.h + 32) { bad = true; break; }
          }
          if (!bad) return t;
        }
        return { x: rand(100, W - 100), y: rand(110, H - 90), life: 8, fade: 1, fading: false, pulse: rand(0, Math.PI * 2), bonus: false };
      }
      updatePlay(dt) {
        const elapsed = this.duration - this.timeLeft;
        this.spawnedTargetCap = elapsed >= 40 ? 2 : 1;
        this.fillTargets();

        for (let i = this.targets.length - 1; i >= 0; i--) {
          const t = this.targets[i];
          t.life -= dt;
          if (t.life <= 0 && !t.fading) {
            t.fading = true;
            if (this.combo > 1) {
              this.scorePopups.push({ x: t.x, y: t.y, text: "Miss!", life: 0.8 });
              audio.miss();
            }
            this.combo = 1;
          }
          if (t.fading) {
            t.fade -= dt * 2;
            if (t.fade <= 0) this.targets.splice(i, 1);
          }
        }
        this.fillTargets();

        this.luna.pawBat = Math.max(0, this.luna.pawBat - dt * 4);
        this.luna.wiggle += dt;
        const mx = clamp(game.mouse.x, 20, W - 20);
        const my = clamp(game.mouse.y, 60, H - 20);
        const d = dist(this.luna.x, this.luna.y, mx, my);
        const angle = Math.atan2(my - this.luna.y, mx - this.luna.x);
        this.luna.facing = mx >= this.luna.x ? 1 : -1;

        const lastTrail = this.trail[this.trail.length - 1];
        if (!lastTrail || dist(lastTrail.x, lastTrail.y, mx, my) > 8) {
          this.trail.push({ x: mx, y: my, life: 0.35 });
          if (this.trail.length > 14) this.trail.shift();
        }
        this.trail.forEach((p) => p.life -= dt);
        this.trail = this.trail.filter((p) => p.life > 0);

        if (this.luna.pounceTimer > 0) {
          this.luna.pounceTimer -= dt;
          if (this.luna.pounceTarget) {
            const px = this.luna.pounceTarget.x;
            const py = this.luna.pounceTarget.y;
            const ad = Math.atan2(py - this.luna.y, px - this.luna.x);
            this.luna.x += Math.cos(ad) * 280 * dt;
            this.luna.y += Math.sin(ad) * 280 * dt;
          }
          if (this.luna.pounceTimer <= 0) this.luna.pounceTarget = null;
        } else if (d < 50) {
          this.luna.pounceTimer = 0.5;
          this.luna.pounceTarget = { x: mx, y: my };
          audio.pounce();
        } else {
          const speed = d > 150 ? 72 : 142 + Math.sin(game.time * 10) * 15;
          const wobble = Math.sin(game.time * 5 + this.luna.y * 0.02) * 0.38;
          this.luna.x += Math.cos(angle + wobble) * speed * dt;
          this.luna.y += Math.sin(angle + wobble) * speed * dt;
        }

        this.luna.x = clamp(this.luna.x, 40, W - 40);
        this.luna.y = clamp(this.luna.y, 72, H - 40);

        for (let i = this.targets.length - 1; i >= 0; i--) {
          const t = this.targets[i];
          if (dist(this.luna.x, this.luna.y, t.x, t.y) < 30) {
            const pts = (t.bonus ? 35 : 20) * this.combo;
            this.addScore(pts);
            this.scorePopups.push({ x: t.x, y: t.y, text: "+" + pts, life: 1 });
            this.combo++;
            store.stats.bestLaserCombo = Math.max(store.stats.bestLaserCombo, this.combo);
            saveStats();
            if (this.score >= 400) this.queueAchievement("catWhisperer");
            if (this.combo >= 5) this.queueAchievement("pouncePerfect");
            if (this.combo > 1 && this.combo % 5 === 0) audio.combo();
            audio.targetHit();
            this.luna.pawBat = 1;
            spawnParticleBurst(t.x, t.y, t.bonus ? [COLORS.gold, COLORS.softPink, "#FFF4C0"] : [COLORS.gold, COLORS.softPink], t.bonus ? 16 : 12, ["star", "heart"]);
            this.targets.splice(i, 1);
            this.fillTargets();
            break;
          }
        }
        /* tick score popups */
        for (let i = this.scorePopups.length - 1; i >= 0; i--) {
          this.scorePopups[i].life -= dt;
          this.scorePopups[i].y -= 40 * dt;
          if (this.scorePopups[i].life <= 0) this.scorePopups.splice(i, 1);
        }
      }
      drawInstructionIcon(c, x, y) {
        c.save();
        c.translate(x, y);
        c.strokeStyle = "#7A4E36";
        c.lineWidth = 3;
        rr(c, -26, -16, 52, 32, 10);
        c.stroke();
        c.beginPath();
        c.moveTo(-8, -2);
        c.lineTo(8, -2);
        c.lineTo(8, 10);
        c.stroke();
        c.beginPath();
        c.arc(22, -24, 6, 0, Math.PI * 2);
        c.fillStyle = "#D32F2F";
        c.fill();
        c.restore();
      }
      drawScene(c) {
        drawLaserBackdrop(c);

        for (const t of this.trail) {
          c.save();
          c.globalAlpha = clamp(t.life / 0.35, 0, 1) * 0.35;
          drawGlowCircle(c, t.x, t.y, 18, "rgba(255,0,0,ALPHA)", 0.18);
          c.restore();
        }

        for (const t of this.targets) {
          c.save();
          c.globalAlpha = t.fade;
          if (t.bonus) {
            drawGlowCircle(c, t.x, t.y, 42 + Math.sin(game.time * 5 + t.pulse) * 6, "rgba(255,182,193,ALPHA)", 0.24);
            drawGlowCircle(c, t.x, t.y, 30 + Math.sin(game.time * 5 + t.pulse) * 4, "rgba(255,215,0,ALPHA)", 0.26);
          } else {
            drawGlowCircle(c, t.x, t.y, 34 + Math.sin(game.time * 4 + t.pulse) * 4, "rgba(255,215,0,ALPHA)", 0.3);
          }
          c.fillStyle = t.bonus ? COLORS.softPink : COLORS.gold;
          c.beginPath();
          c.arc(t.x, t.y, t.bonus ? 22 : 20, 0, Math.PI * 2);
          c.fill();
          c.fillStyle = "#FFF4C0";
          c.beginPath();
          c.arc(t.x, t.y, t.bonus ? 13 : 12, 0, Math.PI * 2);
          c.fill();
          c.restore();
        }

        drawGlowCircle(c, game.mouse.x, game.mouse.y, 24, "rgba(255,0,0,ALPHA)", 0.24);
        c.fillStyle = "#D32F2F";
        c.beginPath();
        c.arc(game.mouse.x, game.mouse.y, 5, 0, Math.PI * 2);
        c.fill();

        drawLuna(c, this.luna.x, this.luna.y + 8, 0.96, {
          pose: "topdown",
          tail: Math.sin(game.time * 2.4),
          wiggle: this.luna.pounceTarget ? (game.time * 4 % 1) : 0,

    // ═══ 17-scene-cuddle-pile.js ═══
    class CuddlePileScene extends BaseMinigameScene {
      constructor() {
        super("cuddle", "Cuddle Pile", isMobile ? "Keep everyone balanced on the couch! Tap the LEFT and RIGHT buttons to shift Annie's weight!" : "Keep everyone balanced on the couch! Press LEFT and RIGHT arrow keys to shift Annie's weight!", [30, 60, 90], 90);
        this.balance = 0;
        this.balanceTarget = 0;
        this.eventTimer = 0;
        this.bubble = null;
        this.failedSide = null;
        this.winState = false;
        this.btnFlash = { left: 0, right: 0 };
      }
      enter() {
        super.enter();
        this.balance = 0;
        this.balanceTarget = 0;
        this.eventTimer = rand(3.8, 4.8);
        this.bubble = null;
        this.failedSide = null;
        this.winState = false;
        this.btnFlash = { left: 0, right: 0 };
      }
      extraInteractiveAt(x, y) {
        if (isMobile) {
          const ab = this.cuddleArrowButtons();
          return pointInRect(x, y, ab.left) || pointInRect(x, y, ab.right);
        }
        return false;
      }
      onGameClick(x, y) {
        if (isMobile) {
          const ab = this.cuddleArrowButtons();
          if (pointInRect(x, y, ab.left)) {
            this.balanceTarget = clamp(this.balanceTarget - 10, -100, 100);
            this.btnFlash.left = 0.2;
          } else if (pointInRect(x, y, ab.right)) {
            this.balanceTarget = clamp(this.balanceTarget + 10, -100, 100);
            this.btnFlash.right = 0.2;
          }
        }
      }
      onKeyDown(key) {
        if (key === "Escape") {
          if (this.phase === "instructions" || this.phase === "countdown") {
            audio.menu();
            transitionTo(SceneRegistry.create("hangout"));
          } else if (this.phase === "play") {
            this.paused = !this.paused;
          }
          return;
        }
        if (this.phase === "play") {
          if (key === " ") {
            this.paused = !this.paused;
            return;
          }
          if (key === "ArrowLeft") { this.balanceTarget = clamp(this.balanceTarget - 10, -100, 100); this.btnFlash.left = 0.2; }
          if (key === "ArrowRight") { this.balanceTarget = clamp(this.balanceTarget + 10, -100, 100); this.btnFlash.right = 0.2; }
        }
      }
      updatePlay(dt) {
        if (this.playHintTimer <= 0 && !this.playHint && this.score < 2) {
          this.playHint = { text: isMobile ? "Tap LEFT/RIGHT to keep balanced!" : "Press LEFT/RIGHT arrows to keep balanced!", life: 5 };
          this.playHintTimer = -1;
        }
        this.score = 90 - this.timeLeft;
        this.balance = lerp(this.balance, this.balanceTarget, dt * 6);
        this.btnFlash.left = Math.max(0, this.btnFlash.left - dt);
        this.btnFlash.right = Math.max(0, this.btnFlash.right - dt);
        if (this.bubble) {
          this.bubble.time -= dt;
          if (this.bubble.time <= 0) this.bubble = null;
        }
        const survived = this.score;
        let minGap = 4;
        let maxGap = 5;
        let shiftMin = 15;
        let shiftMax = 20;
        let allowDouble = false;
        if (survived >= 30) {
          minGap = 3;
          maxGap = 4;
          shiftMin = 20;
          shiftMax = 25;
        }
        if (survived >= 60) {
          minGap = 2;
          maxGap = 3;
          shiftMin = 20;
          shiftMax = 25;
          allowDouble = true;
        }
        this.eventTimer -= dt;
        if (this.eventTimer <= 0) {
          this.triggerFidget(shiftMin, shiftMax, allowDouble);
          this.eventTimer = rand(minGap, maxGap);
        }

        if (Math.abs(this.balance) >= 100) {
          this.failedSide = this.balance < 0 ? "obi" : "luna";
          this.phase = "ending";
          this.phaseTime = 0;
          return;
        }
        if (survived >= 90 && !this.winState) {
          this.winState = true;
          this.phase = "ending";
          this.phaseTime = 0;
          store.stats.bestCuddle = Math.max(store.stats.bestCuddle, 90);
          store.stats.cuddleWon = true;
          saveStats();
          this.queueAchievement("couchPotato");
          this.queueAchievement("maximumCozy");
          audio.lullaby();
          return;
        }
        if (survived >= 30) this.queueAchievement("couchPotato");
      }
      triggerFidget(shiftMin, shiftMax, allowDouble) {
        const obiLines = ["Obi dreams of squirrels!", "Obi stretches out!", "Obi rolls over!", "Obi kicks in his sleep!"];
        const lunaLines = ["Luna starts grooming!", "Luna kneads the cushion!", "Luna's tail goes wild!", "Luna stretches!"];
        const side = allowDouble && Math.random() < 0.18 ? "both" : (Math.random() < 0.5 ? "obi" : "luna");
        if (side === "obi" || side === "both") {
          const amount = -rand(shiftMin, shiftMax);
          this.balanceTarget = clamp(this.balanceTarget + amount, -100, 100);
          this.bubble = { who: "obi", text: obiLines[(Math.random() * obiLines.length) | 0], time: 1.2 };
        }
        if (side === "luna" || side === "both") {
          const amount = rand(shiftMin, shiftMax);
          this.balanceTarget = clamp(this.balanceTarget + amount, -100, 100);
          this.bubble = { who: side === "both" ? "both" : "luna", text: side === "both" ? "Double fidget chaos!" : lunaLines[(Math.random() * lunaLines.length) | 0], time: 1.2 };
        }
        audio.fidget();
      }
      updateEnding(dt) {
        this.phaseTime += dt;
        if (this.winState) {
          if (Math.random() < 0.4) spawnParticleBurst(rand(260, 540), rand(240, 420), [COLORS.softPink, COLORS.gold], 1, ["heart"]);
          if (this.phaseTime >= 2.3) {
            this.score = 90;
            this.finishGame();
          }
        } else if (this.phaseTime >= 1.3) {
          this.score = Math.floor(90 - this.timeLeft);
          this.finishGame();
        }
      }
      finishGame() {
        this.score = Math.round(this.score);
        this.resultsStars = this.calculateStars(this.score);
        this.newBest = setBest("cuddle", this.score);
        this.personalBest = store.best_cuddle;
        this.phase = "results";
        this.phaseTime = 0;
        this.scoreInT = 0;
        this.revealedStars = 0;
        this.starTimer = 0;
      }
      drawTopHud(c) {
        c.save();
        c.fillStyle = "rgba(92,68,52,0.82)";
        rr(c, 14, 12, 140, 42, 16);
        c.fill();
        rr(c, 200, 12, 430, 42, 16);
        c.fill();

        /* pause button */
        const pb = this.pauseButtonRect();
        const pbHover = pointInRect(game.mouse.x, game.mouse.y, pb);
        c.fillStyle = pbHover ? "rgba(92,68,52,0.92)" : "rgba(92,68,52,0.68)";
        rr(c, pb.x, pb.y, pb.w, pb.h, 12);
        c.fill();
        c.fillStyle = COLORS.cream;
        c.fillRect(pb.x + 13, pb.y + 10, 4, 16);
        c.fillRect(pb.x + 21, pb.y + 10, 4, 16);

        c.fillStyle = COLORS.cream;
        c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "left";
        c.fillText("Time: " + Math.floor(this.score) + "s", 28, 39);
        c.textAlign = "center";
        c.fillText("Balance Meter", 415, 39);
        c.strokeStyle = "#FFF8F0";
        c.lineWidth = 3;
        rr(c, 266, 22, 320, 20, 10);
        c.stroke();
        const markerX = lerp(276, 576, (this.balance + 100) / 200);
        c.fillStyle = "#7DB36C";
        rr(c, 270, 26, 152, 12, 6);
        c.fill();
        c.fillStyle = "#D39B6A";
        rr(c, 422, 26, 160, 12, 6);
        c.fill();
        c.fillStyle = COLORS.cream;
        c.beginPath();
        c.arc(markerX, 32, 10, 0, Math.PI * 2);
        c.fill();
        c.strokeStyle = "#7A4E36";
        c.stroke();
        c.restore();
      }
      cuddleArrowButtons() {
        return {
          left:  { x: 30,    y: H - 90, w: 110, h: 64 },

        };

      drawScene(c) {
        drawLivingRoom(c, "cuddle");
        c.fillStyle = "rgba(255,255,255,0.06)";
        c.fillRect(0, 0, W, H);

        /* danger edge glow when balance is extreme */
        const absBal = Math.abs(this.balance);
        if (absBal > 60 && this.phase === "play" && !this.paused) {
          const danger = clamp((absBal - 60) / 40, 0, 1);
          const pulse = 0.12 + 0.08 * Math.sin(game.time * 6);
          const edgeAlpha = danger * pulse;
          const side = this.balance < 0 ? 0 : W;
          const grad = c.createLinearGradient(side, 0, side + (this.balance < 0 ? 120 : -120), 0);
          grad.addColorStop(0, `rgba(200,40,20,${edgeAlpha})`);
          grad.addColorStop(1, "rgba(200,40,20,0)");
          c.fillStyle = grad;
          c.fillRect(0, 0, W, H);
        }

        const tilt = this.balance / 100;

        c.save();
        c.translate(400, 330);
        c.rotate(tilt * 0.05);
        c.translate(-400, -330);

        drawObi(c, 300 + tilt * 14 + (this.failedSide === "obi" ? -this.phaseTime * 180 : 0), 360 + Math.abs(tilt) * 4 + (this.failedSide === "obi" ? this.phaseTime * 180 : 0), 1.04, this.winState ? {
          pose: "sleeping"
        } : {
          pose: "sit",
          expression: tilt < -0.45 ? "sad" : "happy",
          tail: Math.sin(game.time * 7) * (1 - Math.min(1, Math.abs(tilt))),
          bounce: 0.03 * Math.sin(game.time * 4)
        });

        drawAnnie(c, 402 + tilt * 8, 324, 1.22, this.winState ? {

          breath: Math.sin(game.time * 1.5),

        } : {

        drawLuna(c, 506 + tilt * 14 + (this.failedSide === "luna" ? this.phaseTime * 180 : 0), 352 + Math.abs(tilt) * 3 + (this.failedSide === "luna" ? this.phaseTime * 180 : 0), 1.02, this.winState ? {

        });
        c.restore();

        c.fillStyle = "rgba(92,68,52,0.72)";

          rr(c, ab.right.x, ab.right.y, ab.right.w, ab.right.h, 18);
          c.fill();
          c.font = '28px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillStyle = lFlash ? "#5C4434" : COLORS.cream;

        } else {

        if (this.bubble) {

          const by = this.bubble.who === "obi" ? 270 : this.bubble.who === "luna" ? 244 : 230;
          drawTooltip(c, bx, by, "Fidget!", this.bubble.text, clamp(this.bubble.time / 1.2, 0, 1));

        /* directional hint arrows (Update 13) */
        if (this.phase === "play" && !this.paused && Math.abs(this.balance) > 30) {
          const arrowAlpha = clamp((Math.abs(this.balance) - 30) / 40, 0, 0.6);
