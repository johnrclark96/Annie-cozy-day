  <!--
    Annie's Cozy Day — implementation plan

    Architecture plan:
    1) Build a fixed 800x600 canvas app with one requestAnimationFrame loop, one shared input layer,
       one shared particle system, one shared audio manager, and localStorage helpers using the
       "anniesCozyDay_" prefix for every saved value.
    2) Define reusable drawing functions for Annie, Obi, and Luna first. Every screen uses these
       functions only; no inline character rendering. Pose and expression are controlled through the
       state argument so the same characters can be reused on title, hub, gameplay, and results.
    3) Create scene classes for Title, Hub, and the three minigames. Minigames share a common base
       scene that handles the required flow: crossfade arrival from hub, instruction card, countdown,
       gameplay, pause overlay, results screen, replay, and hub return.
    4) Finish Tier 1 completely before Tier 2 content is enabled: title screen, hub, Treat Toss,
       Laser Chase, full navigation loop, procedural audio with mute persistence, score tracking,
       and personal best persistence.
    5) Add Tier 2 after Tier 1 logic is complete: Cuddle Pile, achievements with saved progress and
       hub badges, plus richer idle animation states across all screens.
    6) Add polish last: crossfades, pulsing prompts, bounce-in score text, staggered results stars,
       hover glows, ambient hearts/stars, and achievement banners.
    7) Final self-review target: no undefined variables, no dead-end navigation,
       no broken game loop transitions, and no missing pause/results wiring.
  -->

          if (parts[pi] === "allAchievements") {

          } else if (!store.achievements[parts[pi]]) return false;

    function totalStarsEarned() {
      const games = [
        { best: store.best_treat, thresholds: [300, 700, 1400] },
        { best: store.best_laser, thresholds: [200, 500, 1000] },
        { best: store.best_cuddle, thresholds: [30, 60, 90] },

        { best: store.best_window, thresholds: [150, 400, 750] },
        { best: store.best_pawstep, thresholds: [80, 200, 400] }
      ];
      let total = 0;
      for (const g of games) {
        if (g.best >= g.thresholds[0]) total++;
        if (g.best >= g.thresholds[1]) total++;
        if (g.best >= g.thresholds[2]) total++;
      }
      return total;
    }

      var stars = totalStarsEarned();

          saveJSON("starMilestonesClaimed", store.starMilestonesClaimed);
          addCoins(m.coins);
          awarded += m.coins;
        }
      }
      return awarded;
    }


    // ═══ 03-math-helpers.js ═══
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function rand(min, max) { return min + Math.random() * (max - min); }
    function easeOutBack(t) {
      const c1 = 1.70158;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }
    function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }
    function dist(ax, ay, bx, by) {
      const dx = bx - ax;
      const dy = by - ay;
      return Math.hypot(dx, dy);
    }
    function pointInRect(px, py, r) {
      return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
    }
    function rr(c, x, y, w, h, r) {
      const radius = Math.min(r, w * 0.5, h * 0.5);
      c.beginPath();
      c.moveTo(x + radius, y);
      c.arcTo(x + w, y, x + w, y + h, radius);
      c.arcTo(x + w, y + h, x, y + h, radius);
      c.arcTo(x, y + h, x, y, radius);
      c.arcTo(x, y, x + w, y, radius);
      c.closePath();
    }
    function drawShadowEllipse(c, x, y, rx, ry, alpha = 0.14) {
      c.save();
      c.globalAlpha = alpha;
      c.fillStyle = "#000";
      c.beginPath();
      c.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }


    // ═══ 04-draw-helpers.js ═══
    function drawHeart(c, x, y, s, color) {
      c.save();
      c.translate(x, y);
      c.scale(s, s);
      c.fillStyle = color;
      c.beginPath();
      c.moveTo(0, 6);
      c.bezierCurveTo(-12, -6, -18, -20, -5, -24);
      c.bezierCurveTo(0, -26, 4, -22, 5, -18);
      c.bezierCurveTo(6, -22, 10, -26, 15, -24);
      c.bezierCurveTo(28, -20, 22, -6, 10, 6);
      c.lineTo(5, 11);
      c.lineTo(0, 6);
      c.fill();
      c.restore();
    }
    function drawStar(c, x, y, r, color) {
      c.save();
      c.translate(x, y);
      c.fillStyle = color;
      c.beginPath();
      for (let i = 0; i < 10; i++) {
        const ang = -Math.PI / 2 + i * Math.PI / 5;
        const rad = i % 2 === 0 ? r : r * 0.45;
        const px = Math.cos(ang) * rad;
        const py = Math.sin(ang) * rad;
        if (i === 0) c.moveTo(px, py);
        else c.lineTo(px, py);
      }
      c.closePath();
      c.fill();
      c.restore();
    }
    function drawBone(c, x, y, w, h, color) {
      c.save();
      c.translate(x, y);
      c.fillStyle = color;
      /* central bar */
      rr(c, -w * 0.45, -h * 0.28, w * 0.9, h * 0.56, h * 0.2);
      c.fill();
      /* knobs - drawn after rr so beginPath doesn't erase them */
      c.beginPath();
      c.arc(-w * 0.35, -h * 0.25, h * 0.25, 0, Math.PI * 2);
      c.arc(-w * 0.35, h * 0.25, h * 0.25, 0, Math.PI * 2);
      c.arc(w * 0.35, -h * 0.25, h * 0.25, 0, Math.PI * 2);
      c.arc(w * 0.35, h * 0.25, h * 0.25, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }
    function drawGlowCircle(c, x, y, r, color, alpha = 0.3) {
      c.save();
      const grad = c.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0, color.replace("ALPHA", alpha.toFixed(3)));
      grad.addColorStop(1, color.replace("ALPHA", "0"));
      c.fillStyle = grad;
      c.beginPath();
      c.arc(x, y, r, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }
    function wrapText(c, text, x, y, maxWidth, lineHeight) {
      const words = text.split(" ");
      let line = "";
      for (let i = 0; i < words.length; i++) {
        const test = line + words[i] + " ";
        if (c.measureText(test).width > maxWidth && line) {
          c.fillText(line.trim(), x, y);
          y += lineHeight;
          line = words[i] + " ";
        } else {
          line = test;
        }
      }
      if (line) c.fillText(line.trim(), x, y);
    }


    // ═══ 05-audio.js ═══
    class CozyAudio {
      constructor() {
        this.ctx = null;
      }
      ensure() {
        if (!this.ctx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return null;
          this.ctx = new AC();
        }
        if (this.ctx && this.ctx.state === "suspended") this.ctx.resume();
        return this.ctx;
      }
      canPlay() {
        return !!this.ctx && !store.muted;
      }
      envGain(gainNode, when, attack, sustain, release, gain) {
        gainNode.gain.cancelScheduledValues(when);
        gainNode.gain.setValueAtTime(0.0001, when);
        gainNode.gain.exponentialRampToValueAtTime(gain, when + attack);
        gainNode.gain.setTargetAtTime(0.0001, when + attack + sustain, release);
      }
      tone(freq, duration = 0.1, gain = 0.18, type = "sine", endFreq = null, whenOffset = 0) {
        if (!this.canPlay()) return;
        const now = this.ctx.currentTime + whenOffset;
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        if (endFreq) osc.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), now + duration);
        osc.connect(g);
        g.connect(this.ctx.destination);
        this.envGain(g, now, 0.008, duration * 0.55, duration * 0.35, gain);
        osc.start(now);
        osc.stop(now + duration + 0.2);
      }
      vibratoTone(freq, duration = 0.15, gain = 0.15) {
        if (!this.canPlay()) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const lfo = this.ctx.createOscillator();
        const lfoGain = this.ctx.createGain();
        const g = this.ctx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(freq, now);
        lfo.frequency.value = 18;
        lfoGain.gain.value = 16;
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        osc.connect(g);
        g.connect(this.ctx.destination);
        this.envGain(g, now, 0.01, duration * 0.6, duration * 0.4, gain);
        osc.start(now);
        lfo.start(now);
        osc.stop(now + duration + 0.25);
        lfo.stop(now + duration + 0.25);
      }
      noisePop() {
        if (!this.canPlay()) return;
        const now = this.ctx.currentTime;
        const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.08, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / data.length * 4);
        const src = this.ctx.createBufferSource();
        const band = this.ctx.createBiquadFilter();
        band.type = "bandpass";
        band.frequency.value = 800;
        band.Q.value = 0.8;
        const g = this.ctx.createGain();
        src.buffer = buffer;
        src.connect(band);
        band.connect(g);
        g.connect(this.ctx.destination);
        this.envGain(g, now, 0.005, 0.03, 0.08, 0.16);
        src.start(now);
      }
      chord(freqs, duration = 0.3, gain = 0.12) {
        if (!this.canPlay()) return;
        freqs.forEach((f) => this.tone(f, duration, gain, "sine"));
      }
      menu() { this.tone(440, 0.1, 0.15, "sine"); }
      catch() { this.noisePop(); }
      miss() { this.tone(300, 0.2, 0.14, "sine", 200); }
      combo() {
        [523.25, 659.25, 783.99].forEach((f, i) => this.tone(f, 0.08, 0.12, "sine", null, i * 0.08));
      }
      pounce() { this.tone(300, 0.1, 0.14, "sine", 600); }
      targetHit() { this.vibratoTone(880, 0.15, 0.14); }
      fidget() { this.tone(200, 0.1, 0.12, "sine"); }
      lullaby() {
        [392, 329.63, 261.63, 196].forEach((f, i) => this.tone(f, 0.42, 0.12, "sine", null, i * 0.4));
      }
      achievement() { this.chord([261.63, 329.63, 392], 0.3, 0.11); }
      tinyChime() { this.tone(660, 0.09, 0.08, "sine"); }
      startAmbient() {
        if (this.ambientActive) return;
        if (!this.ensure()) return;
        if (store.muted) return;
        this.ambientActive = true;
        const now = this.ctx.currentTime;
        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        const lfo = this.ctx.createOscillator();
        const lfoGain = this.ctx.createGain();
        const g = this.ctx.createGain();
        osc1.type = "sine";
        osc1.frequency.value = 110;
        osc2.type = "sine";
        osc2.frequency.value = 165;
        lfo.type = "sine";
        lfo.frequency.value = 0.15;
        lfoGain.gain.value = 0.005;
        lfo.connect(lfoGain);
        lfoGain.connect(g.gain);
        g.gain.value = 0.018;
        osc1.connect(g);
        osc2.connect(g);
        g.connect(this.ctx.destination);
        osc1.start(now);
        osc2.start(now);
        lfo.start(now);
        this._ambientNodes = { osc1, osc2, lfo, lfoGain, g };
      }
      stopAmbient() {
        if (!this.ambientActive) return;
        this.ambientActive = false;
        const n = this._ambientNodes;
        if (!n) return;
        this._ambientNodes = null;
        try {
          const now = this.ctx.currentTime;
          n.g.gain.setTargetAtTime(0, now, 0.1);
          const osc1 = n.osc1, osc2 = n.osc2, lfo = n.lfo;
          setTimeout(() => {
            try { osc1.stop(); osc2.stop(); lfo.stop(); } catch(e) {}
          }, 300);
        } catch(e) {}
      }
    }

    initAmbient();

    function updateSharedParticles(dt) {
      for (let i = game.particles.length - 1; i >= 0; i--) {
        const p = game.particles[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 50 * dt;
        p.rot += p.vr * dt;
        if (p.life <= 0) game.particles.splice(i, 1);
      }
      if (game.scene instanceof TitleScene) {
        for (const a of game.ambient) {
          a.y += a.vy * dt;
          a.x += Math.sin(game.time * 0.8 + a.phase) * 8 * dt + a.drift * dt * 0.25;
          if (a.y < -20) {
            a.y = H + 20;
            a.x = rand(20, W - 20);
          }
          if (a.x < -20) a.x = W + 20;
          if (a.x > W + 20) a.x = -20;
        }
      }
    }
    function drawSharedParticles(c) {
      for (const p of game.particles) {
        c.save();
        c.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
        c.translate(p.x, p.y);
        c.rotate(p.rot);
        if (p.shape === "heart") drawHeart(c, 0, 0, p.size / 12, p.color);
        else drawStar(c, 0, 0, p.size, p.color);
        c.restore();
      }
    }

    function loadCozyArt() {
      if (spriteArt.loading || spriteArt.ready) return;
      spriteArt.loading = true;
      var mainLoaded = false, accLoaded = false;
      function checkDone() {
        if (mainLoaded && accLoaded) { spriteArt.loading = false; spriteArt.ready = true; }
      }
      var img = new Image();
      img.decoding = "async";
      img.onload = function() { spriteArt.image = img; mainLoaded = true; checkDone(); };
      img.onerror = function() { spriteArt.loading = false; };
      img.src = SPRITE_ATLAS_URI;
      var accImg = new Image();
      accImg.decoding = "async";
      accImg.onload = function() { spriteArt.accessoryImage = accImg; accLoaded = true; checkDone(); };
      accImg.onerror = function() { accLoaded = true; checkDone(); };
      accImg.src = ACCESSORY_ATLAS_URI;
    }

    function drawFrameImage(c, frame, x, y, scale, options = {}) {
      if (!frame || !spriteArt.image) return;
      const pxScale = (options.baseScale || 0.18) * scale;
      const stretchX = options.stretchX || 1;
      const stretchY = options.stretchY || 1;
      const w = frame.w * pxScale * stretchX;
      const h = frame.h * pxScale * stretchY;
      const bob = options.bob || 0;
      const flip = options.flip || 1;
      const rotation = options.rotation || 0;
      const shadowAlpha = options.shadowAlpha == null ? 0.16 : options.shadowAlpha;

      c.save();
      c.translate(x, y + bob);
      c.rotate(rotation);
      c.scale(flip, 1);
      if (shadowAlpha > 0) {
        drawShadowEllipse(c, 0, -4, Math.max(20, w * 0.22), Math.max(6, h * 0.045), shadowAlpha);
      }
      if (options.glow) {
        c.shadowColor = options.glow;
        c.shadowBlur = options.glowBlur || 22;
      }
      c.drawImage(spriteArt.image, frame.x, frame.y, frame.w, frame.h, -w / 2, -h, w, h);
      c.restore();
    }

      const crop = options.crop || 0.6;
      const sw = frame.w;
      const sh = Math.max(1, Math.floor(frame.h * crop));
      const pxScale = (options.baseScale || 0.16) * scale;
      const w = sw * pxScale;
      const h = sh * pxScale;
      c.save();
      c.translate(x, y + (options.bob || 0));
      c.rotate(options.rotation || 0);
      if (options.glow) {
        c.shadowColor = options.glow;
        c.shadowBlur = options.glowBlur || 20;
      }
      c.drawImage(spriteArt.image, frame.x, frame.y, sw, sh, -w / 2, -h * 0.15, w, h);
      c.restore();
    }

          baseScale: SPRITE_BASE_SCALE.annie,
          crop: frame === frames.cheer ? 0.58 : 0.62,

    function normalizeState(state, fallbackPose = "idle") {
      if (!state) return { pose: fallbackPose };

    function drawAnnie(c, x, y, scale, state) {

      c.beginPath();

    function drawAccessoryOverlay(c, pet, x, y, scale, pose, facing) {
      var equipped = store.wardrobe.equipped[pet];
      if (!equipped || typeof equipped !== "object") return;
      if (!spriteArt.ready) return;
      var mainAccFrames = spriteArt.frames.accessories || {};
      var slots = Object.keys(equipped);
      for (var si = 0; si < slots.length; si++) {
        var key = equipped[slots[si]];
        if (!key) continue;
        var off = getAccessoryOffset(pet, key, pose);
        if (!off) continue;
        /* look up frame from main atlas first, then accessory atlas */
        var frame = mainAccFrames[key];
        var atlasImg = spriteArt.image;
        if (!frame && ACCESSORY_ATLAS_FRAMES[key]) {
          frame = ACCESSORY_ATLAS_FRAMES[key];
          atlasImg = spriteArt.accessoryImage;
        }
        if (!frame || !atlasImg) continue;
        var f = facing || 1;
        var ax = x + off.dx * scale * f;
        var ay = y + off.dy * scale;
        var renderW = off.size * scale;
        var aspect = frame.h / frame.w;
        var renderH = renderW * aspect;
        c.save();
        c.translate(ax, ay);
        c.rotate(off.rot * f);
        c.scale(f, 1);
        c.drawImage(atlasImg, frame.x, frame.y, frame.w, frame.h,
          -renderW / 2, -renderH / 2, renderW, renderH);
        c.restore();
      }
    }

      rx.beginPath(); rx.arc(755, 105, 42, 0, Math.PI * 2); rx.fill();
      /* tree trunks */
      rx.fillStyle = "#8B6B4A";
      rx.fillRect(54, 140, 12, 40);
      rx.fillRect(746, 130, 14, 50);
      sceneCache.treatBase = rc;

      /* ── Laser Chase background ── */
      const ec = makeBufferCanvas(W, H);
      const ex = ec.getContext("2d");
      /* dark room floor */
      const dg = ex.createLinearGradient(0, 0, 0, H);
      dg.addColorStop(0, "#3D3028");
      dg.addColorStop(1, "#2A2018");
      ex.fillStyle = dg;
      ex.fillRect(0, 0, W, H);
      /* slightly lighter floor area */
      ex.fillStyle = "rgba(80,60,45,0.4)";
      ex.fillRect(0, H * 0.55, W, H * 0.45);
      /* furniture obstacles (match this.obstacles() in LaserChaseScene) */
      ex.fillStyle = "rgba(90,70,50,0.6)";
      rr(ex, 44, 118, 160, 80, 12);
      ex.fill();
      rr(ex, 272, 228, 150, 70, 10);
      ex.fill();
      rr(ex, 608, 92, 100, 150, 10);
      ex.fill();
      rr(ex, 588, 370, 96, 96, 12);
      ex.fill();
      /* furniture highlights */
      ex.fillStyle = "rgba(120,95,70,0.35)";
      rr(ex, 48, 122, 152, 24, 8);
      ex.fill();
      rr(ex, 276, 232, 142, 20, 7);
      ex.fill();
      rr(ex, 612, 96, 92, 24, 7);
      ex.fill();
      /* ambient light from top right */
      const ag = ex.createRadialGradient(700, 80, 20, 700, 80, 300);
      ag.addColorStop(0, "rgba(255,236,177,0.08)");
      ag.addColorStop(1, "rgba(255,236,177,0)");
      ex.fillStyle = ag;
      ex.fillRect(0, 0, W, H);
      sceneCache.laserBase = ec;
    }


    function drawTreatBackdrop(c) {
      if (!sceneCache.treatBase) buildStaticCaches();
      c.drawImage(sceneCache.treatBase, 0, 0);
      c.save();
      c.globalAlpha = 0.24;
      c.translate((game.time * 12) % 220, 0);
      c.fillStyle = "rgba(255,255,255,0.9)";
      for (let i = -1; i < 5; i++) {
        c.beginPath();
        c.arc(i * 220 + 80, 138 + (i % 2) * 18, 24, 0, Math.PI * 2);
        c.arc(i * 220 + 104, 146 + (i % 2) * 18, 16, 0, Math.PI * 2);
        c.fill();
      }
      c.restore();
    }

    function drawLaserBackdrop(c) {
      if (!sceneCache.laserBase) buildStaticCaches();
      c.drawImage(sceneCache.laserBase, 0, 0);
      drawGlowCircle(c, 702, 100, 86, "rgba(255,236,177,ALPHA)", 0.12);
    }

    function drawAimPreview(c, sx, sy, tx, flight = 0.92) {
      c.save();
      c.fillStyle = "rgba(255,255,255,0.75)";
      for (let i = 0; i < 12; i++) {
        const t = (i + 1) / 13 * flight;
        const px = sx + ((tx - sx) / flight) * t;
        const py = sy + 30 * t + 0.5 * 640 * t * t;
        c.beginPath();
        c.arc(px, py, 3 + i * 0.08, 0, Math.PI * 2);
        c.fill();
      }
      c.restore();
    }

    function drawTitleBg(c) {
      if (!sceneCache.titleBase) buildStaticCaches();
      c.drawImage(sceneCache.titleBase, 0, 0);

      /* layered bokeh lights - slow parallax */
      c.save();
      for (let layer = 0; layer < 3; layer++) {
        const speed = 0.08 + layer * 0.06;
        const baseSize = 30 + layer * 20;
        const alpha = 0.05 - layer * 0.012;
        for (let i = 0; i < 5; i++) {
          const bx = ((game.time * speed * 40 + i * 170 + layer * 90) % (W + 100)) - 50;
          const by = 80 + i * 100 + layer * 30 + Math.sin(game.time * 0.4 + i * 1.5 + layer) * 25;
          const bs = baseSize + Math.sin(game.time * 0.6 + i * 2) * 8;
          const bg = c.createRadialGradient(bx, by, 0, bx, by, bs);
          bg.addColorStop(0, `rgba(255,220,160,${alpha + 0.02})`);
          bg.addColorStop(0.5, `rgba(255,200,140,${alpha})`);
          bg.addColorStop(1, "rgba(255,200,140,0)");
          c.fillStyle = bg;
          c.beginPath();
          c.arc(bx, by, bs, 0, Math.PI * 2);
          c.fill();
        }
      }
      c.restore();

      /* floating hearts and stars */
      for (const a of game.ambient) {
        c.save();
        c.globalAlpha = 0.28 + 0.14 * Math.sin(game.time * 1.2 + a.phase);
        c.translate(0, Math.sin(game.time * 0.8 + a.phase) * 2);
        if (a.shape === "heart") drawHeart(c, a.x, a.y, a.size / 14, a.color);
        else drawStar(c, a.x, a.y, a.size, a.color);
        c.restore();
      }

      /* warm spotlight behind character area */
      const spotG = c.createRadialGradient(400, 400, 40, 400, 400, 240);
      spotG.addColorStop(0, "rgba(255,240,210,0.12)");
      spotG.addColorStop(0.6, "rgba(255,230,200,0.05)");
      spotG.addColorStop(1, "rgba(255,230,200,0)");
      c.fillStyle = spotG;
      c.fillRect(100, 200, 600, 350);
    }

    function drawLivingRoom(c, mode = "hub") {
      if (!sceneCache.livingRoomBase) buildStaticCaches();
      c.drawImage(sceneCache.livingRoomBase, 0, 0);

      /* room style preset tint */
      if (store.decor.roomPreset === 1) {
        c.save();
        c.globalCompositeOperation = "multiply";
        c.fillStyle = "rgba(245,225,238,0.15)";
        c.fillRect(0, 0, W, 340);
        c.fillStyle = "rgba(240,225,215,0.12)";
        c.fillRect(0, 340, W, H - 340);
        c.restore();
      } else if (store.decor.roomPreset === 2) {
        c.save();
        c.globalCompositeOperation = "multiply";
        c.fillStyle = "rgba(245,228,200,0.18)";
        c.fillRect(0, 0, W, 340);
        c.fillStyle = "rgba(235,210,180,0.14)";
        c.fillRect(0, 340, W, H - 340);
        c.restore();
      } else if (store.decor.roomPreset === 3) {
        c.save();
        c.globalCompositeOperation = "multiply";
        c.fillStyle = "rgba(200,215,240,0.15)";
        c.fillRect(0, 0, W, 340);
        c.fillStyle = "rgba(190,200,220,0.12)";
        c.fillRect(0, 340, W, H - 340);
        c.restore();
      } else if (store.decor.roomPreset === 4) {
        c.save();
        c.globalCompositeOperation = "multiply";
        c.fillStyle = "rgba(230,215,195,0.16)";
        c.fillRect(0, 0, W, 340);
        c.fillStyle = "rgba(220,200,175,0.12)";
        c.fillRect(0, 340, W, H - 340);
        c.restore();
      }

      /* animated window sky — time-of-day aware */
      const tod = store.decor.timeOfDay || 1;
      c.save();
      c.beginPath();
      rr(c, 66, 52, 120, 152, 5);
      c.clip();
      if (tod === 0) {
        const skyG = c.createLinearGradient(66, 52, 66, 204);
        skyG.addColorStop(0, "#FFB088");
        skyG.addColorStop(0.5, "#FFCDA8");
        skyG.addColorStop(1, "#FFE8C8");
        c.fillStyle = skyG;
        c.fillRect(66, 52, 120, 152);
      } else if (tod === 2) {
        const skyG = c.createLinearGradient(66, 52, 66, 204);
        skyG.addColorStop(0, "#C87848");
        skyG.addColorStop(0.4, "#D89060");
        skyG.addColorStop(1, "#A87098");
        c.fillStyle = skyG;
        c.fillRect(66, 52, 120, 152);
      } else if (tod === 3) {
        c.fillStyle = "#1A1E38";
        c.fillRect(66, 52, 120, 152);
        c.fillStyle = "#FFFFFF";
        const starPositions = [[82,68],[110,72],[140,60],[95,90],[160,80],[130,100],[75,110],[150,95],[108,118],[170,65]];
        for (const [sx,sy] of starPositions) {
          c.globalAlpha = 0.4 + Math.sin(game.time * 1.5 + sx * 0.1) * 0.3;
          c.beginPath(); c.arc(sx, sy, 1.2, 0, Math.PI * 2); c.fill();
        }
        c.globalAlpha = 1;
        c.fillStyle = "#E8E4D8";
        c.beginPath(); c.arc(155, 72, 12, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#1A1E38";
        c.beginPath(); c.arc(160, 68, 10, 0, Math.PI * 2); c.fill();
      } else {
        const skyShift = Math.sin(game.time * 0.05) * 0.08;
        const skyG = c.createLinearGradient(66, 52, 66, 204);
        skyG.addColorStop(0, `rgba(${135 + skyShift * 40},${206 + skyShift * 20},${235},1)`);
        skyG.addColorStop(1, `rgba(${200 + skyShift * 30},${230 + skyShift * 10},255,1)`);
        c.fillStyle = skyG;
        c.fillRect(66, 52, 120, 152);
        c.fillStyle = "rgba(255,255,255,0.7)";
        for (let i = 0; i < 3; i++) {
          const cx = 66 + ((game.time * (6 + i * 2) + i * 55) % 160) - 20;
          const cy = 68 + i * 40 + Math.sin(game.time * 0.3 + i * 2) * 4;
          c.beginPath();
          c.ellipse(cx, cy, 18 + i * 4, 8 + i * 2, 0, 0, Math.PI * 2);
          c.fill();
          c.beginPath();
          c.ellipse(cx + 12, cy + 2, 12 + i * 2, 6 + i, 0, 0, Math.PI * 2);
          c.fill();
        }
      }
      c.restore();

      /* warm light rays from window */
      c.save();
      c.globalAlpha = 0.04 + 0.015 * Math.sin(game.time * 0.8);
      c.fillStyle = "rgba(255,240,180,1)";
      c.beginPath();
      c.moveTo(66, 52);
      c.lineTo(190, 52);
      c.lineTo(380, 480);
      c.lineTo(120, 480);
      c.closePath();
      c.fill();
      /* secondary softer ray */
      c.globalAlpha = 0.025 + 0.01 * Math.sin(game.time * 0.6 + 1);
      c.beginPath();
      c.moveTo(100, 80);
      c.lineTo(170, 80);
      c.lineTo(320, 470);
      c.lineTo(200, 470);
      c.closePath();
      c.fill();
      c.restore();

      /* time-of-day room lighting overlay */
      if (tod === 0) {
        c.save(); c.globalAlpha = 0.06;
        c.fillStyle = "#FFE0A0"; c.fillRect(0, 0, W, H);
        c.restore();
      } else if (tod === 2) {
        c.save(); c.globalAlpha = 0.08;
        c.fillStyle = "#E8A050"; c.fillRect(0, 0, W, H);
        c.restore();
      } else if (tod === 3) {
        c.save(); c.globalAlpha = 0.22;
        c.fillStyle = "#141828"; c.fillRect(0, 0, W, H);
        c.restore();
        if (store.decor.lampOn !== false) {
          drawGlowCircle(c, 216, 160, 180, "rgba(255,220,140,ALPHA)", 0.16);
        }
      }

      /* animated lamp glow - conditional on lamp state + time-of-day */
      const lampOn = store.decor.lampOn !== false;
      const todMult = tod === 3 ? 1.6 : tod === 2 ? 1.3 : tod === 0 ? 0.7 : 1.0;
      const lampFlicker = (0.08 + 0.025 * Math.sin(game.time * 1.2) + 0.01 * Math.sin(game.time * 4.7) + 0.005 * Math.sin(game.time * 11.3)) * todMult;
      const lampAlpha = lampOn ? lampFlicker : lampFlicker * 0.05;
      const glowColors = [
        ["rgba(255,232,160,ALPHA)", "rgba(255,220,140,ALPHA)"],
        ["rgba(255,210,230,ALPHA)", "rgba(255,200,220,ALPHA)"],
        ["rgba(255,200,140,ALPHA)", "rgba(255,190,120,ALPHA)"],
        ["rgba(200,215,255,ALPHA)", "rgba(190,205,245,ALPHA)"],
        ["rgba(255,225,170,ALPHA)", "rgba(245,215,155,ALPHA)"]
      ][store.decor.roomPreset || 0] || ["rgba(255,232,160,ALPHA)", "rgba(255,220,140,ALPHA)"];
      drawGlowCircle(c, 216, 146, 96, glowColors[0], lampAlpha);
      drawGlowCircle(c, 216, 160, 50, glowColors[1], lampAlpha * 0.6);
      if (!lampOn) {
        c.save();
        c.globalAlpha = 0.35;
        c.fillStyle = "#000";
        c.beginPath();
        c.ellipse(216, 160, 20, 30, 0, 0, Math.PI * 2);
        c.fill();
        c.globalAlpha = 0.06;
        c.fillRect(0, 0, W / 2, H);
        c.restore();
      }

      /* steam from mug on side table */
      c.save();
      c.globalAlpha = 0.18;
      for (let i = 0; i < 3; i++) {
        const st = (game.time * 0.6 + i * 1.2) % 3.6;
        const sy = 314 - st * 14;
        const sx = 246 + Math.sin(game.time * 1.5 + i * 2.1) * 4;
        const sa = clamp(1 - st / 3.6, 0, 1) * (st > 0.2 ? 1 : st / 0.2);
        c.globalAlpha = sa * 0.15;
        c.fillStyle = "rgba(255,255,255,0.9)";
        c.beginPath();
        c.ellipse(sx, sy, 3 + st * 1.5, 2 + st, 0, 0, Math.PI * 2);
        c.fill();
      }
      c.restore();

      /* dust motes floating in light rays */
      if (mode === "hub") {
        c.save();
        for (let i = 0; i < 8; i++) {
          const mt = (game.time * 0.15 + i * 1.7) % 6;
          const mx = 100 + i * 30 + Math.sin(game.time * 0.3 + i * 0.9) * 20;
          const my = 120 + mt * 60 + Math.sin(game.time * 0.5 + i * 1.3) * 8;
          if (my > 460) continue;
          /* only show motes in the light ray area */
          const inRay = mx > 80 && mx < 340 && my > 80;
          if (!inRay) continue;
          const mAlpha = 0.25 + 0.15 * Math.sin(game.time * 2 + i * 0.7);
          c.globalAlpha = mAlpha * clamp(1 - (my - 380) / 80, 0.2, 1);
          c.fillStyle = "#FFF8E0";
          c.beginPath();
          c.arc(mx, my, 1.5 + Math.sin(game.time + i) * 0.5, 0, Math.PI * 2);
          c.fill();
        }
        c.restore();
      }

      /* dynamic decorations */
      const d = store.decor;
      if (d.fairyLights) {
        c.save();
        /* string with natural sag */
        c.strokeStyle = "rgba(180,160,110,0.55)";
        c.lineWidth = 1.5;
        c.beginPath();
        c.moveTo(50, 228);
        for (let i = 1; i < 16; i++) {
          const px = 50 + i * 47;
          const py = 224 + Math.sin(i * 0.8) * 7 + Math.sin(i * 0.3) * 3;
          c.lineTo(px, py);
        }
        c.stroke();
        /* bulbs with glow */
        for (let i = 0; i < 16; i++) {
          const lx = 50 + i * 47;
          const ly = 224 + Math.sin(i * 0.8) * 7 + Math.sin(i * 0.3) * 3;
          const bulbColor = ["#FFD700","#FF8FAA","#87CEEB","#A8D870","#FFB347"][i % 5];
          const pulse = Math.sin(game.time * 2.5 + i * 1.1);
          /* outer glow */
          c.globalAlpha = 0.16 + pulse * 0.1;
          c.fillStyle = bulbColor;
          c.beginPath(); c.arc(lx, ly + 5, 12, 0, Math.PI * 2); c.fill();
          /* bulb body */
          c.globalAlpha = 0.7 + pulse * 0.25;
          c.beginPath(); c.arc(lx, ly + 5, 4.5, 0, Math.PI * 2); c.fill();
          /* highlight */
          c.globalAlpha = 0.5 + pulse * 0.2;
          c.fillStyle = "rgba(255,255,255,0.7)";
          c.beginPath(); c.arc(lx - 1, ly + 3, 1.5, 0, Math.PI * 2); c.fill();
        }
        c.restore();
      }
      if (d.plant2) {
        c.save();
        c.translate(236, 324);
        /* pot shadow */
        c.fillStyle = "rgba(0,0,0,0.06)";
        c.beginPath(); c.ellipse(0, 14, 14, 4, 0, 0, Math.PI * 2); c.fill();
        /* pot body */
        c.fillStyle = "#A07050";
        rr(c, -10, 0, 20, 14, 4);
        c.fill();
        /* pot rim */
        c.fillStyle = "#B08060";
        rr(c, -12, -2, 24, 5, 3);
        c.fill();
        /* foliage layers */
        c.fillStyle = "#4A9848";
        c.beginPath(); c.ellipse(0, -8, 15, 15, 0, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#5EAA56";
        c.beginPath(); c.ellipse(-5, -14, 11, 11, -0.3, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#6CBC64";
        c.beginPath(); c.ellipse(5, -12, 9, 9, 0.2, 0, Math.PI * 2); c.fill();
        /* flowers */
        c.fillStyle = "#FF8090";
        c.beginPath(); c.arc(4, -20, 4.5, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(-9, -13, 3.5, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(8, -10, 3, 0, Math.PI * 2); c.fill();
        /* flower centers */
        c.fillStyle = "#FFD080";
        c.beginPath(); c.arc(4, -20, 1.5, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(-9, -13, 1.2, 0, Math.PI * 2); c.fill();
        c.restore();
      }
      if (d.petBed) {
        c.save();
        c.translate(180, 460);
        /* shadow */
        c.fillStyle = "rgba(0,0,0,0.08)";
        c.beginPath(); c.ellipse(0, 8, 42, 14, 0, 0, Math.PI * 2); c.fill();
        /* outer rim */
        c.fillStyle = "#B88888";
        c.beginPath(); c.ellipse(0, 0, 38, 16, 0, 0, Math.PI * 2); c.fill();
        /* inner cushion */
        c.fillStyle = "#D4A0A0";
        c.beginPath(); c.ellipse(0, -1, 32, 12, 0, 0, Math.PI * 2); c.fill();
        /* pillow center */
        c.fillStyle = "#E0B4B4";
        c.beginPath(); c.ellipse(0, -3, 24, 9, 0, 0, Math.PI * 2); c.fill();
        /* highlight shine */
        c.fillStyle = "rgba(255,255,255,0.25)";
        c.beginPath(); c.ellipse(-6, -6, 14, 5, -0.2, 0, Math.PI * 2); c.fill();
        /* subtle rim stroke */
        c.strokeStyle = "rgba(160,100,100,0.2)";
        c.lineWidth = 1;
        c.beginPath(); c.ellipse(0, 0, 38, 16, 0, 0, Math.PI * 2); c.stroke();
        c.restore();
      }
      /* cozy blanket on couch back */
      if (d.cozyBlanket) {
        c.save();
        c.translate(400, 268);
        c.fillStyle = "#C4A088";
        c.beginPath();
        c.moveTo(-60, -4);
        c.quadraticCurveTo(-40, 8, -20, 2);
        c.quadraticCurveTo(0, -4, 20, 2);
        c.quadraticCurveTo(40, 8, 60, -2);
        c.lineTo(55, 24);
        c.quadraticCurveTo(30, 30, 0, 26);
        c.quadraticCurveTo(-30, 30, -55, 24);
        c.closePath();
        c.fill();
        c.strokeStyle = "rgba(160,120,90,0.3)";
        c.lineWidth = 1;
        c.stroke();
        c.fillStyle = "rgba(255,255,255,0.12)";
        c.beginPath();
        c.moveTo(-40, 0); c.quadraticCurveTo(-10, -4, 20, 2); c.lineTo(15, 14); c.quadraticCurveTo(-10, 10, -40, 14); c.closePath();
        c.fill();
        c.restore();
      }
      /* window herbs */
      if (d.windowPlant) {
        const herbX = [72, 110, 148];
        for (let hi = 0; hi < 3; hi++) {
          c.save();
          c.translate(herbX[hi], 196);
          c.fillStyle = "#906840";
          rr(c, -6, -2, 12, 8, 3); c.fill();
          c.fillStyle = "#4A9848";
          c.beginPath(); c.ellipse(0, -8, 7, 8, 0, 0, Math.PI * 2); c.fill();
          c.fillStyle = "#5EAA56";
          c.beginPath(); c.ellipse(-3, -12, 4, 5, -0.3, 0, Math.PI * 2); c.fill();
          c.beginPath(); c.ellipse(3, -11, 4, 5, 0.3, 0, Math.PI * 2); c.fill();
          c.restore();
        }
      }
      /* photo wall */
      if (d.photoWall) {
        const frameY = [100, 140, 170];
        for (let fi = 0; fi < 3; fi++) {
          c.save();
          c.translate(548, frameY[fi]);
          c.fillStyle = "#8B7355";
          rr(c, -16, -12, 32, 24, 2); c.fill();
          c.fillStyle = "#FFF8E8";
          rr(c, -13, -9, 26, 18, 1); c.fill();
          c.fillStyle = "rgba(180,150,120,0.3)";
          c.beginPath(); c.arc(-2, 0, 5, 0, Math.PI * 2); c.fill();
          c.restore();
        }
      }
      /* ── Phase 4 decorations ── */
      if (d.floorCushion) {
        c.fillStyle = "#E8A898";
        c.beginPath(); c.ellipse(340, 488, 22, 10, 0.1, 0, Math.PI * 2); c.fill();
        c.fillStyle = "rgba(255,255,255,0.2)";
        c.beginPath(); c.ellipse(336, 486, 8, 4, 0, 0, Math.PI * 2); c.fill();
      }
      if (d.corkBoard) {
        c.fillStyle = "#B89060";
        rr(c, 472, 110, 52, 42, 3); c.fill();
        c.fillStyle = "#D4A870";
        rr(c, 475, 113, 46, 36, 2); c.fill();
        /* pins */
        c.fillStyle = "#D04040"; c.beginPath(); c.arc(485, 122, 2.5, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#4090D0"; c.beginPath(); c.arc(500, 130, 2.5, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#40B040"; c.beginPath(); c.arc(510, 120, 2.5, 0, Math.PI * 2); c.fill();
        /* notes */
        c.fillStyle = "#FFFAC0"; rr(c, 481, 125, 14, 16, 1); c.fill();
        c.fillStyle = "#C0E8FF"; rr(c, 498, 133, 16, 12, 1); c.fill();
      }
      if (d.bookStack) {
        var bkColors = ["#8B4040", "#40608B", "#6B8B40", "#8B6B40"];
        for (var bi = 0; bi < 4; bi++) {
          c.fillStyle = bkColors[bi];
          rr(c, 236, 360 - bi * 8, 28, 7, 2); c.fill();
        }
      }
      if (d.hangingPlant) {
        /* macrame hanger from ceiling */
        c.strokeStyle = "#C8B8A0"; c.lineWidth = 1.5;
        c.beginPath(); c.moveTo(560, 0); c.lineTo(560, 60); c.stroke();
        c.beginPath(); c.moveTo(555, 50); c.quadraticCurveTo(560, 65, 565, 50); c.stroke();
        c.fillStyle = "#6B8B40";
        c.beginPath(); c.arc(560, 54, 12, 0, Math.PI * 2); c.fill();

        c.beginPath(); c.arc(565, 50, 5, 0, Math.PI * 2); c.fill();

      if (d.wallClock) {
        c.fillStyle = "#E8D8C0";
        c.beginPath(); c.arc(550, 180, 18, 0, Math.PI * 2); c.fill();
        c.strokeStyle = "#8B7355"; c.lineWidth = 2;
        c.beginPath(); c.arc(550, 180, 18, 0, Math.PI * 2); c.stroke();
        /* hour hand */
        var hr = (game.time * 0.001) % (Math.PI * 2);
        c.strokeStyle = "#5C4434"; c.lineWidth = 2;
        c.beginPath(); c.moveTo(550, 180); c.lineTo(550 + Math.sin(hr) * 9, 180 - Math.cos(hr) * 9); c.stroke();
        /* minute hand */
        var mn = (game.time * 0.01) % (Math.PI * 2);
        c.lineWidth = 1.5;
        c.beginPath(); c.moveTo(550, 180); c.lineTo(550 + Math.sin(mn) * 13, 180 - Math.cos(mn) * 13); c.stroke();
        c.fillStyle = "#5C4434"; c.beginPath(); c.arc(550, 180, 2, 0, Math.PI * 2); c.fill();
      }
      if (d.petToys) {
        /* small basket of toys on the floor */
        c.fillStyle = "#B89868";
        rr(c, 300, 478, 36, 18, 6); c.fill();
        c.fillStyle = "#4A90D9"; c.beginPath(); c.arc(308, 476, 5, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#E8A84C"; rr(c, 316, 473, 12, 5, 2); c.fill();
        c.fillStyle = "#FF69B4"; c.beginPath(); c.arc(324, 476, 4, 0, Math.PI * 2); c.fill();
      }
      if (d.garland > 0) {
        var gColors = [
          ["#FFB6C1", "#FFD700", "#87CEEB"],
          ["#FFD700", "#FF8C42", "#FFE4B5"],
          ["#C87848", "#A87048", "#D4A848"],
          ["#B8D8F0", "#E8E8F0", "#D0D8E8"]
        ];
        var gc = gColors[(d.garland - 1) % gColors.length];
        c.strokeStyle = "rgba(160,140,120,0.3)"; c.lineWidth = 1;
        c.beginPath(); c.moveTo(300, 36); c.quadraticCurveTo(400, 50, 500, 36); c.stroke();
        for (var gi = 0; gi < 8; gi++) {
          var gx = 310 + gi * 24;
          var gy = 36 + Math.sin((gi / 7) * Math.PI) * 14;
          c.fillStyle = gc[gi % gc.length];
          c.beginPath(); c.arc(gx, gy + 4, 4, 0, Math.PI * 2); c.fill();
        }
      }
      if (d.musicBox) {
        c.fillStyle = "#B89060";
        rr(c, 248, 328, 18, 12, 3); c.fill();
        c.fillStyle = "#FFD700";
        c.beginPath(); c.arc(257, 326, 2, 0, Math.PI * 2); c.fill();
        /* occasional sparkle */
        if (Math.sin(game.time * 1.5) > 0.8) {
          c.fillStyle = "rgba(255,215,0,0.5)";
          c.beginPath(); c.arc(257 + Math.sin(game.time * 3) * 5, 322 - Math.abs(Math.sin(game.time * 2)) * 6, 2, 0, Math.PI * 2); c.fill();
        }
      }
      if (d.familyPortrait) {
        c.fillStyle = "#C8A872";
        rr(c, 340, 90, 44, 36, 3); c.fill();
        c.fillStyle = "#FFE8D8";
        rr(c, 344, 94, 36, 28, 2); c.fill();
        /* tiny silhouettes */
        c.fillStyle = "#E8C85A"; c.beginPath(); c.arc(358, 104, 5, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#FAFAFA"; c.beginPath(); c.arc(350, 112, 4, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#9B7D3C"; c.beginPath(); c.arc(366, 112, 3.5, 0, Math.PI * 2); c.fill();
      }
      var couchPillowColors = [null, "#E88070", "#7ECBB0", "#E8C84A", "#C39BD3"];
      if (d.couchPillows > 0) {
        c.fillStyle = couchPillowColors[d.couchPillows] || "#E88070";
        c.beginPath(); c.ellipse(352, 310, 14, 10, -0.2, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.ellipse(448, 308, 12, 9, 0.15, 0, Math.PI * 2); c.fill();
      }

      const rugColors = ["rgba(216,194,168,1)", "rgba(168,198,148,1)", "rgba(185,170,210,1)", "rgba(210,175,168,1)"];
      if (d.rugColor > 0) {
        c.save();
        c.globalAlpha = 0.22;
        c.fillStyle = rugColors[d.rugColor];
        c.beginPath(); c.ellipse(400, 470, 220, 55, 0, 0, Math.PI * 2); c.fill();
        /* rug texture highlight */
        c.globalAlpha = 0.06;
        c.fillStyle = "#FFFFFF";
        c.beginPath(); c.ellipse(400, 465, 180, 40, 0, 0, Math.PI * 2); c.fill();
        c.restore();
      }

      if (mode === "cuddle") {
        drawGlowCircle(c, 398, 310, 170, "rgba(255,255,255,ALPHA)", 0.08);

    // ═══ 12-scene-title.js ═══
    class TitleScene extends BaseScene {
      constructor() {
        super("title");
        this.startButton = { x: W / 2 - 140, y: 500, w: 280, h: 56 };
        this.hoverStart = false;
        /* live character state */
        this.annie = { x: 400, y: 380, state: "idle", timer: rand(3, 6), facing: 1 };
        this.obi   = { x: 240, y: 440, state: "wander", timer: rand(1, 3), vx: 0, facing: 1, targetX: 240 };
        this.luna  = { x: 560, y: 420, state: "sit", timer: rand(2, 5), vx: 0, facing: -1, targetX: 560 };
        this.interaction = null;  /* { type, timer } */
        this.subtitleIndex = Math.floor(Math.random() * TITLE_SUBTITLES.length);
        this.subtitleTimer = 6;
      }
      enter() {
        this.annie.timer = rand(2, 4);
        this.obi.timer = rand(1, 3);
        this.luna.timer = rand(2, 4);
      }
      pickAnnieState() {
        const r = Math.random();
        if (r < 0.25) return { state: "idle", timer: rand(3, 6) };
        if (r < 0.45) return { state: "cheer", timer: rand(1.5, 2.5) };
        if (r < 0.6) return { state: "laugh", timer: rand(2, 3.5) };
        if (r < 0.78) return { state: "kneel", timer: rand(2, 3.5) };
        return { state: "walk", timer: rand(2.5, 4), targetX: 400 + rand(-100, 100) };
      }
      pickObiState() {
        const r = Math.random();
        if (r < 0.25) {
          const tx = rand(100, 700);
          return { state: "wander", timer: rand(2, 4), targetX: tx, facing: tx > this.obi.x ? 1 : -1 };
        }
        if (r < 0.42) return { state: "sit", timer: rand(2, 5) };
        if (r < 0.55) return { state: "sniff", timer: rand(2, 3.5), targetX: this.obi.x + rand(-60, 60), facing: Math.random() < 0.5 ? 1 : -1 };
        if (r < 0.66) return { state: "nap", timer: rand(3, 5) };
        if (r < 0.8) return { state: "sniffLuna", timer: rand(2.5, 4), targetX: this.luna.x - 40, facing: 1 };
        /* run toward Annie */
        return { state: "approach", timer: rand(1.5, 2.5), targetX: this.annie.x - 50, facing: 1 };
      }
      pickLunaState() {
        const r = Math.random();
        if (r < 0.2) return { state: "sit", timer: rand(2, 5) };
        if (r < 0.38) {
          const tx = rand(100, 700);
          return { state: "wander", timer: rand(2, 3.5), targetX: tx, facing: tx > this.luna.x ? 1 : -1 };
        }
        if (r < 0.5) return { state: "groom", timer: rand(2.5, 4) };
        if (r < 0.62) return { state: "nap", timer: rand(3, 5) };
        if (r < 0.74) return { state: "bellyUp", timer: rand(2, 4) };
        if (r < 0.86) return { state: "batObi", timer: rand(2, 3.5), targetX: this.obi.x + 35, facing: -1 };
        /* pounce at something */
        return { state: "pounce", timer: rand(0.6, 1.2), targetX: this.luna.x + (Math.random() < 0.5 ? -80 : 80) };
      }
      update(dt) {
        super.update(dt);
        this.hoverStart = pointInRect(game.mouse.x, game.mouse.y, this.startButton) && spriteArt.ready;
        this.subtitleTimer -= dt;
        if (this.subtitleTimer <= 0) {
          this.subtitleIndex = (this.subtitleIndex + 1) % TITLE_SUBTITLES.length;
          this.subtitleTimer = 6;
        }
        const a = this.annie, o = this.obi, l = this.luna;

        /* Annie */
        a.timer -= dt;
        if (a.state === "walk" && a.targetX !== undefined) {
          const dir = Math.sign(a.targetX - a.x);
          a.x += dir * 50 * dt;
          a.facing = dir || a.facing;
          if (Math.abs(a.x - a.targetX) < 8) { a.x = a.targetX; a.state = "idle"; a.timer = rand(2, 4); }
        }
        a.x = clamp(a.x || 400, 200, 600);
        if (a.timer <= 0) Object.assign(a, this.pickAnnieState());

        /* Obi */
        o.timer -= dt;
        if (o.state === "wander" || o.state === "approach" || o.state === "sniff" || o.state === "sniffLuna") {
          const speed = o.state === "approach" ? 110 : o.state === "sniff" ? 30 : o.state === "sniffLuna" ? 70 : 60;
          if (o.state === "sniffLuna") o.targetX = l.x - 40;
          const dir = Math.sign(o.targetX - o.x);
          o.x += dir * speed * dt;
          o.facing = dir || o.facing;
          if (Math.abs(o.x - o.targetX) < 8) {
            if (o.state === "sniffLuna") { o.x = o.targetX; o.state = "sniffLunaIdle"; o.timer = rand(1.5, 2.5); }
            else { o.x = o.targetX; o.state = "sit"; o.timer = rand(1, 3); }
          }
        }
        if (o.timer <= 0) Object.assign(o, this.pickObiState());
        o.x = clamp(o.x, 80, 720);

        /* Luna */
        l.timer -= dt;
        if (l.state === "wander" || l.state === "batObi") {
          const speed = l.state === "batObi" ? 55 : 45;
          if (l.state === "batObi") l.targetX = o.x + 35;
          const dir = Math.sign(l.targetX - l.x);
          l.x += dir * speed * dt;
          l.facing = dir || l.facing;
          if (Math.abs(l.x - l.targetX) < 8) {
            if (l.state === "batObi") { l.x = l.targetX; l.state = "batObiIdle"; l.timer = rand(1, 2); }
            else { l.x = l.targetX; l.state = "sit"; l.timer = rand(1.5, 3); }
          }
        } else if (l.state === "pounce") {
          const dir = Math.sign(l.targetX - l.x);
          l.x += dir * 200 * dt;
          l.facing = dir || l.facing;
        }
        if (l.timer <= 0) Object.assign(l, this.pickLunaState());
        l.x = clamp(l.x, 80, 720);

        /* interaction sparkles */
        if (o.state === "approach" && Math.abs(o.x - a.x) < 60) {
          if (Math.random() < dt * 3) spawnParticleBurst(o.x, o.y - 30, [COLORS.softPink], 1, ["heart"]);
        }
        if (l.state === "pounce" && l.timer < 0.3) {
          if (Math.random() < dt * 4) spawnParticleBurst(l.x, l.y - 20, [COLORS.gold], 1, ["star"]);
        }
        /* Obi sniffing Luna */
        if (o.state === "sniffLunaIdle" && Math.abs(o.x - l.x) < 60) {
          if (Math.random() < dt * 2.5) spawnParticleBurst((o.x + l.x) / 2, Math.min(o.y, l.y) - 30, [COLORS.softPink, COLORS.gold], 1, ["heart"]);
        }
        /* Luna batting at Obi */
        if (l.state === "batObiIdle" && Math.abs(l.x - o.x) < 60) {
          if (Math.random() < dt * 3) spawnParticleBurst((o.x + l.x) / 2, Math.min(o.y, l.y) - 25, [COLORS.gold, "#FFF4C0"], 2, ["star"]);
        }
      }
      onMouseMove(x, y) {
        this.hoverStart = pointInRect(x, y, this.startButton) && spriteArt.ready;
      }
      interactiveAt(x, y) {
        return spriteArt.ready && pointInRect(x, y, this.startButton);
      }
      onClick(x, y) {
        if (spriteArt.ready && pointInRect(x, y, this.startButton)) {
          audio.menu();
          transitionTo(SceneRegistry.create("hangout"));
        }
      }
      draw(c) {
        drawTitleBg(c);
        drawGlowCircle(c, 400, 340, 220, "rgba(255,255,255,ALPHA)", 0.10);

        const a = this.annie, o = this.obi, l = this.luna;

        /* draw characters sorted by Y for natural overlap */
        const chars = [
          { type: "obi", y: o.y },
          { type: "annie", y: a.y },
          { type: "luna", y: l.y }
        ].sort((a, b) => a.y - b.y);

        for (const ch of chars) {
          if (ch.type === "obi") {
            const isMoving = o.state === "wander" || o.state === "approach" || o.state === "sniffLuna";
            const pose = o.state === "nap" ? "sleeping" : (o.state === "sniff" || o.state === "sniffLuna" || o.state === "sniffLunaIdle") ? "sniff" : isMoving ? "run" : "sit";
            drawObi(c, o.x, o.y, 1.20, {
              pose,
              expression: o.state === "approach" ? "excited" : "happy",
              tail: Math.sin(game.time * (isMoving ? 10 : o.state === "sniffLunaIdle" ? 12 : 6)) * 0.9,
              bounce: isMoving ? 0.08 * Math.sin(game.time * 12) : 0.04 * Math.sin(game.time * 3),
              facing: o.facing
            });
          } else if (ch.type === "annie") {
            let pose = "idle";
            if (a.state === "cheer") pose = "cheer";
            else if (a.state === "laugh") pose = "laugh";
            else if (a.state === "kneel") pose = "kneel";
            else if (a.state === "walk") pose = "walk";
            drawAnnie(c, a.x, a.y, 1.50, {
              pose,
              breath: Math.sin(game.time * 2.1),
              blink: blinkSignal(game.time, 0.6),
              hairSway: Math.sin(game.time * 1.35),
              facing: a.facing || 1
            });
          } else {
            const isPounce = l.state === "pounce";
            const isMoving = l.state === "wander" || l.state === "batObi";
            let lunaPose = "sit";
            if (isPounce) lunaPose = "pounce";
            else if (isMoving) lunaPose = "topdown";
            else if (l.state === "groom") lunaPose = "groom";
            else if (l.state === "nap") lunaPose = "sleeping";
            else if (l.state === "bellyUp") lunaPose = "bellyUp";
            else if (l.state === "batObi" || l.state === "batObiIdle") lunaPose = "pounce";
            drawLuna(c, l.x, l.y, 1.16, {
              pose: lunaPose,
              tail: Math.sin(game.time * (isPounce ? 8 : l.state === "batObiIdle" ? 6 : 1.6)),
              earTwitch: earSignal(game.time),
              blink: blinkSignal(game.time + 1.4, 0.42),
              pounceStretch: isPounce ? 0.9 : (l.state === "batObiIdle" ? 0.4 : 0),
              pawBat: l.state === "batObiIdle" ? (0.5 + Math.sin(game.time * 6) * 0.5) : 0,
              wiggle: isPounce ? game.time * 3 % 1 : 0,
              facing: l.facing
            });
          }
        }

        /* title text with glow and layered shadow */
        c.save();
        c.textAlign = "center";
        /* warm glow behind title */
        drawGlowCircle(c, W / 2, 88, 200, "rgba(255,240,210,ALPHA)", 0.1);
        /* deep shadow */
        c.fillStyle = "rgba(92,58,32,0.2)";
        c.font = '50px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("Annie's Cozy Day", W / 2 + 3, 96);
        /* light outline */
        c.strokeStyle = "rgba(255,248,240,0.5)";
        c.lineWidth = 6;
        c.font = '50px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.strokeText("Annie's Cozy Day", W / 2, 92);
        /* main title */
        c.fillStyle = "#7A4E36";
        c.fillText("Annie's Cozy Day", W / 2, 92);
        /* subtitle with softer style */
        c.fillStyle = "rgba(122,78,54,0.7)";
        c.font = '23px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("A Cozy Minigame Collection", W / 2, 128);
        c.restore();

        const pulse = 1 + 0.06 * Math.sin(game.time * 3);
        c.save();
        c.translate(W / 2, 528);
        c.scale(pulse, pulse);
        const loadDots = ".".repeat(Math.floor(game.time * 2) % 4);
        drawButton(c, { x: -140, y: -28, w: 280, h: 56 }, spriteArt.ready ? (isMobile ? "Tap to Start" : "Click to Start") : "Loading Cozy Art" + loadDots, this.hoverStart, "#B84B3A");
        c.restore();

        c.save();
        const subFade = Math.min(clamp(this.subtitleTimer / 0.8, 0, 1), clamp((6 - this.subtitleTimer) / 0.8, 0, 1));
        c.globalAlpha = subFade * 0.85;
        c.fillStyle = "#7A4E36";
        c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "center";
        c.fillText(TITLE_SUBTITLES[this.subtitleIndex], W / 2, 574);
        c.restore();
      }
    }

    function getCurrentFavorite(pet) {
      const weekNumber = Math.floor(Date.now() / (7 * 24 * 60 * 60 * 1000));
      const seed = pet === "obi" ? weekNumber * 3 : weekNumber * 7 + 2;
      const favorites = pet === "obi"
        ? ["belly", "treats", "ball", "brushing"]
        : ["chin", "yarn", "brushing", "sunbeam"];
      return favorites[seed % favorites.length];
    }

                        (want === "food" && source === "feed") ||
                        (want === "water" && source === "water");

      recordCareAction(actionType) {

        const streak = store.careStreak;
        if (streak.lastCareDate !== today) {
          const yesterday = new Date();
          yesterday.setDate(yesterday.getDate() - 1);
          if (streak.lastCareDate === yesterday.toDateString()) {
            streak.count++;
          } else {
            streak.count = 1;
          }
          streak.lastCareDate = today;
          streak.todayActions = [];
          streak.bestStreak = Math.max(streak.bestStreak, streak.count);
        }
        if (!streak.todayActions.includes(actionType)) {
          streak.todayActions.push(actionType);
        }
        saveCareStreak();
        /* daily task completion */
        if (store.dailyTasks.tasks.includes(actionType) && !store.dailyTasks.completed.includes(actionType)) {
          store.dailyTasks.completed.push(actionType);
          saveJSON("dailyTasks", store.dailyTasks);

      updateAmbientEvents(dt) {
        if (this.ambientEvent) {
          this.ambientEvent.timer -= dt;
          if (this.ambientEvent.type === "butterfly") {
            for (const bf of this.ambientEvent.data) {
              bf.x += Math.sin(game.time * 2.5 + bf.phase) * 20 * dt;
              bf.y += Math.cos(game.time * 1.8 + bf.phase) * 12 * dt;
              bf.x = clamp(bf.x, 70, 180);
              bf.y = clamp(bf.y, 56, 196);
            }
          }
          if (this.ambientEvent.timer <= 0) {
            this.ambientEvent = null;
            this.ambientEventCooldown = rand(120, 300);
          }
          return;
        }
        this.ambientEventCooldown -= dt;
        if (this.ambientEventCooldown <= 0) {
          const r = Math.random();
          if (r < 0.35) this.spawnButterflyEvent();
          else if (r < 0.6) this.spawnBirdEvent();
          else if (r < 0.85) this.spawnRainEvent();
          else this.spawnPackageEvent();
        }
      }

      drawAmbientEvent(c) {

            c.save(); c.rotate(flap); c.beginPath(); c.ellipse(-4, 0, 6, 3, 0, 0, Math.PI * 2); c.fill(); c.restore();
            c.save(); c.rotate(-flap); c.beginPath(); c.ellipse(4, 0, 6, 3, 0, 0, Math.PI * 2); c.fill(); c.restore();
            c.fillStyle = "#333"; c.beginPath(); c.arc(0, 0, 1.5, 0, Math.PI * 2); c.fill();
            c.restore();
          }
          c.restore();
        } else if (ev.type === "bird") {
          c.save();
          c.beginPath(); rr(c, 66, 52, 120, 152, 5); c.clip();
          for (const bd of ev.data) {
            const hop = Math.sin(game.time * 3 + bd.phase) > 0.9 ? -4 : 0;

            c.fillStyle = "#E8A020"; c.beginPath(); c.moveTo(5, -4); c.lineTo(10, -3); c.lineTo(5, -2); c.closePath(); c.fill();
            c.fillStyle = "#222"; c.beginPath(); c.arc(-1, -5, 1, 0, Math.PI * 2); c.fill();
            c.restore();
          }
          c.restore();
        } else if (ev.type === "rain") {
          c.save();
          c.beginPath(); rr(c, 66, 52, 120, 152, 5); c.clip();
          c.fillStyle = "rgba(20,30,50,0.15)"; c.fillRect(66, 52, 120, 152);
          c.strokeStyle = "rgba(150,180,220,0.5)"; c.lineWidth = 1;
          for (const d of ev.data) {
            const yOff = (game.time * d.speed + d.y) % 160;

          c.fillStyle = "#D04040"; c.beginPath(); c.arc(0, -18, 5, 0, Math.PI * 2); c.fill();
          c.restore();
        }
      }

            const s = 0.035;
            c.drawImage(spriteArt.image, f.x, f.y, f.w, f.h, -f.w * s / 2, -f.h * s, f.w * s, f.h * s);
          }
        } else if (bubble.want === "water") {
          const f = spriteArt.frames.items.waterBowl;
          if (spriteArt.ready && f) {
            const s = 0.035;
            c.drawImage(spriteArt.image, f.x, f.y, f.w, f.h, -f.w * s / 2, -f.h * s, f.w * s, f.h * s);
          }
        }
        /* text label */
        const labels = { pet: "Pets!", treat: "Treat!", toy: "Play!", brush: "Brush!", food: "Food!", water: "Water!" };
        c.fillStyle = "rgba(122,78,54,0.7)";
        c.textAlign = "center";
        c.font = '11px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(labels[bubble.want], 0, 12);
        c.restore();
      }
      draw(c) {
        drawLivingRoom(c);

        /* mode-specific ambient overlay */
        if (!this.menuOpen && !this.decorOpen && !this.dedication) {
          if (this.mode === "treat") {
            c.save();
            c.fillStyle = "rgba(232,168,76,0.04)";
            c.fillRect(0, 0, W, H);
            c.restore();
          } else if (this.mode === "toy") {
            c.save();
            c.fillStyle = "rgba(74,144,217,0.03)";
            c.fillRect(0, 0, W, H);
            c.restore();
          } else if (this.mode === "brush") {
            c.save();
            c.fillStyle = "rgba(224,160,192,0.04)";
            c.fillRect(0, 0, W, H);
            c.restore();
          }
        }

        /* buttons row */
        drawButton(c, this.gamesButton, "Games", this.hoverKey === "games", "#A86D3F");
        drawButton(c, this.decorButton, "Decor", this.hoverKey === "decor", "#9B7DBD");
        drawButton(c, this.wardrobeButton, "Wardrobe", this.hoverKey === "wardrobe", "#C07850");
        for (const btn of this.modeButtons) {
          const active = this.mode === btn.key;
          drawButton(c, btn, btn.label, this.hoverKey === btn.key || active, active ? "#B84B3A" : "#C7A37B");
        }

        /* coin pill */
        c.save();
        c.fillStyle = "rgba(255,248,240,0.65)";
        rr(c, 452, 59, 72, 22, 11);
        c.fill();
        c.fillStyle = COLORS.gold;
        c.beginPath(); c.arc(466, 70, 7, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#FFF4C0";
        c.beginPath(); c.arc(464, 68, 3, 0, Math.PI * 2); c.fill();
        c.fillStyle = COLORS.gold;
        c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "center";
        c.fillText(store.coins, 503, 75);
        c.restore();
        /* coin popup */
        if (this.coinPopup) {
          c.save();
          var cpAlpha = clamp(this.coinPopup.timer / 0.4, 0, 1);
          c.globalAlpha = cpAlpha;
          c.fillStyle = COLORS.gold;
          c.font = '15px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.fillText("+" + this.coinPopup.amount, 503, 52 - (1 - cpAlpha) * 12);
          c.restore();
        }
        /* star counter */
        c.save();
        c.fillStyle = "rgba(255,248,240,0.65)";
        rr(c, 527, 59, 68, 22, 11);
        c.fill();
        c.fillStyle = COLORS.gold;
        c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "center";
        c.fillText("\u2605 " + totalStarsEarned() + "/33", 561, 75);
        c.restore();

        /* care streak pill */
        if (store.careStreak.count > 0) {
          c.save();
          const sk = store.careStreak;
          const streakColor = sk.count >= 7 ? "rgba(255,215,0,0.75)" : sk.count >= 3 ? "rgba(230,140,50,0.75)" : "rgba(180,160,140,0.65)";
          rr(c, 527, 34, 68, 20, 10);
          c.fillStyle = streakColor;
          c.fill();
          c.fillStyle = "#FF6B35";
          c.beginPath(); c.arc(541, 43, 4, 0, Math.PI * 2); c.fill();
          c.fillStyle = "#FFD700";
          c.beginPath(); c.arc(541, 41, 2.5, 0, Math.PI * 2); c.fill();
          c.fillStyle = "#FFF8F0";
          c.font = '11px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.fillText(sk.count + "d", 571, 48);
          c.restore();
        }

        /* daily tasks counter */
        if (store.dailyTasks.tasks.length > 0) {
          c.save();
          const done = store.dailyTasks.completed.length;
          const total = store.dailyTasks.tasks.length;
          rr(c, 600, 34, 60, 20, 10);
          c.fillStyle = done >= total ? "rgba(100,190,100,0.75)" : "rgba(180,160,140,0.65)";
          c.fill();
          c.fillStyle = "#FFF8F0";
          c.font = '11px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.fillText(done + "/" + total, 630, 48);
          c.restore();
        }

        /* weekly challenge pill */
        if (store.weeklyChallenge.challengeId && !store.weeklyChallenge.completed) {
          c.save();
          rr(c, 664, 34, 60, 20, 10);
          c.fillStyle = "rgba(160,130,200,0.65)";
          c.fill();
          c.fillStyle = "#FFF8F0";
          c.font = '11px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.fillText(store.weeklyChallenge.progress + "/" + store.weeklyChallenge.target, 694, 48);
          c.restore();
        }

        /* compact pet status - small pills */
        c.save();
        rr(c, 14, 62, 140, 42, 12);
        c.fillStyle = "rgba(255,255,255,0.78)";
        c.fill();
        c.strokeStyle = "rgba(146,104,72,0.12)";
        c.lineWidth = 1;
        c.stroke();
        c.fillStyle = "#5A3E2B";
        c.textAlign = "left";
        c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("Obi: " + this.moodLabel("obi"), 24, 78);
        drawMoodIcon(c, this.petMood("obi"), 142, 76);
        rr(c, 24, 84, 120, 12, 6);
        c.fillStyle = "rgba(0,0,0,0.08)";
        c.fill();
        const obiBarW = 120 * clamp(this.obi.joy / 100, 0, 1);
        if (obiBarW > 1) {
          rr(c, 24, 84, obiBarW, 12, 6);
          c.fillStyle = "#4A90D9";
          c.fill();
          /* bar shine */
          c.fillStyle = "rgba(255,255,255,0.25)";
          rr(c, 24, 84, obiBarW, 5, 6);
          c.fill();
        }
        c.restore();

        c.save();
        rr(c, 646, 62, 140, 42, 12);
        c.fillStyle = "rgba(255,255,255,0.78)";
        c.fill();
        c.strokeStyle = "rgba(146,104,72,0.12)";
        c.lineWidth = 1;
        c.stroke();
        c.fillStyle = "#5A3E2B";
        c.textAlign = "left";
        c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("Luna: " + this.moodLabel("luna"), 656, 78);
        drawMoodIcon(c, this.petMood("luna"), 774, 76);
        rr(c, 656, 84, 120, 12, 6);
        c.fillStyle = "rgba(0,0,0,0.08)";
        c.fill();
        const lunaBarW = 120 * clamp(this.luna.joy / 100, 0, 1);
        if (lunaBarW > 1) {
          rr(c, 656, 84, lunaBarW, 12, 6);
          c.fillStyle = "#A8C686";
          c.fill();
          c.fillStyle = "rgba(255,255,255,0.25)";
          rr(c, 656, 84, lunaBarW, 5, 6);
          c.fill();
        }
        c.restore();

        /* warm scene glow */
        drawGlowCircle(c, 400, 380, 200, "rgba(255,240,210,ALPHA)", 0.06);
        /* dynamic character shadows - light source from window (~126, 130) */
        const lightX = 126, lightY = 130;
        const drawDynShadow = (cx, cy, baseW, baseH) => {
          const dx = (cx - lightX) * 0.12;
          const stretch = 1 + Math.abs(cx - lightX) * 0.001;
          const shadowAlpha = clamp(0.18 - Math.abs(cx - lightX) * 0.0003, 0.06, 0.18);
          c.save();
          const sg = c.createRadialGradient(cx + dx, cy, 0, cx + dx, cy, baseW * stretch * 1.2);
          sg.addColorStop(0, `rgba(80,55,35,${shadowAlpha})`);
          sg.addColorStop(1, "rgba(80,55,35,0)");
          c.fillStyle = sg;
          c.beginPath();
          c.ellipse(cx + dx, cy, baseW * stretch, baseH, 0, 0, Math.PI * 2);
          c.fill();
          c.restore();
        };
        drawDynShadow(this.annie.x, Math.max(this.annie.y + 120, 458), 44, 14);
        drawDynShadow(this.obi.x, 466, 42, 14);
        const lunaY = this.luna.perch !== "floor" ? 280 : 462;
        drawDynShadow(this.luna.x, lunaY + 8, 38, 12);

        /* treat mode side indicators */
        if (this.mode === "treat" && !this.menuOpen && !this.decorOpen && !this.dedication) {
          c.save();
          c.globalAlpha = 0.45;
          c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.fillStyle = "#4A90D9";
          c.fillText("\u2190 Obi's side", 200, 520);
          c.fillStyle = "#A8C686";
          c.fillText("Luna's side \u2192", 600, 520);
          /* subtle center divider */
          c.strokeStyle = "rgba(122,78,54,0.2)";
          c.setLineDash([4, 6]);
          c.beginPath();
          c.moveTo(400, 110);
          c.lineTo(400, 530);
          c.stroke();
          c.setLineDash([]);
          c.restore();
        }

        drawAnnie(c, this.annie.x, this.annie.y, 1.34, {
          pose: this.annie.pose,
          breath: Math.sin(game.time * 2),
          blink: blinkSignal(game.time + 0.25, 0.55),
          hairSway: Math.sin(game.time * 1.2),
          headTilt: this.annie.pose === "walk" ? 0 : 0.1 * Math.sin(game.time * 0.8),
          facing: this.annie.facing
        });
        drawAccessoryOverlay(c, "annie", this.annie.x, this.annie.y, 1.34, this.annie.pose, this.annie.facing);

        /* ambient events — drawn after background, before characters */
        this.drawAmbientEvent(c);

        /* food & water bowls — drawn before characters */
        this.drawBowl(c, this.foodBowl, "foodBowl", this.hoverKey === "foodBowl");
        this.drawBowl(c, this.waterBowl, "waterBowl", this.hoverKey === "waterBowl");

        /* toy basket */
        this.drawToyBasket(c, this.hoverKey === "toyBasket");

        var obiState = this.petSpriteState("obi");
        drawObi(c, this.obi.x, this.obi.y, 1.12, obiState);
        drawAccessoryOverlay(c, "obi", this.obi.x, this.obi.y, 1.12, obiState.pose, obiState.facing);
        const lunaDrawY = this.luna.perch !== "floor" ? LUNA_PERCHES[this.luna.perch].y : this.luna.y;
        const lunaDrawScale = this.luna.perch === "floor" ? 0.98 : this.luna.perch === "tower" ? 1.06 : 0.92;
        var lunaState = this.petSpriteState("luna");
        drawLuna(c, this.luna.x, lunaDrawY, lunaDrawScale, lunaState);
        drawAccessoryOverlay(c, "luna", this.luna.x, lunaDrawY, lunaDrawScale, lunaState.pose, lunaState.facing);

        /* thought bubbles */
        if (this.obiBubble) this.drawThoughtBubble(c, this.obi.x + 32, this.obi.y - 92, this.obiBubble);
        if (this.lunaBubble) {
          const ly = this.luna.perch !== "floor" ? LUNA_PERCHES[this.luna.perch].y : this.luna.y;
          this.drawThoughtBubble(c, this.luna.x + 30, ly - 88, this.lunaBubble);
        }

        for (const t of this.treats) this.drawTreat(c, t);
        this.drawToy(c);

        /* stroke trail */
        if (this.strokeTrail.length > 0 && (this.mode === "pet" || this.mode === "brush")) {
          for (const pt of this.strokeTrail) {
            c.save();
            c.globalAlpha = clamp(pt.life / 0.35, 0, 1) * 0.35;
            const color = this.mode === "brush" ? COLORS.gold : COLORS.softPink;
            c.fillStyle = color;
            c.beginPath();
            c.arc(pt.x, pt.y, 6, 0, Math.PI * 2);
            c.fill();
            c.restore();
          }
        }

        /* brush cursor sprite (Update 5) */
        if (this.mode === "brush" && !this.menuOpen && !this.decorOpen && !this.dedication) {
          drawGlowCircle(c, game.mouse.x, game.mouse.y, 28, "rgba(255,220,140,ALPHA)", 0.12);
          const brushFrame = spriteArt.frames.items ? spriteArt.frames.items.brush : null;
          if (brushFrame && spriteArt.image) {
            c.save();
            c.translate(game.mouse.x, game.mouse.y);
            c.rotate(-0.4);
            const bs = 0.18;
            c.drawImage(spriteArt.image, brushFrame.x, brushFrame.y, brushFrame.w, brushFrame.h, -brushFrame.w*bs/2, -brushFrame.h*bs, brushFrame.w*bs, brushFrame.h*bs);
            c.restore();
          }
        }

        /* floating reaction texts (Update 6) */
        for (const ft of this.floatingTexts) {
          c.save();
          const fadeAlpha = clamp(ft.life / 0.4, 0, 1);
          const scaleIn = ft.life > 1.2 ? easeOutBack(clamp((1.5 - ft.life) / 0.3, 0, 1)) : 1;
          c.globalAlpha = fadeAlpha;
          c.translate(ft.x, ft.y);
          c.scale(scaleIn, scaleIn);
          c.font = '15px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.strokeStyle = "rgba(255,255,255,0.85)";
          c.lineWidth = 3.5;
          c.strokeText(ft.text, 0, 0);
          c.fillStyle = ft.color;
          c.fillText(ft.text, 0, 0);
          c.restore();
        }

        /* decoration notification banner (Update 2) */
        if (this.decorNotification) {
          c.save();
          const dn = this.decorNotification;
          const fadeAlpha = clamp(dn.timer / 0.5, 0, 1) * clamp((4 - dn.timer) / 0.5, 0, 1);
          c.globalAlpha = fadeAlpha;
          const glow = 0.5 + 0.5 * Math.sin(game.time * 4);
          /* shadow */
          c.fillStyle = "rgba(60,30,80,0.12)";
          rr(c, 202, 108, 400, 36, 18);
          c.fill();
          /* banner */
          const grad = c.createLinearGradient(200, 105, 600, 105);
          grad.addColorStop(0, "rgba(128,80,180,0.94)");
          grad.addColorStop(1, "rgba(200,160,60,0.94)");
          rr(c, 200, 105, 400, 36, 18);
          c.fillStyle = grad;
          c.fill();
          c.strokeStyle = "rgba(255,255,255,0.3)";
          c.lineWidth = 1.5;
          c.stroke();
          /* shine */
          c.fillStyle = "rgba(255,255,255,0.1)";
          rr(c, 204, 106, 392, 14, 14);
          c.fill();
          drawGlowCircle(c, 400, 123, 220, "rgba(255,215,0,ALPHA)", 0.06 * glow);
          c.fillStyle = "#FFF8F0";
          c.textAlign = "center";
          c.font = '14px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("\u2605 " + dn.text + " \u2605", 400, 128);
          c.restore();
        }

        c.save();
        /* status bar shadow */
        c.fillStyle = "rgba(92,68,52,0.06)";
        rr(c, 124, 539, 556, 40, 18);
        c.fill();
        /* status bar */
        rr(c, 122, 536, 556, 40, 18);
        c.fillStyle = "rgba(255,255,255,0.9)";
        c.fill();
        c.strokeStyle = "rgba(146,104,72,0.18)";
        c.lineWidth = 1.5;
        c.stroke();
        /* shine */
        c.fillStyle = "rgba(255,255,255,0.2)";
        rr(c, 126, 537, 548, 16, 14);
        c.fill();
        /* pulse glow */
        if (this.statusPulse > 0.05) {
          c.globalAlpha = this.statusPulse * 0.15;
          drawGlowCircle(c, 400, 556, 300, "rgba(255,215,0,ALPHA)", 0.12);
          c.globalAlpha = 1;
        }
        c.fillStyle = "#7A5040";
        c.textAlign = "center";
        c.font = '15px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(this.statusText, 400, 560);
        c.restore();

        /* camera button */
        c.save();
        var camHover = this.hoverKey === "camera";
        c.fillStyle = camHover ? "rgba(92,68,52,0.82)" : "rgba(92,68,52,0.45)";
        rr(c, this.cameraButton.x, this.cameraButton.y, this.cameraButton.w, this.cameraButton.h, 10);
        c.fill();
        /* camera icon */
        c.fillStyle = COLORS.cream;
        rr(c, this.cameraButton.x + 8, this.cameraButton.y + 12, 24, 18, 4);
        c.fill();
        c.fillStyle = camHover ? "rgba(92,68,52,0.82)" : "rgba(92,68,52,0.45)";
        c.beginPath(); c.arc(this.cameraButton.x + 20, this.cameraButton.y + 21, 5, 0, Math.PI * 2); c.fill();
        c.fillStyle = COLORS.cream;
        rr(c, this.cameraButton.x + 14, this.cameraButton.y + 8, 12, 5, 2);
        c.fill();
        c.restore();

        /* scrapbook button */
        c.save();
        var bookHover = this.hoverKey === "scrapbook";
        c.fillStyle = bookHover ? "rgba(92,68,52,0.82)" : "rgba(92,68,52,0.45)";
        rr(c, this.scrapbookButton.x, this.scrapbookButton.y, this.scrapbookButton.w, this.scrapbookButton.h, 10);
        c.fill();
        /* book icon */
        c.fillStyle = COLORS.cream;
        c.fillRect(this.scrapbookButton.x + 12, this.scrapbookButton.y + 8, 16, 24);
        c.strokeStyle = COLORS.cream;
        c.lineWidth = 2;
        c.beginPath();
        c.moveTo(this.scrapbookButton.x + 20, this.scrapbookButton.y + 8);
        c.lineTo(this.scrapbookButton.x + 20, this.scrapbookButton.y + 32);
        c.stroke();
        c.restore();

        /* backyard door indicator */
        c.save();
        var doorHover = this.hoverKey === "backyardDoor";
        c.fillStyle = doorHover ? "rgba(168,198,134,0.45)" : "rgba(168,198,134,0.2)";
        rr(c, this.backyardDoor.x, this.backyardDoor.y, this.backyardDoor.w, this.backyardDoor.h, 8);
        c.fill();
        c.fillStyle = doorHover ? "#5C7A3A" : "rgba(92,122,58,0.5)";
        c.textAlign = "center";
        c.font = '11px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("Backyard", this.backyardDoor.x + 30, this.backyardDoor.y + 45);
        c.fillText("\u2192", this.backyardDoor.x + 30, this.backyardDoor.y + 62);
        c.restore();

        /* camera flash effect */
        if (this.cameraFlash > 0) {
          c.save();
          c.globalAlpha = this.cameraFlash;
          c.fillStyle = "#FFFFFF";
          c.fillRect(0, 0, W, H);
          c.restore();
        }

        if (this.tooltip && this.tooltipAlpha > 0.02) drawTooltip(c, this.tooltip.x, this.tooltip.y, this.tooltip.title, this.tooltip.body, this.tooltipAlpha);

        /* ── Games menu overlay ── */
        if (this.menuFade > 0.01) {
          c.save();
          c.globalAlpha = this.menuFade;

          /* dim background */
          c.fillStyle = "rgba(40,28,18,0.55)";
          c.fillRect(0, 0, W, H);

          /* menu panel */
          rr(c, 40, 60, 720, 540, 28);
          c.fillStyle = "rgba(255,248,240,0.97)";
          c.fill();
          c.strokeStyle = "rgba(146,104,72,0.2)";
          c.lineWidth = 3;
          c.stroke();

          /* title */
          c.fillStyle = "#7A4E36";
          c.textAlign = "center";
          c.font = '30px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Minigames", W / 2, 110);

          /* close button */
          const closeHover = this.menuHover === "close";
          const cBx = W / 2 + 218, cBy = 102;
          if (closeHover) drawGlowCircle(c, cBx, cBy, 24, "rgba(180,80,60,ALPHA)", 0.2);
          c.fillStyle = closeHover ? "rgba(200,70,50,0.95)" : "rgba(140,100,70,0.55)";
          c.beginPath();
          c.arc(cBx, cBy, closeHover ? 18 : 16, 0, Math.PI * 2);
          c.fill();
          c.strokeStyle = "#FFF8F0";
          c.lineWidth = closeHover ? 3 : 2.5;
          c.beginPath(); c.moveTo(cBx - 6, cBy - 6); c.lineTo(cBx + 6, cBy + 6); c.stroke();
          c.beginPath(); c.moveTo(cBx + 6, cBy - 6); c.lineTo(cBx - 6, cBy + 6); c.stroke();

          /* scroll arrows */
          if (this.menuScroll > 0) {
            c.fillStyle = this.menuHover === "scrollUp" ? "#B84B3A" : "rgba(92,68,52,0.5)";
            c.font = '16px "Fredoka One", sans-serif';
            c.textAlign = "center";
            c.fillText("\u25B2 more", W / 2, 122);
          }
          const visEnd = Math.min(this.menuScroll + 6, this.gameCards.length);
          if (visEnd < this.gameCards.length) {
            c.fillStyle = this.menuHover === "scrollDown" ? "#B84B3A" : "rgba(92,68,52,0.5)";
            c.font = '16px "Fredoka One", sans-serif';
            c.textAlign = "center";
            c.fillText("\u25BC more", W / 2, 126 + 6 * 72 + 12);
          }

          /* game cards */
          for (let vi = 0; vi < visEnd - this.menuScroll; vi++) {
            const i = this.menuScroll + vi;
            const card = this.gameCards[i];
            const cr = this.getCardRect(vi);
            const hover = this.menuHover === i;
            const scale = hover ? 1.02 : 1;

            c.save();
            c.translate(cr.x + cr.w / 2, cr.y + cr.h / 2);
            c.scale(scale, scale);
            c.translate(-(cr.x + cr.w / 2), -(cr.y + cr.h / 2));

            /* card shadow */
            c.fillStyle = "rgba(92,68,52,0.08)";
            rr(c, cr.x + 2, cr.y + 3, cr.w, cr.h, 14);
            c.fill();

            /* card bg */
            rr(c, cr.x, cr.y, cr.w, cr.h, 14);
            c.fillStyle = hover ? "rgba(255,255,255,1)" : "rgba(255,252,245,0.95)";
            c.fill();
            c.strokeStyle = hover ? card.color : "rgba(146,104,72,0.15)";
            c.lineWidth = hover ? 3 : 2;
            c.stroke();

            /* colored accent bar */
            c.fillStyle = card.color;
            rr(c, cr.x, cr.y, 8, cr.h, 14);
            c.fill();
            c.fillRect(cr.x + 7, cr.y + 4, 1, cr.h - 8);

            /* icon circle with glow */
            c.save();
            c.globalAlpha = this.menuFade * 0.28;
